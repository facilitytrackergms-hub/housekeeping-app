<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>

  <style>
    /* 01 - GLOBAL STYLE */

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 25px 18px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      color: #1847d1;
      font-size: 34px;
      text-align: center;
    }

    .employee {
      text-align: center;
      font-size: 20px;
      color: #333;
      margin-top: 10px;
      font-weight: bold;
    }

    .area {
      text-align: center;
      font-size: 22px;
      color: #666;
      margin-top: 8px;
    }

    .task {
      background: #f9fbff;
      border: 2px solid #dce3f0;
      border-radius: 20px;
      padding: 20px;
      margin-top: 18px;
    }

    .task-name {
      font-size: 24px;
      font-weight: bold;
      color: #1847d1;
      margin-bottom: 18px;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 15px;
    }

    button {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    .yes { background: #22aa44; }
    .no { background: #d93025; }

    .back {
      width: 100%;
      background: #333;
      margin-top: 20px;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="card">
    <h1>Tasks</h1>
    <div class="employee" id="employeeName"></div>
    <div class="area" id="areaName"></div>
    <button class="back" onclick="goBack()">BACK</button>
  </div>

  <div id="tasksContainer">
    <div style="text-align:center;">Loading tasks...</div>
  </div>
</div>

<script type="module">
  /* 02 - FIREBASE CONFIG */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    updateDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* 03 - SESSION DATA */

  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

  const selectedArea =
    localStorage.getItem("selectedAreaGroup");

  const selectedWorkId =
    localStorage.getItem("selectedWorkId");

  if (!sessionData) {
    window.location.href = "index.html";
  }

  if (!selectedWorkId) {
    window.location.href = "schedule.html";
  }

  document.getElementById("employeeName").innerText =
    sessionData.firstName || sessionData.name || "Employee";

  document.getElementById("areaName").innerText =
    selectedArea || "Area";

  /* 04 - LOAD TASKS */

  async function loadTasks() {
    const container = document.getElementById("tasksContainer");

    try {
      const q = query(
        collection(db, "tasks_new"),
        where("workId", "==", selectedWorkId)
      );

      const snap = await getDocs(q);

      let html = "";
      let found = false;

      snap.forEach(function(docSnap) {
        const item = docSnap.data();

        if (item.active === false) {
          return;
        }

        found = true;

        const docId = docSnap.id;
        const safeId = docId.replace(/[^a-zA-Z0-9]/g, "");

        html += `
          <div class="card task">
            <div class="task-name">${escapeHtml(item.taskName || "Task")}</div>

            <div class="buttons">
              <button class="yes" onclick="completeTask('${docId}', 'Completed', 'msg-${safeId}')">YES</button>
              <button class="no" onclick="completeTask('${docId}', 'Incomplete', 'msg-${safeId}')">NO</button>
            </div>

            <div class="message" id="msg-${safeId}" style="color: ${item.status === 'done' ? '#1c7a32' : (item.status === 'incomplete' ? '#d93025' : '#333')}">
              ${item.status === 'done' ? 'Task completed' : (item.status === 'incomplete' ? 'Task marked incomplete' : '')}
            </div>
          </div>
        `;
      });

      container.innerHTML =
        found ? html : "<div style='text-align:center;'>No tasks found for this area.</div>";

    } catch (error) {
      container.innerHTML =
        "<div style='text-align:center;'>Error loading tasks.</div>";
    }
  }

  /* 05 - COMPLETE TASK */

  window.completeTask = async function(docId, status, msgId) {
    const msgElement = document.getElementById(msgId);
    const dbStatus = status === "Completed" ? "done" : "incomplete";

    try {
      await updateDoc(doc(db, "tasks_new", docId), {
        status: dbStatus
      });

      if (status === "Completed") {
        msgElement.style.color = "#1c7a32";
        msgElement.innerText = "Task completed";
      } else {
        msgElement.style.color = "#d93025";
        msgElement.innerText = "Task marked incomplete";
      }

    } catch (error) {
      alert("Error saving status.");
    }
  };

  /* 06 - BACK BUTTON */

  window.goBack = function() {
    window.location.href = "schedule.html";
  };

  /* 07 - HTML ESCAPE */

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  loadTasks();
</script>

</body>
</html>
