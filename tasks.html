<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Tasks</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin: auto; }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    h2 { text-align: center; color: #1976d2; margin-bottom: 15px; }
    #taskList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .task-btn { 
      background: #c62828; color: white; border: none; border-radius: 15px; 
      padding: 10px; font-size: 15px; font-weight: bold; min-height: 80px; 
      cursor: pointer; transition: 0.2s; display: flex; align-items: center; 
      justify-content: center; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .task-btn.done { background: #2e7d32 !important; }
    .complete-all-btn { width: 100%; padding: 15px; background: #1976d2; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    .back-btn { width: 100%; padding: 15px; background: #555; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <div class="view-tag">Task Checklist</div>
  <h2 id="areaTitle">Loading...</h2>
  <button class="complete-all-btn" onclick="completeAll()">✔ COMPLETE ALL</button>
  <div id="taskList"></div>
  <button class="back-btn" onclick="window.location.href='schedule.html'">BACK TO ROOMS</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const selectedWork = JSON.parse(sessionStorage.getItem("selectedWork"));
  if (!selectedWork) { window.location.href = "schedule.html"; }

  document.getElementById("areaTitle").innerText = selectedWork.areaName;

  async function loadTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "<p style='grid-column: 1 / -1; text-align: center;'>Finding tasks...</p>";

    try {
      // 1. Get History first to see what's done
      const hSnap = await getDocs(query(collection(db, "task_history"), where("workId", "==", selectedWork.workId)));
      const doneIds = new Set();
      hSnap.forEach(d => doneIds.add(d.data().taskId));

      // 2. Get Tasks
      const q = query(collection(db, "tasks"), where("workId", "==", selectedWork.workId));
      const snap = await getDocs(q);

      list.innerHTML = ""; 

      snap.forEach(d => {
        const data = d.data();
        const docId = d.id;
        const taskText = data.Task;  
        
        if (taskText && taskText.trim() !== "" && taskText !== "0") {
          const btn = document.createElement("button");
          btn.className = "task-btn" + (doneIds.has(docId) ? " done" : "");
          btn.innerText = taskText;
          btn.dataset.id = docId;
          
          btn.onclick = async function() {
            const isNowDone = this.classList.toggle('done');
            const historyId = `${selectedWork.workId}_${docId}`;
            
            if (isNowDone) {
              await setDoc(doc(db, "task_history", historyId), {
                workId: selectedWork.workId,
                taskId: docId,
                status: "complete",
                timestamp: serverTimestamp()
              });
            } else {
              await deleteDoc(doc(db, "task_history", historyId));
            }
          };
          list.appendChild(btn);
        }
      });
    } catch (err) {
      list.innerHTML = `<p style="color:red; text-align:center;">Error: ${err.message}</p>`;
    }
  }

  window.completeAll = async function() {
    const btns = document.querySelectorAll('.task-btn');
    for (const btn of btns) {
      if (!btn.classList.contains('done')) {
        btn.classList.add('done');
        const historyId = `${selectedWork.workId}_${btn.dataset.id}`;
        await setDoc(doc(db, "task_history", historyId), {
          workId: selectedWork.workId,
          taskId: btn.dataset.id,
          status: "complete",
          timestamp: serverTimestamp()
        });
      }
    }
  };

  loadTasks();
</script>
</body>
</html>
