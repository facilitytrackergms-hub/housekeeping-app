<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housekeeping Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .header { text-align: center; margin-bottom: 30px; }
    h2 { color: #1847d1; font-size: 28px; margin-bottom: 5px; }
    .assignment-tag { background: #000; color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 14px; }
    .task-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .task-info { font-size: 22px; font-weight: bold; color: #333; }
    .go-btn { background: #2e5cff; color: white; border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; cursor: pointer; }
    .logout-btn { display: block; margin: 40px auto; color: #666; background: none; border: none; font-size: 16px; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="welcomeMsg">Loading...</h2>
    <span id="assignmentLabel" class="assignment-tag">---</span>
  </div>

  <div id="scheduleContainer"></div>

  <button class="logout-btn" onclick="sessionStorage.clear(); window.location.href='index.html'">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
      measurementId: "G-5TRHQMS039"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));
    if (!user) window.location.href = "index.html";

    document.getElementById("welcomeMsg").innerText = `Hi, ${user.firstName}`;
    document.getElementById("assignmentLabel").innerText = user.assignment;

    async function loadSchedule() {
      // Pulls distinct areas assigned to this employee's schedule group
      const q = query(collection(db, "taskItems"), where("assignment", "==", user.assignment));
      const snap = await getDocs(q);
      const container = document.getElementById("scheduleContainer");
      
      // Use a Set to only show each unique Area/Assignment once
      const uniqueAreas = new Set();
      snap.forEach(doc => uniqueAreas.add(doc.data().assignment));

      if (uniqueAreas.size === 0) {
        container.innerHTML = "<p style='text-align:center;'>No tasks assigned today.</p>";
        return;
      }

      uniqueAreas.forEach(area => {
        const card = document.createElement("div");
        card.className = "task-card";
        card.innerHTML = `
          <div class="task-info">${area}</div>
          <button class="go-btn" onclick="openTask('${area}')">START</button>
        `;
        container.appendChild(card);
      });
    }

    window.openTask = function(area) {
      sessionStorage.setItem("selectedDailyTask", JSON.stringify({ assignment: area }));
      window.location.href = "task-details.html";
    };

    loadSchedule();
  </script>
</body>
</html>
