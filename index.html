<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  text-align:center;
}

h1{
  font-size:48px;
}

.question{
  font-size:34px;
  font-weight:bold;
  margin:30px 0;
}

.buttons{
  display:flex;
  gap:20px;
}

button{
  flex:1;
  border:none;
  border-radius:18px;
  padding:28px;
  font-size:32px;
  font-weight:bold;
  color:white;
  background:#1976d2;
  transition:0.2s;
}

#message{
  margin-top:25px;
  font-size:28px;
  font-weight:bold;
  color:green;
}

</style>
</head>

<body>

<div class="card">

<h1>Room 201</h1>

<div class="question">
All tasks completed?
</div>

<div class="buttons">

<button id="yesBtn" onclick="completeRoom()">
YES
</button>

<button onclick="showIncomplete()">
NO
</button>

</div>

<div id="message"></div>

</div>

<script>

function completeRoom(){

  const btn =
    document.getElementById("yesBtn");

  btn.style.background =
    "#2e7d32";

  btn.style.transform =
    "scale(0.96)";

  document.getElementById("message").innerText =
    "Task Submitted";

  setTimeout(function(){

    btn.style.background =
      "#1976d2";

    btn.style.transform =
      "scale(1)";

    document.getElementById("message").innerText =
      "";

  },1500);
}

function showIncomplete(){

  alert(
    "Incomplete task popup coming next"
  );
}

</script>

</body>
</html>
