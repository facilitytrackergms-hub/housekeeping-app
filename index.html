<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  text-align:center;
}

h1{
  font-size:48px;
  margin-bottom:30px;
}

.question{
  font-size:34px;
  font-weight:bold;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:20px;
}

button{
  flex:1;
  border:none;
  border-radius:18px;
  padding:28px;
  font-size:32px;
  font-weight:bold;
  color:white;
  background:#1976d2;
}
</style>
</head>

<body>

<div class="card">
  <h1>Room 201</h1>

  <div class="question">
    All tasks completed?
  </div>

  <div class="buttons">
    <button>YES</button>
    <button>NO</button>
  </div>
</div>

</body>
</html>
