<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Employee Login</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .card {
      width: 92%;
      max-width: 420px;

      background: white;

      border-radius: 30px;

      padding: 35px 25px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.12);

      text-align: center;
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 35px 0;
      font-size: 42px;
      color: #1847d1;
    }

    h2 {
      margin: 0 0 25px 0;
      font-size: 30px;
      color: black;
    }

    input {
      width: 100%;
      padding: 22px;

      font-size: 28px;

      border-radius: 18px;
      border: 2px solid #2e5cff;

      outline: none;

      margin-bottom: 22px;
      text-align: center;
    }

    button {
      width: 100%;

      padding: 22px;

      font-size: 28px;
      font-weight: bold;

      border: none;
      border-radius: 18px;

      background: #2e5cff;
      color: white;

      cursor: pointer;

      margin-bottom: 18px;
    }

    button:active {
      transform: scale(0.98);
    }

    .gray-button {
      background: #5a5a5a;
    }

    #message {
      margin-top: 20px;

      padding: 22px;

      border-radius: 20px;

      font-size: 24px;
      font-weight: bold;

      background: #edf9ef;
      color: #1c7a32;

      display: none;
    }

    #taskView {
      display: none;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="view-tag">
      VIEW 1
    </div>

    <div id="pinView">

      <h1>Employee Login</h1>

      <input
        type="password"
        id="pin"
        placeholder="Enter PIN"
        autocomplete="new-password"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >

      <button onclick="checkPin()">
        NEXT
      </button>

    </div>

    <div id="taskView">

      <h2 id="welcomeName">
        Welcome
      </h2>

      <button onclick="selectDailyTask('HK Schedule 1')">
        HK Schedule 1
      </button>

      <button onclick="selectDailyTask('HK Schedule 2')">
        HK Schedule 2
      </button>

      <button onclick="selectDailyTask('Laundry')">
        Laundry
      </button>

      <button class="gray-button" onclick="goBackToPin()">
        BACK
      </button>

    </div>

    <div id="message"></div>

  </div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let foundEmployee = null;

  async function checkPin() {
    const pinInput = document.getElementById("pin").value.trim();

if (!pinInput) {
  showMessage("Enter PIN", false);
  return;
}

if (pinInput === "4026") {
  window.location.href = "admin.html";
  return;
}

showMessage("Checking...", true);

    try {
      const pinNumber = Number(pinInput);

      const employeeQuery = query(
        collection(db, "employees"),
        where("pin", "==", pinNumber)
      );

      const employeeSnap = await getDocs(employeeQuery);

      if (employeeSnap.empty) {
        showMessage("Invalid PIN", false);
        return;
      }

      foundEmployee = null;

      employeeSnap.docs.forEach(function(docSnap) {
        const emp = docSnap.data();

        const active = String(emp.active || "Yes").trim();

        if (active !== "No" && active !== "false") {
          foundEmployee = {
            id: docSnap.id,
            firstName: emp.firstName || emp.FirstName || "Employee",
            employeeName: emp.employeeName || emp.name || emp.firstName || "Employee",
            pin: pinNumber,
            role: emp.role || "Housekeeping"
          };
        }
      });

      if (!foundEmployee) {
        showMessage("Inactive employee", false);
        return;
      }

      document.getElementById("message").style.display = "none";
      document.getElementById("pinView").style.display = "none";
      document.getElementById("taskView").style.display = "block";

      document.getElementById("welcomeName").innerHTML =
        "Welcome, " + foundEmployee.firstName;

    } catch (error) {
      console.error("Login error details:", error);
      showMessage("Connection error", false);
    }
  }

  function selectDailyTask(taskName) {
    if (!foundEmployee) {
      showMessage("Enter PIN first", false);
      return;
    }

    sessionStorage.setItem(
      "currentEmployee",
      JSON.stringify(foundEmployee)
    );

    sessionStorage.setItem(
      "selectedDailyTask",
      JSON.stringify({
        assignment: taskName,
        schedule: "Daily"
      })
    );

    showMessage("Login successful", true);

    setTimeout(function() {
      window.location.href = "schedule.html";
    }, 800);
  }

  function goBackToPin() {
    foundEmployee = null;

    document.getElementById("taskView").style.display = "none";
    document.getElementById("pinView").style.display = "block";
    document.getElementById("message").style.display = "none";
    document.getElementById("pin").value = "";
    document.getElementById("pin").focus();
  }

  function showMessage(text, success) {
    const message =
      document.getElementById("message");

    message.style.display = "block";

    if (success) {
      message.style.background = "#edf9ef";
      message.style.color = "#1c7a32";
    } else {
      message.style.background = "#ffecec";
      message.style.color = "#c62828";
    }

    message.innerHTML = text;
  }

  document
    .getElementById("pin")
    .addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkPin();
      }
    });

  window.checkPin = checkPin;
  window.selectDailyTask = selectDailyTask;
  window.goBackToPin = goBackToPin;

</script>

</body>
</html>
