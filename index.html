<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Login</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
    input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 20px; text-align: center; }
    button { width: 100%; padding: 15px; background: #1976d2; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .error { color: #c62828; font-size: 14px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<div class="login-card">
  <h2>Enter PIN</h2>
  <input type="password" id="pinInput" placeholder="0000" maxlength="8" inputmode="numeric">
  <button onclick="handleLogin()">LOGIN</button>
  <div id="errorMsg" class="error">Invalid PIN.</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

window.handleLogin = async function() {
  const pinValue = document.getElementById("pinInput").value;
  const error = document.getElementById("errorMsg");
  error.style.display = "none";

  try {
    // 1. Get Building Mode
    const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
    const mode = (modeSnap.exists() ? (modeSnap.data().settingValue || modeSnap.data().value) : "two").toLowerCase().trim();

    // 2. Search Employees for the PIN (Checking both String and Number versions)
    const q = query(collection(db, "employees"), where("pin", "in", [pinValue, Number(pinValue)]));
    const empSnap = await getDocs(q);

    if (!empSnap.empty) {
      const empData = empSnap.docs[0].data();
      
      // 3. Check if they are an Admin or Employee
      if (empData.role && empData.role.toLowerCase() === "admin") {
        // If Role is Admin, go to Admin Panel
        sessionStorage.setItem("currentEmployee", JSON.stringify({ firstName: empData.firstName || empData.name, role: "admin" }));
        window.location.href = "admin.html";
      } else {
        // If Role is Employee, go to Schedule
        const assignment = (mode === "three") ? empData.mode3_assign : empData.mode2_assign;
        sessionStorage.setItem("currentEmployee", JSON.stringify({
          firstName: empData.firstName || empData.name,
          assignment: assignment
        }));
        window.location.href = "schedule.html";
      }
    } else {
      // 4. Final fallback: Check the Master Admin password in Settings
      const adminSnap = await getDoc(doc(db, "settings", "admin"));
      const masterPass = adminSnap.exists() ? (adminSnap.data().Password || adminSnap.data().password) : null;
      
      if (masterPass && pinValue === String(masterPass)) {
        window.location.href = "admin.html";
      } else {
        error.style.display = "block";
      }
    }
  } catch (err) {
    console.error("Login Error:", err);
    alert("System Error. Check connection.");
  }
};
</script>
</body>
</html>
