<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housekeeping Login</title>
</head>

<body>
  <h2>Employee Login</h2>

  <label>Enter PIN</label><br>
  <input type="password" id="pin"><br><br>

  <button onclick="login()">LOGIN</button>

  <p id="message"></p>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4kZ1JPlMrjzvjHSQxgpuZXl2zZ9jekz8j-tasSjS84uRS5iCx0UReV0b0s4tSGea-/exec";

    function login() {
      const pin = document.getElementById("pin").value.trim();

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "loginEmployee",
          pin: pin,
          deviceName: "Employee Web App"
        })
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          localStorage.setItem("employeePin", pin);
          localStorage.setItem("employeeId", result.employeeId);
          localStorage.setItem("employeeName", result.employeeName);

          document.getElementById("message").innerText =
            "Logged in: " + result.employeeName;
        } else {
          document.getElementById("message").innerText = result.message;
        }
      })
      .catch(error => {
        document.getElementById("message").innerText =
          "Login error. Check Apps Script deployment.";
      });
    }
  </script>
</body>
</html>
