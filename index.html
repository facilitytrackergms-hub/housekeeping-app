<!-- Purpose: Login Interface & Connection -->
<!-- Location: index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Housekeeping Login</title>
</head>
<body>

    <div id="login-container">
        <h2>Employee Login</h2>
        <form id="login-form">
            <input type="text" id="employee-id" placeholder="Employee ID (e.g. EMP001)" required>
            <br><br>
            <input type="password" id="pin" placeholder="4-Digit PIN" maxlength="4" required>
            <br><br>
            <button type="submit">Sign In</button>
        </form>
        <p id="login-feedback" style="color: red;"></p>
    </div>

    <!-- This script connects the HTML to your login.js logic -->
   <script type="module">
    // Changed verifyEmployee to loginEmployee to match your file
    import { loginEmployee } from './src/login.js';
    
    const loginForm = document.getElementById('login-form');
    const feedback = document.getElementById('login-feedback');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('employee-id').value;
        const pin = document.getElementById('pin').value;
        
        feedback.textContent = "Verifying...";
        
        try {
            // Updated to use the correct function name
            const employeeData = await loginEmployee(id, pin);
            if (employeeData) {
                sessionStorage.setItem("currentEmployee", JSON.stringify(employeeData));
                window.location.href = 'schedule.html';
            }
        } catch (error) {
            feedback.textContent = "Invalid ID or PIN. Please try again.";
        }
    });
</script>

</body>
</html>
