<script type="module">
  // ... (Firebase InitializeApp & db Setup) ...

  window.handleLogin = async function() {
    const pin = document.getElementById("pinInput").value;
    const error = document.getElementById("errorMsg");
    
    const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
    const mode = (modeSnap.exists() ? (modeSnap.data().settingValue || modeSnap.data().value) : "two").toLowerCase().trim();

    let assignment = "";
    let displayName = "";

    if (mode === "three") {
      if (pin === "1234") { assignment = "Floor 1"; displayName = "1st Floor Staff"; }
      else if (pin === "1235") { assignment = "Floor 2"; displayName = "2nd Floor Staff"; }
      else if (pin === "1236") { assignment = "Floor 3"; displayName = "3rd Floor Staff"; }
    } else {
      if (pin === "1234") { assignment = "HK Schedule 1"; displayName = "HK 1 Staff"; }
      else if (pin === "1235") { assignment = "HK Schedule 2"; displayName = "HK 2 Staff"; }
    }

    if (assignment) {
      sessionStorage.setItem("currentEmployee", JSON.stringify({ firstName: displayName, assignment: assignment }));
      window.location.href = "schedule.html";
    } else {
      error.style.display = "block";
    }
  };
</script>
