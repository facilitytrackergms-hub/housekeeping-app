<!-- Purpose: Full Login Interface with SDK -->
<!-- Location: index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMS Housekeeping Login</title>
</head>
<body>

    <div id="login-container">
        <h2>Employee Login</h2>
        <form id="login-form">
            <input type="text" id="employee-id" placeholder="Employee ID (e.g. EMP001)" required>
            <br><br>
            <input type="password" id="pin" placeholder="4-Digit PIN" maxlength="4" required>
            <br><br>
            <button type="submit" id="signin-btn">Sign In</button>
        </form>
        <p id="login-feedback" style="color: red;"></p>
    </div>

    <!-- 1. Firebase App SDK (REQUIRED) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { loginEmployee } from './src/login.js';
        
        const loginForm = document.getElementById('login-form');
        const feedback = document.getElementById('login-feedback');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('employee-id').value;
            const pin = document.getElementById('pin').value;
            
            // This proves the button is working
            feedback.textContent = "Connecting to Database...";
            feedback.style.color = "blue";
            
            try {
                const employeeData = await loginEmployee(id, pin);
                if (employeeData) {
                    sessionStorage.setItem("currentEmployee", JSON.stringify(employeeData));
                    window.location.href = 'schedule.html';
                }
            } catch (error) {
                console.error("Login failed:", error);
                feedback.textContent = "Invalid ID or PIN. Please try again.";
                feedback.style.color = "red";
            }
        });
    </script>

</body>
</html>
