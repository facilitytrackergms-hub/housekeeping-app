<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:420px;
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  text-align:center;
}

h1{
  font-size:48px;
  margin-bottom:30px;
}

.question{
  font-size:34px;
  font-weight:bold;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:20px;
}

button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:24px;
  font-size:28px;
  font-weight:bold;
  color:white;
  background:#1976d2;
  margin-top:15px;
}

.yes{
  background:#2e7d32;
}

.no{
  background:#c62828;
}

.back{
  background:#555;
}

select, textarea{
  width:100%;
  font-size:24px;
  padding:18px;
  border-radius:15px;
  border:1px solid #ccc;
  margin-top:15px;
  box-sizing:border-box;
}

textarea{
  height:120px;
}
</style>
</head>

<body>

<div class="card" id="homeScreen">
  <h1>Room 201</h1>

  <div class="question">
    All tasks completed?
  </div>

  <div class="buttons">
    <button class="yes" onclick="completeRoom()">YES</button>
    <button class="no" onclick="showIncomplete()">NO</button>
  </div>
</div>

<div class="card" id="incompleteScreen" style="display:none;">
  <h1>Room 201</h1>

  <div class="question">
    What was not completed?
  </div>

  <select id="taskNotDone">
    <option value="">Choose task</option>
    <option value="Bathroom">Bathroom</option>
    <option value="Bed">Bed</option>
    <option value="Trash">Trash</option>
    <option value="Floor">Floor</option>
    <option value="Towels">Towels</option>
  </select>

  <select id="reason">
    <option value="">Choose reason</option>
    <option value="Resident in room">Resident in room</option>
    <option value="No supplies">No supplies</option>
    <option value="Maintenance issue">Maintenance issue</option>
    <option value="Ran out of time">Ran out of time</option>
    <option value="Other">Other</option>
  </select>

  <textarea id="note" placeholder="Optional note"></textarea>

  <button onclick="submitIncomplete()">SUBMIT</button>
  <button class="back" onclick="goHome()">BACK</button>
</div>

<script>
function completeRoom(){
  alert("Room 201 marked complete");
  goHome();
}

function showIncomplete(){
  document.getElementById("homeScreen").style.display = "none";
  document.getElementById("incompleteScreen").style.display = "block";
}

function submitIncomplete(){
  let task = document.getElementById("taskNotDone").value;
  let reason = document.getElementById("reason").value;
  let note = document.getElementById("note").value;

  if(task === ""){
    alert("Choose which task was not completed");
    return;
  }

  if(reason === ""){
    alert("Choose a reason");
    return;
  }

  alert("Incomplete task saved");

  document.getElementById("taskNotDone").value = "";
  document.getElementById("reason").value = "";
  document.getElementById("note").value = "";

  goHome();
}

function goHome(){
  document.getElementById("homeScreen").style.display = "block";
  document.getElementById("incompleteScreen").style.display = "none";
}
</script>

</body>
</html>
