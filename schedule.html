<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 6px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 18px; padding: 12px; box-shadow: 0 4px 18px rgba(0,0,0,0.18); margin: auto; position: relative; }
    
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 6px; }
    h2, h3 { text-align: center; margin: 5px 0; }
    
    button { width: 100%; border: none; border-radius: 12px; background: #1976d2; color: white; font-size: 17px; font-weight: bold; padding: 14px; margin: 6px 0; cursor: pointer; }
    .red { background: #c62828 !important; }
    .back { background: #555 !important; }
    .hidden { display: none !important; }

    /* Header UI */
    .top-box { border: 2px solid #e0e0e0; border-radius: 18px; padding: 12px; margin-bottom: 10px; background: #fafafa; text-align: center; }
    .date-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .date-btn { width: auto; padding: 8px 12px; background: #555; font-size: 14px; }
    
    /* Category & Area Grids */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #categoryButtons button { min-height: 100px; font-size: 16px; }
    #areaButtons button { min-height: 70px; font-size: 18px; }

    /* Loading Spinner */
    .loading-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top: 5px solid #1976d2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #1976d2; margin-top: 5px; font-size: 16px; }
  </style>
</head>
<body>

<div id="loadingScreen" class="loading-bg hidden"><div class="spinner"></div></div>

<div class="card">
  <div id="view2">
    <div class="view-tag">V2 schedule.html</div>
    
    <div class="top-box">
      <div class="date-row">
        <button class="date-btn" onclick="adjustDate(-1)">◀</button>
        <h3 id="dateDisplay">Today</h3>
        <button class="date-btn" onclick="adjustDate(1)">▶</button>
      </div>
      <h2 id="empName">Hi, ---</h2>
      <h3 id="assignDisplay" style="color:#1976d2;">---</h3>
      
      <button id="coverBtn" style="font-size:12px; padding:8px; background:#666;" onclick="showCover()">COVER ANOTHER ASSIGNMENT</button>
      <div id="coverBox" class="hidden">
        <select id="assignSelect" onchange="updateAssignment(this.value)"></select>
      </div>
    </div>

    <div id="categoryButtons" class="grid-2"></div>
    <button class="back" onclick="location.href='index.html'" style="margin-top:20px;">LOGOUT</button>
  </div>

  <div id="view3" class="hidden">
    <div class="view-tag">V3 schedule.html</div>
    <h2 id="catTitle" style="color:#1976d2;">Category</h2>
    <div id="areaButtons" class="grid-2"></div>
    <button class="back" onclick="showV2()" style="margin-top:20px;">BACK</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = JSON.parse(sessionStorage.getItem("currentEmployee"));
  if(!session) location.href = "index.html";

  let currentAssign = session.assignment;
  let workDate = new Date();
  let currentWorkDayName = "";
  let allAreasForDay = [];

  // Helper functions for UI
  const showLoading = () => document.getElementById("loadingScreen").classList.remove("hidden");
  const hideLoading = () => document.getElementById("loadingScreen").classList.add("hidden");

  function updateDateDisplay() {
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    currentWorkDayName = days[workDate.getDay()];
    document.getElementById("dateDisplay").innerText = currentWorkDayName + ", " + workDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  /* 01 - CORE DATA LOAD & FILTER */
  async function loadAssignmentTasks() {
    showLoading();
    updateDateDisplay();
    
    document.getElementById("empName").innerText = "Hi, " + session.firstName;
    document.getElementById("assignDisplay").innerText = currentAssign;

    // A. Get the Mode (2 or 3) from settings
    const modeDoc = await getDoc(doc(db, "settings", "housekeepingMode"));
    const modeData = modeDoc.exists() ? modeDoc.data() : {};
    const mode = (modeData.settingValue || modeData.value || "two").toLowerCase();
    const field = (mode === "three") ? "threeHousekeeperSchedule" : "twoHousekeeperSchedule";

    // B. Fetch Areas
    const areaSnap = await getDocs(collection(db, "areas"));
    allAreasForDay = [];
    const schedules = new Set();

    areaSnap.forEach(aDoc => {
      const area = aDoc.data();
      const areaDay = String(area.scheduleDay || "").toLowerCase();
      const today = currentWorkDayName.toLowerCase();
      
      const sched = area[field];
      if(sched) schedules.add(sched);

      // FILTER LOGIC: Match Assignment + Day (Daily or Today)
      const isCorrectDay = (areaDay === "daily" || areaDay === today);
      const isCorrectAssign = String(sched).trim() === String(currentAssign).trim();

      if (isCorrectDay && isCorrectAssign) {
        allAreasForDay.push({ id: aDoc.id, ...area });
      }
    });

    // Populate Cover Dropdown
    const select = document.getElementById("assignSelect");
    select.innerHTML = '<option value="">Select Schedule...</option>' + 
      Array.from(schedules).map(s => `<option value="${s}">${s}</option>`).join('');

    drawCategories();
    hideLoading();
  }

  /* 02 - DRAW CATEGORIES */
  function drawCategories() {
    const box = document.getElementById("categoryButtons");
    box.innerHTML = "";
    const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

    cats.forEach(cat => {
      const count = allAreasForDay.filter(a => a.category === cat).length;
      const btn = document.createElement("button");
      btn.className = (count > 0) ? "red" : "back";
      btn.innerText = `${cat} (${count})`;
      btn.onclick = () => {
        if(count > 0) showV3(cat);
      };
      box.appendChild(btn);
    });
  }

  /* 03 - DRAW AREA BUTTONS (VIEW 3) */
  function showV3(cat) {
    document.getElementById("view2").classList.add("hidden");
    document.getElementById("view3").classList.remove("hidden");
    document.getElementById("catTitle").innerText = cat;

    const box = document.getElementById("areaButtons");
    box.innerHTML = "";
    const filtered = allAreasForDay.filter(a => a.category === cat);

    filtered.forEach(area => {
      const btn = document.createElement("button");
      btn.className = "red";
      btn.innerHTML = `<div class="room-number">${area.areaName}</div>`;
      btn.onclick = () => {
        sessionStorage.setItem("selectedWork", JSON.stringify({ 
          workId: area.workId, 
          areaName: area.areaName 
        }));
        location.href = "tasks.html";
      };
      box.appendChild(btn);
    });
  }

  // UTILS
  window.adjustDate = (n) => {
    workDate.setDate(workDate.getDate() + n);
    loadAssignmentTasks();
  };

  window.showCover = () => document.getElementById("coverBox").classList.toggle("hidden");

  window.updateAssignment = (val) => {
    if(!val) return;
    currentAssign = val;
    loadAssignmentTasks();
    document.getElementById("coverBox").classList.add("hidden");
  };

  window.showV2 = () => {
    document.getElementById("view2").classList.remove("hidden");
    document.getElementById("view3").classList.add("hidden");
  };

  // Initial Load
  loadAssignmentTasks();
</script>
</body>
</html>
