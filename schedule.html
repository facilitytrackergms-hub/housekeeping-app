<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>
  <style>
    /* GLOBAL STYLE */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 18px 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .view-center { text-align: center; }
    h2, h3 { text-align: center; margin-top: 0; }
    h2 { font-size: 30px; }
    input[type="date"] { width: 100%; font-size: 22px; padding: 14px; margin: 10px 0 18px; border-radius: 14px; border: 1px solid #ccc; text-align: center; }
    button { width: 100%; border: none; border-radius: 14px; background: #1976d2; color: white; font-size: 22px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; }
    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .back { background: #555; color: white; }
    .hidden { display: none !important; }
    .task-row { background: #fff; border: 1px solid #ddd; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
 
  /* Progress-based Button Colors */
button.red { background-color: #d93025 !important; color: white; }
button.yellow { background-color: #f9ab00 !important; color: black; }
button.green { background-color: #1e8e3e !important; color: white; }
/* Standard buttons remain blue */
button.standard { background-color: #1976d2; color: white; }
  
  
  </style>
</head>
<body>

<div class="card">
  <h2 id="employeeName">Welcome</h2>

  <!-- VIEW 1: ASSIGNMENTS -->
  <div id="view1">
    <div class="view-center"><div class="view-tag">VIEW 1</div></div>
    <button id="btnH1">Housekeeper 1</button>
    <button id="btnH2">Housekeeper 2</button>
    <button id="btnLaundry">Laundry</button>
    <button class="back" id="btnLogout">LOGOUT</button>
  </div>

  <!-- VIEW 2: CATEGORIES -->
  <div id="view2" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 2</div></div>
    <h3 id="v2Title">Categories</h3>
    <div id="categoryButtons">
       <button id="btnCommon">Common Area</button>
       <button id="btnWeekly">Weekly Room</button>
       <button id="btnDaily">Daily Room</button>
       <button id="btnDehum">Dehumidifier</button>
    </div>
    <button class="back" onclick="showView(1)">BACK</button>
  </div>

  <!-- VIEW 3: AREAS (Now contains the Date Picker) -->
  <div id="view3" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 3</div></div>
    
    <!-- DATE PICKER CONTAINER (HIDDEN BY DEFAULT) -->
    <div class="view-center hidden" id="datePickerContainer">
      <label style="font-weight: bold; font-size: 14px;">Selected Work Date:</label>
      <input type="date" id="globalWorkDate">
    </div>

    <h3 id="v3Title" style="margin-top:15px;">Select Area</h3>
    <div id="areaBtnContainer" class="rooms-grid"></div>
    <button class="back" onclick="showView(2)">BACK</button>
  </div>

  <!-- VIEW 4: TASK LIST -->
  <div id="view4" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 4</div></div>
    <h3 id="v4Title">Tasks</h3>
    <div id="taskListContainer"></div>
    <button class="back" onclick="showView(3)">BACK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
  authDomain: "gms-task-tracker.firebaseapp.com",
  projectId: "gms-task-tracker",
  storageBucket: "gms-task-tracker.firebasestorage.app",
  messagingSenderId: "790880979860",
  appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
  measurementId: "G-5TRHQMS039"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Initialize Session
const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));
if (!sessionData) window.location.href = "index.html";

// Logic: Default date to CURRENT DATE (Today)
const today = new Date();
let currentWorkDate = today.toISOString().split('T')[0];

document.getElementById("globalWorkDate").value = currentWorkDate;
document.getElementById("employeeName").innerText = "Welcome, " + sessionData.firstName;

let currentAssignment = "";
let selectedCategory = "";

// Navigation Controls
window.showView = (num) => {
    [1,2,3,4].forEach(v => document.getElementById('view'+v).classList.add('hidden'));
    document.getElementById('view'+num).classList.remove('hidden');
};

document.getElementById("btnH1").onclick = () => { currentAssignment = 'Housekeeper 1'; showView(2); };
document.getElementById("btnH2").onclick = () => { currentAssignment = 'Housekeeper 2'; showView(2); };
document.getElementById("btnLaundry").onclick = () => { currentAssignment = 'Laundry'; showView(2); };

document.getElementById("btnCommon").onclick = () => navToView3('Common Area');
document.getElementById("btnWeekly").onclick = () => navToView3('Weekly Room');
document.getElementById("btnDaily").onclick = () => navToView3('Daily Room');
document.getElementById("btnDehum").onclick = () => navToView3('Dehumidifier');

document.getElementById("globalWorkDate").onchange = (e) => {
    currentWorkDate = e.target.value;
    navToView3(selectedCategory);
};

async function navToView3(cat) {
    selectedCategory = cat;
    const container = document.getElementById("areaBtnContainer");
    const datePicker = document.getElementById("datePickerContainer");
    
    // LOGIC: Only show date picker for Weekly Room. Reset to today for others.
    if (cat === "Weekly Room") {
        datePicker.classList.remove("hidden");
    } else {
        datePicker.classList.add("hidden");
        currentWorkDate = new Date().toISOString().split('T')[0];
        document.getElementById("globalWorkDate").value = currentWorkDate;
    }

    container.innerHTML = "Searching tasks...";
    showView(3);

    const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const selectedDay = dayNames[new Date(currentWorkDate + 'T00:00:00').getDay()];

    const q = query(collection(db, "tasks"), where("assignment", "==", currentAssignment));
    const snap = await getDocs(q);
    
    const filteredDocs = snap.docs.filter(d => {
        const item = d.data();
        const itemCat = (item.category || "").toLowerCase();
        const targetCat = cat.toLowerCase();
        const itemSched = (item.schedule || "").toLowerCase();
        const targetDay = selectedDay.toLowerCase();

        return itemCat === targetCat && (itemSched === targetDay || itemSched === "daily");
    });

    const uniqueAreas = [...new Set(filteredDocs.map(d => d.data().area))];
    
    container.innerHTML = "";
    if (uniqueAreas.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding-top:20px;">No areas found for ${selectedDay}.</div>`;
        return;
    }

    uniqueAreas.forEach(area => {
        const btn = document.createElement("button");
        btn.innerText = area;
        btn.onclick = () => navToView4(area);
        container.appendChild(btn);
    });
}

async function navToView4(area) {
    localStorage.setItem("currentArea", area);
    showView(4);
    loadTasks();
}

async function loadTasks() {
    const area = localStorage.getItem("currentArea");
    const container = document.getElementById("taskListContainer");
    container.innerHTML = "Loading Tasks...";

    const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const selectedDay = dayNames[new Date(currentWorkDate + 'T00:00:00').getDay()];

    const q = query(collection(db, "tasks"), 
              where("assignment", "==", currentAssignment),
              where("area", "==", area));
    
    const snap = await getDocs(q);

    let html = `<h4 style="text-align:center; margin-bottom:15px;">${area}<br><small style="color:#666;">${selectedDay}</small></h4>`;
    let found = false;
    
    snap.forEach(d => {
        const item = d.data();
        if (item.schedule === "Daily" || item.schedule === selectedDay) {
            found = true;
            html += `<div class="task-row">
                <span>${item.task}</span>
                <input type="checkbox" style="width:30px;height:30px;" 
                       ${item.status === 'done' ? 'checked' : ''} 
                       onchange="updateStatus('${d.id}', this.checked)">
            </div>`;
        }
    });
    container.innerHTML = found ? html : `<div style="text-align:center; color:red;">No tasks scheduled for today.</div>`;
}

window.updateStatus = async (id, checked) => {
    await updateDoc(doc(db, "tasks", id), { status: checked ? "done" : "pending" });
};

document.getElementById("btnLogout").onclick = () => { sessionStorage.clear(); window.location.href = "index.html"; };
</script>
</body>
</html>
