<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facility Tracker</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:6px;
}

.card{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:18px;
  padding:12px;
  box-shadow:0 4px 18px rgba(0,0,0,0.18);
}

.view-tag{
  display:inline-block;
  background:black;
  color:white;
  padding:4px 10px;
  border-radius:8px;
  font-size:12px;
  margin-bottom:6px;
}

.view-center{
  text-align:center;
}

h2,h3{
  text-align:center;
  margin-top:0;
}

h2{
  font-size:22px;
  margin-bottom:8px;
}

h3{
  font-size:18px;
  margin-bottom:8px;
}

input,select,textarea{
  width:100%;
  font-size:18px;
  padding:10px;
  margin:6px 0 10px;
  border-radius:12px;
  border:1px solid #ccc;
}

textarea{
  min-height:60px;
}

button{
  width:100%;
  border:none;
  border-radius:12px;
  background:#1976d2;
  color:white;
  font-size:17px;
  font-weight:bold;
  padding:11px;
  margin:4px 0;
  cursor:pointer;
}

.green{
  background:#2e7d32 !important;
  color:white !important;
}

.yellow{
  background:#f9a825 !important;
  color:black !important;
}

.red{
  background:#c62828 !important;
  color:white !important;
}

.back{
  background:#555 !important;
  color:white !important;
}

.hidden{
  display:none !important;
}

.date-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
}

.date-row h3{
  margin:0;
  font-size:18px;
}

.date-change-btn{
  width:auto;
  font-size:12px;
  padding:7px 10px;
  margin:0;
  border-radius:10px;
  background:#555;
  white-space:nowrap;
}

.hidden-date{
  position:absolute;
  opacity:0;
  pointer-events:none;
  width:1px;
  height:1px;
}

.top-date-box{
  margin-bottom:12px;
}

.rooms-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:6px;
  margin-top:8px;
}

.rooms-grid button{
  width:100%;
  min-height:56px;
  font-size:14px;
  padding:6px 4px;
  line-height:1.1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  margin:0;
}

.room-number{
  font-size:20px;
  font-weight:bold;
  line-height:1;
}

.room-counter{
  font-size:13px;
  font-weight:bold;
  margin-top:2px;
}

#checklist{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:5px;
  margin-top:8px;
}

.check-row{
  font-size:12px;
  padding:5px 3px;
  border:1px solid #ddd;
  border-radius:10px;
  text-align:center;
  min-height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3px;
}

.check-row input{
  width:auto;
  transform:scale(1);
  margin:0;
}

#message{
  text-align:center;
  font-size:18px;
  font-weight:bold;
  margin:8px 0;
  color:#2e7d32;
}

.loading-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.70);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.spinner{
  width:70px;
  height:70px;
  border:8px solid #ddd;
  border-top:8px solid #1976d2;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

</style>
</head>

<body>

<div class="card">

<div id="view2">

<div class="view-center">
<div class="view-tag">VIEW 2</div>
</div>

<h2 id="employeeName">Welcome</h2>
<h2 id="assignmentTitle"></h2>

<div class="date-row">

<h3 id="workDateTitle"></h3>

<button class="date-change-btn" onclick="openCalendar()">
CHANGE DATE
</button>

<input
type="date"
id="quickDatePicker"
class="hidden-date"
onchange="changeWorkDateFromCalendar()"
>

</div>

<div id="categoryButtons"></div>

<button class="back" onclick="logout()">LOGOUT</button>

</div>

<div id="view3" class="hidden">

<div class="view-center">
<div class="view-tag" id="areaViewTag">VIEW 3</div>
</div>

<div id="areaBigDatePickerBox" class="top-date-box hidden">

<h3 id="areaDateTitle"></h3>

<input
type="date"
id="bigDatePicker"
onchange="changeWorkDateFromBigPicker()"
>

</div>

<button
id="completeAllCategoryButton"
class="green"
onclick="completeWholeCategory()"
>
ALL
</button>

<div id="areaButtons" class="rooms-grid"></div>

<button class="back" onclick="backToCategories()">
BACK
</button>

</div>

<div id="view4" class="hidden">

<div class="view-center">
<div class="view-tag">VIEW 7</div>
</div>

<button
id="allTasksButton"
class="green"
onclick="checkAllTasks()"
>
103 ALL TASKS COMPLETED
</button>

<div id="checklistBox">

<div id="checklist"></div>

<div id="reasonBox" class="hidden">

<h3>Reason</h3>

<select id="reason">

<option value="">Select reason</option>
<option>Resident in room</option>
<option>Resident refused</option>
<option>Room occupied</option>
<option>Supplies missing</option>
<option>Maintenance issue</option>
<option>Not enough time</option>
<option>Other</option>

</select>

<textarea
id="note"
placeholder="Other reason / notes"
></textarea>

</div>

<button
class="green"
onclick="saveTaskChecklist()"
>
SAVE
</button>

</div>

<p id="message"></p>

<button class="back" onclick="backToAreas()">
BACK
</button>

</div>

</div>

<div id="loadingScreen" class="loading-bg hidden">
<div class="spinner"></div>
</div>

<script>

function checkAllTasks(){

  const checkboxes =
    document.querySelectorAll('#checklist input[type="checkbox"]');

  checkboxes.forEach(function(box){
    box.checked = true;
  });

  document
    .getElementById("reasonBox")
    .classList
    .add("hidden");

  document.getElementById("reason").value = "";
  document.getElementById("note").value = "";
}

function updateReasonVisibility(){

  const checkboxes =
    document.querySelectorAll('#checklist input[type="checkbox"]');

  let allChecked = true;

  checkboxes.forEach(function(box){

    if(!box.checked){
      allChecked = false;
    }

  });

  if(allChecked){

    document
      .getElementById("reasonBox")
      .classList
      .add("hidden");

  }else{

    document
      .getElementById("reasonBox")
      .classList
      .remove("hidden");

  }

}

async function saveTaskChecklist(){

  document
    .getElementById("loadingScreen")
    .classList
    .remove("hidden");

  setTimeout(function(){

    document
      .getElementById("loadingScreen")
      .classList
      .add("hidden");

    document.getElementById("message").innerText =
      "TASK SAVED";

    setTimeout(function(){

      document
        .getElementById("view4")
        .classList
        .add("hidden");

      document
        .getElementById("view3")
        .classList
        .remove("hidden");

    },800);

  },700);

}

function openTaskGroup(area){

  document.getElementById("allTasksButton").innerText =
    area + " ALL TASKS COMPLETED";

}

</script>

</body>
</html>
