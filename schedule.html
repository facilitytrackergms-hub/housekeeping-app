<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .header { text-align: center; margin-bottom: 30px; }
    h2 { color: #1847d1; margin-bottom: 5px; }
    .tag { background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 14px; }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .area-name { font-size: 20px; font-weight: bold; color: #333; }
    .start-btn { background: #2e5cff; color: white; border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; cursor: pointer; }
    .logout { display: block; margin: 40px auto; color: #666; border: none; background: none; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="nameDisplay">Loading...</h2>
    <span id="assignDisplay" class="tag">---</span>
  </div>
  <div id="list"></div>
  <button class="logout" onclick="sessionStorage.clear(); window.location.href='index.html'">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));
    if (!user) window.location.href = "index.html";

    document.getElementById("nameDisplay").innerText = `Hi, ${user.firstName}`;
    document.getElementById("assignDisplay").innerText = user.assignment;

    async function loadTasks() {
      const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
      const mode = modeSnap.exists() ? modeSnap.data().value : "two";

      let coll = "";
      if (user.assignment === "Laundry") coll = "Laundry";
      else if (mode === "three") {
        if (user.assignment === "HK1") coll = "1stfloor";
        if (user.assignment === "HK2") coll = "2ndFloor";
        if (user.assignment === "HK3") coll = "3rdFloor";
      } else {
        if (user.assignment === "HK1") coll = "HK1";
        if (user.assignment === "HK2") coll = "HK2";
      }

      if (!coll) return;

      const day = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date());
      const q = query(collection(db, coll), where("Schedule", "in", ["Daily", day]));
      const snap = await getDocs(q);
      
      const areas = [...new Set(snap.docs.map(d => d.data().Area))];
      const listDiv = document.getElementById("list");
      
      areas.forEach(a => {
        listDiv.innerHTML += `
          <div class="card">
            <div class="area-name">${a}</div>
            <button class="start-btn" onclick="goTo('${a}', '${coll}')">START</button>
          </div>`;
      });
    }

    window.goTo = function(area, source) {
      sessionStorage.setItem("selectedDailyTask", JSON.stringify({ assignment: area, source: source }));
      window.location.href = "task-details.html";
    };

    loadTasks();
  </script>
</body>
</html>
