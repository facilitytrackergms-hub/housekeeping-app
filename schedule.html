<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px 10px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 30px;
    }

    h3 {
      font-size: 24px;
    }

    input, select, textarea {
      width: 100%;
      font-size: 22px;
      padding: 14px;
      margin: 10px 0 18px;
      border-radius: 14px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 90px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1976d2;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 16px;
      margin: 8px 0;
    }

    .green {
      background: #2e7d32;
      color: white;
    }

    .yellow {
      background: #f9a825;
      color: black;
    }

    .red {
      background: #c62828;
      color: white;
    }

    .back {
      background: #555;
      color: white;
    }

    .hidden {
      display: none !important;
    }

    .hidden-date {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .date-row h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .date-change-btn {
      width: auto;
      font-size: 15px;
      padding: 10px 12px;
      margin: 0;
      border-radius: 10px;
      background: #555;
      white-space: nowrap;
    }

    .check-row {
      font-size: 22px;
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    .check-row input {
      width: auto;
      transform: scale(1.5);
      margin-right: 12px;
    }

    #message {
      text-align: center;
      font-size: 18px;
    }

    .modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal-box {
      background: white;
      width: 90%;
      max-width: 380px;
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.35);
    }

    .modal-box h3 {
      font-size: 26px;
      margin-bottom: 15px;
    }

    .modal-box p {
      font-size: 20px;
    }

    .modal-row {
      display: flex;
      gap: 10px;
    }

    .modal-row button {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="card">

  <div id="assignmentScreen">
    <h2 id="employeeName"></h2>
    <h3>Select Assignment</h3>

    <button onclick="chooseAssignment('Housekeeper 1')">Housekeeper 1</button>
    <button onclick="chooseAssignment('Housekeeper 2')">Housekeeper 2</button>
    <button onclick="chooseAssignment('Laundry')">Laundry</button>
    <button class="back" onclick="logout()">LOGOUT</button>
  </div>

<div id="dateScreen" class="hidden">
  <h2 id="dateTitle"></h2>

  <h3>Select Work Date</h3>

  <input type="date" id="workDate">

  <button onclick="loadAssignmentTasks()">
    CONTINUE
  </button>

  <button class="back" onclick="backToCategories()">
    BACK
  </button>
</div>

  <div id="categoryScreen" class="hidden">
    <h2 id="assignmentTitle"></h2>

    <div class="date-row">
      <h3 id="workDateTitle"></h3>

      <button class="date-change-btn" onclick="openCalendar()">CHANGE DATE</button>

      <input
        type="date"
        id="quickDatePicker"
        class="hidden-date"
        onchange="changeWorkDateFromCalendar()"
      >
    </div>

    <div id="categoryButtons"></div>
  </div>

  <div id="areaScreen" class="hidden">
    <h2 id="areaTitle"></h2>
    <h3 id="areaDateTitle"></h3>

    <button id="completeAllCategoryButton" class="green" onclick="completeWholeCategory()">
      COMPLETE ALL
    </button>

    <div id="areaButtons"></div>

    <button class="back" onclick="backToCategories()">BACK</button>
  </div>

  <div id="taskScreen" class="hidden">
    <h2 id="taskTitle"></h2>
    <h3 id="taskDateTitle"></h3>

    <button class="green" onclick="completeAllTasks()">ALL TASKS COMPLETED</button>
    <button class="red" onclick="showIncompleteChecklist()">NO - SOMETHING NOT DONE</button>

    <div id="checklistBox" class="hidden">
      <h3>Select tasks NOT completed</h3>
      <div id="checklist"></div>

      <h3>Reason</h3>
      <select id="reason">
        <option value="">Select reason</option>
        <option>Resident in room</option>
        <option>Resident refused</option>
        <option>Room occupied</option>
        <option>Supplies missing</option>
        <option>Maintenance issue</option>
        <option>Not enough time</option>
        <option>Other</option>
      </select>

      <textarea id="note" placeholder="Other reason / notes"></textarea>

      <button onclick="submitIncomplete()">SAVE</button>
    </div>

    <p id="message"></p>

    <button class="back" onclick="backToAreas()">BACK</button>
  </div>

</div>

<div id="confirmModal" class="modal-bg hidden">
  <div class="modal-box">
    <h3>Confirm</h3>
    <p id="confirmText"></p>

    <input type="password" id="confirmPin" placeholder="Enter PIN to confirm">

    <p id="confirmPinMessage"></p>

    <div class="modal-row">
      <button class="green" onclick="confirmYes()">YES</button>
      <button class="back" onclick="confirmNo()">CANCEL</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycby4kZ1JPlMrjzvjHSQxgpuZXl2zZ9jekz8j-tasSjS84uRS5iCx0UReV0b0s4tSGea-/exec";

let currentEmployee = localStorage.getItem("employeeName") || "";
let currentEmployeeId = localStorage.getItem("employeeId") || "";
let currentAssignment = "";
let currentWorkDateValue = "";
let currentWorkDateDisplay = "";
let currentWorkDayName = "";
let allTasks = [];
let progressData = {};
let currentCategory = "";
let currentArea = "";
let currentTaskList = [];
let pendingCategoryTasks = [];

if (!currentEmployee || !currentEmployeeId) {
  window.location.href = "index.html";
}

document.getElementById("employeeName").innerText = currentEmployee;

function apiCall(payload) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  }).then(response => response.json());
}

function chooseAssignment(assignment) {
  currentAssignment = assignment;
  currentCategory = "";
  currentArea = "";
  currentTaskList = [];

  setDefaultDate();

  loadAssignmentTasks();
}

function setDefaultDate() {
  const input = document.getElementById("workDate");

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");

  input.value = yyyy + "-" + mm + "-" + dd;
}

function loadAssignmentTasks() {
  currentWorkDateValue = document.getElementById("workDate").value;

  if (!currentWorkDateValue) {
    alert("Select a work date.");
    return;
  }

  apiCall({
    action: "getAssignmentTasks",
    assignment: currentAssignment,
    employeeName: currentEmployee,
    workDateValue: currentWorkDateValue
  })
  .then(function(result) {
    if (!result.success) {
      alert(result.message);
      return;
    }

    allTasks = result.tasks;
    progressData = result.progress || {};
    currentWorkDateDisplay = result.workDate;
    currentWorkDayName = result.workDayName;

    document.getElementById("assignmentTitle").innerText = currentAssignment;
    document.getElementById("workDateTitle").innerText =
      currentWorkDateDisplay + " - " + currentWorkDayName;

    drawCategories();
    showScreen("categoryScreen");
  })
  .catch(function() {
    alert("Connection error.");
  });
}

function openCalendar() {
  const picker = document.getElementById("quickDatePicker");

  picker.value = currentWorkDateValue;

  if (picker.showPicker) {
    picker.showPicker();
  } else {
    picker.click();
  }
}

function changeWorkDateFromCalendar() {
  const picker = document.getElementById("quickDatePicker");

  if (!picker.value) return;

  currentWorkDateValue = picker.value;

  document.getElementById("workDate").value = picker.value;

  loadAssignmentTasks();
}

function drawCategories() {
  const box = document.getElementById("categoryButtons");
  box.innerHTML = "";

  let categories = currentAssignment === "Laundry"
    ? ["Weekly Laundry", "Daily Laundry Check"]
    : ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

  categories.forEach(function(cat) {
    const categoryTasks = allTasks.filter(t => t.category === cat);
    const total = categoryTasks.length;

    if (total === 0) return;

    const counts = getTaskCounts(categoryTasks);

    const btn = document.createElement("button");

    if (counts.incomplete > 0) {
      btn.innerText = cat + " " + counts.completed + "/" + total + " - ISSUE";
    } else {
      btn.innerText = cat + " " + counts.completed + "/" + total;
    }

    btn.className = getProgressColor(counts.completed, counts.incomplete, total);

    btn.onclick = function() {
      selectCategory(cat);
    };

    box.appendChild(btn);
  });
}

function selectCategory(category) {
  currentCategory = category;
  drawAreaButtons(category);
  showScreen("areaScreen");
}

function drawAreaButtons(category) {
  const box = document.getElementById("areaButtons");
  box.innerHTML = "";

  document.getElementById("areaTitle").innerText = category;
  document.getElementById("areaDateTitle").innerText =
    currentWorkDateDisplay + " - " + currentWorkDayName;

  document.getElementById("completeAllCategoryButton").innerText =
    "COMPLETE ALL " + category.toUpperCase();

  const filtered = allTasks.filter(function(t) {
    return t.category === category;
  });

  const areas = [...new Set(filtered.map(t => t.area))];

  areas.forEach(function(area) {
    const areaTasks = filtered.filter(t => t.area === area);
    const counts = getTaskCounts(areaTasks);
    const totalCount = areaTasks.length;

    const btn = document.createElement("button");

    if (counts.incomplete > 0) {
      btn.innerText = area + " " + counts.completed + "/" + totalCount + " - ISSUE";
    } else {
      btn.innerText = area + " " + counts.completed + "/" + totalCount;
    }

    btn.className = getProgressColor(counts.completed, counts.incomplete, totalCount);

    btn.onclick = function() {
      openTaskGroup(area, category);
    };

    box.appendChild(btn);
  });
}

function getTaskCounts(tasks) {
  let completed = 0;
  let incomplete = 0;
  let untouched = 0;

  tasks.forEach(function(task) {
    const areaProgress = progressData[task.area] || {};
    const status = areaProgress[task.task] || "";

    if (status === "Completed") {
      completed++;
    } else if (status === "Incomplete") {
      incomplete++;
    } else {
      untouched++;
    }
  });

  return {
    completed: completed,
    incomplete: incomplete,
    untouched: untouched
  };
}

function getProgressColor(completed, incomplete, total) {
  if (incomplete > 0) return "yellow";
  if (completed === 0) return "red";
  if (completed >= total) return "green";
  return "yellow";
}

function openTaskGroup(area, category) {
  currentArea = area;

  currentTaskList = allTasks.filter(function(t) {
    return t.area === area && t.category === category;
  });

  document.getElementById("taskTitle").innerText = area;
  document.getElementById("taskDateTitle").innerText =
    currentWorkDateDisplay + " - " + currentWorkDayName;

  document.getElementById("message").innerText = "";
  document.getElementById("reason").value = "";
  document.getElementById("note").value = "";
  document.getElementById("checklistBox").classList.add("hidden");

  buildChecklist();
  showScreen("taskScreen");
}

function buildChecklist() {
  const box = document.getElementById("checklist");
  box.innerHTML = "";

  currentTaskList.forEach(function(task, index) {
    const areaProgress = progressData[task.area] || {};
    const status = areaProgress[task.task] || "";

    const div = document.createElement("div");
    div.className = "check-row";

    div.innerHTML =
      '<input type="checkbox" id="task_' + index + '">' +
      task.task +
      (status === "Completed" ? " ✅" : "");

    box.appendChild(div);
  });
}

function completeAllTasks() {
  const saves = [];

  currentTaskList.forEach(function(task) {
    updateLocalProgress(task, "Completed");
    saves.push(saveLog(task, "Completed", ""));
  });

  Promise.all(saves).then(function() {
    drawAreaButtons(currentCategory);
    showScreen("areaScreen");
  });
}

function showIncompleteChecklist() {
  document.getElementById("checklistBox").classList.remove("hidden");
}

function submitIncomplete() {
  const reason = document.getElementById("reason").value;
  const note = document.getElementById("note").value;

  if (!reason) {
    alert("Select a reason.");
    return;
  }

  const finalReason = note ? reason + " - " + note : reason;
  const saves = [];

  currentTaskList.forEach(function(task, index) {
    const checked = document.getElementById("task_" + index).checked;

    if (checked) {
      updateLocalProgress(task, "Incomplete");
      saves.push(saveLog(task, "Incomplete", finalReason));
    } else {
      updateLocalProgress(task, "Completed");
      saves.push(saveLog(task, "Completed", ""));
    }
  });

  Promise.all(saves).then(function() {
    drawAreaButtons(currentCategory);
    showScreen("areaScreen");
  });
}

function completeWholeCategory() {
  pendingCategoryTasks = allTasks.filter(function(t) {
    return t.category === currentCategory;
  });

  if (pendingCategoryTasks.length === 0) {
    alert("No tasks in this category.");
    return;
  }

  document.getElementById("confirmText").innerText =
    "Mark ALL " + currentCategory + " tasks completed for " +
    currentWorkDateDisplay + "?";

  document.getElementById("confirmPin").value = "";
  document.getElementById("confirmPinMessage").innerText = "";

  document.getElementById("confirmModal").classList.remove("hidden");
}

function confirmYes() {
  const pin = document.getElementById("confirmPin").value.trim();

  if (!pin) {
    document.getElementById("confirmPinMessage").innerText = "Enter PIN";
    return;
  }

  document.getElementById("confirmPinMessage").innerText = "Checking PIN...";

  apiCall({
    action: "validateEmployeePin",
    employeeId: currentEmployeeId,
    pin: pin
  })
  .then(function(result) {
    if (!result.success) {
      document.getElementById("confirmPinMessage").innerText = "Wrong PIN";
      return;
    }

    const saves = [];

    pendingCategoryTasks.forEach(function(task) {
      updateLocalProgress(task, "Completed");
      saves.push(saveLog(task, "Completed", ""));
    });

    Promise.all(saves).then(function() {
      document.getElementById("confirmModal").classList.add("hidden");
      drawAreaButtons(currentCategory);
    });
  })
  .catch(function() {
    document.getElementById("confirmPinMessage").innerText = "Connection error";
  });
}

function confirmNo() {
  document.getElementById("confirmPin").value = "";
  document.getElementById("confirmPinMessage").innerText = "";
  document.getElementById("confirmModal").classList.add("hidden");
}

function updateLocalProgress(task, status) {
  if (!progressData[task.area]) {
    progressData[task.area] = {};
  }

  progressData[task.area][task.task] = status;
}

function saveLog(task, status, reason) {
  return apiCall({
    action: "saveTaskLog",
    workDate: currentWorkDateDisplay,
    employeeName: currentEmployee,
    assignment: currentAssignment,
    area: task.area,
    task: task.task,
    schedule: task.schedule,
    status: status,
    reason: reason || ""
  });
}

function backToAssignments() {
  showScreen("assignmentScreen");
}

function backToDate() {
  showScreen("dateScreen");
}

function backToCategories() {
  drawCategories();
  showScreen("categoryScreen");
}

function backToAreas() {
  drawAreaButtons(currentCategory);
  showScreen("areaScreen");
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

function showScreen(id) {
  const screens = [
    "assignmentScreen",
    "dateScreen",
    "categoryScreen",
    "areaScreen",
    "taskScreen"
  ];

  screens.forEach(function(screen) {
    document.getElementById(screen).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
