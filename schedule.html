<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin: auto; position: relative; min-height: 400px; }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    h2, h3 { text-align: center; margin: 5px 0; }
    
    button { width: 100%; border: none; border-radius: 15px; background: #1976d2; color: white; font-size: 18px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.98); }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .room-btn { 
        min-height: 75px !important; 
        font-size: 16px !important; 
        padding: 8px !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 !important; 
        line-height: 1.2;
    }
    
    /* PROGRESS COLORS */
    .status-red { background: #c62828 !important; }
    .status-yellow { background: #fbc02d !important; color: black !important; }
    .status-green { background: #2e7d32 !important; }

    .back { background: #555 !important; }
    .hidden { display: none !important; }
    .top-box { border: 2px solid #e0e0e0; border-radius: 20px; padding: 15px; margin-bottom: 15px; background: #fafafa; text-align: center; }
    .date-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
    .date-btn { width: auto; padding: 10px 15px; background: #555; font-size: 16px; }
    
    #categoryButtons button { min-height: 100px; font-size: 17px; }
    select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #1976d2; margin-top: 10px; font-size: 16px; }
  </style>
</head>
<body>

<div class="card">
  <div id="view2">
    <div class="view-tag">Schedule Dashboard</div>
    <div class="top-box">
      <div class="date-row">
        <button class="date-btn" onclick="adjustDate(-1)">◀</button>
        <h3 id="dateDisplay">Today</h3>
        <button class="date-btn" onclick="adjustDate(1)">▶</button>
      </div>
      <h2 id="empName">Hi, ---</h2>
      <h3 id="assignDisplay" style="color:#1976d2; font-weight: bold;">---</h3>
    </div>
    <div id="categoryButtons" class="grid-2"></div>
    <button class="back" onclick="location.href='index.html'" style="margin-top:20px;">LOGOUT</button>
  </div>

  <div id="view3" class="hidden">
    <div class="view-tag">Area Selection</div>
    <h2 id="catTitle" style="color:#1976d2; margin-bottom: 15px;">Category</h2>
    <div id="areaButtons" class="grid-2"></div>
    <button class="back" onclick="showV2()" style="margin-top:20px;">BACK</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = JSON.parse(sessionStorage.getItem("currentEmployee"));
  if(!session) { window.location.href = "index.html"; }

  let currentAssign = session.assignment; 
  let workDate = new Date();
  let matchedAreas = [];

  /* --- 01. OPTIMIZED DATA LOADER --- */
  async function loadData() {
    const dayName = workDate.toLocaleDateString('en-US', { weekday: 'long' });
    const today = dayName.toLowerCase().trim();
    
    document.getElementById("dateDisplay").innerText = dayName;
    document.getElementById("empName").innerText = "Hi, " + (session.firstName || "User");
    document.getElementById("assignDisplay").innerText = currentAssign;

    document.getElementById("categoryButtons").innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Syncing Cloud Data...</p>";

    // 1. Get Mode and Rooms
    const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
    const mode = (modeSnap.exists() ? (modeSnap.data().settingValue || "two") : "two").toLowerCase().trim();
    
    const targetField = (mode === "three") ? "Floor" : "Mode";
    const q = query(collection(db, "areas"), where(targetField, "==", currentAssign));
    const snap = await getDocs(q);
    
    matchedAreas = [];
    const workIds = [];
    snap.forEach(d => {
        const data = d.data();
        const dbDay = String(data["Schedule"] || "").toLowerCase().trim();
        if(dbDay === "daily" || dbDay === today) {
            matchedAreas.push(data);
            workIds.push(data.workId);
        }
    });

    // 2. Fetch History & Tasks in one shot
    const [historySnap, taskSnap] = await Promise.all([
        getDocs(collection(db, "task_history")),
        getDocs(query(collection(db, "tasks"), where("workId", "in", workIds.slice(0, 10))))
    ]);

    window.historySet = new Set();
    historySnap.forEach(doc => window.historySet.add(doc.id));

    window.taskRegistry = {}; 
    taskSnap.forEach(doc => {
        const t = doc.data();
        if(!window.taskRegistry[t.workId]) window.taskRegistry[t.workId] = [];
        window.taskRegistry[t.workId].push(doc.id);
    });

    drawCategories();
  }

  /* --- 02. CATEGORY DRAW --- */
  window.drawCategories = function() {
    const box = document.getElementById("categoryButtons");
    const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];
    box.innerHTML = "";

    cats.forEach(cat => {
        const filtered = matchedAreas.filter(a => String(a.Category || "").toLowerCase() === cat.toLowerCase());
        if (filtered.length === 0) return;

        let completedRooms = 0;
        filtered.forEach(area => {
            const roomTasks = window.taskRegistry[area.workId] || [];
            const doneTasks = roomTasks.filter(id => window.historySet.has(`${area.workId}_${id}`));
            if (roomTasks.length > 0 && doneTasks.length === roomTasks.length) completedRooms++;
        });

        const btn = document.createElement("button");
        btn.className = completedRooms === 0 ? "status-red" : (completedRooms < filtered.length ? "status-yellow" : "status-green");
        btn.innerText = `${cat} (${completedRooms}/${filtered.length})`;
        btn.onclick = () => showV3(cat);
        box.appendChild(btn);
    });
  }

  /* --- 03. ROOM SELECTION --- */
  window.showV3 = function(cat) {
    document.getElementById("view2").classList.add("hidden");
    document.getElementById("view3").classList.remove("hidden");
    document.getElementById("catTitle").innerText = cat;
    const box = document.getElementById("areaButtons");
    box.innerHTML = "";

    const filtered = matchedAreas.filter(a => String(a.Category || "").toLowerCase() === cat.toLowerCase());
    
    filtered.forEach(area => {
        const roomTasks = window.taskRegistry[area.workId] || [];
        const doneTasks = roomTasks.filter(id => window.historySet.has(`${area.workId}_${id}`));
        const total = roomTasks.length;
        const completed = doneTasks.length;

        const btn = document.createElement("button");
        btn.className = "room-btn " + (total === 0 ? "back" : (completed === 0 ? "status-red" : (completed < total ? "status-yellow" : "status-green")));
        btn.innerHTML = `<div>${area.Area}</div><div class="count-tag">${completed}/${total} Tasks</div>`;
        btn.onclick = () => {
            sessionStorage.setItem("selectedWork", JSON.stringify({ workId: area.workId, areaName: area.Area }));
            location.href = "tasks.html";
        };
        box.appendChild(btn);
    });
  }

  window.showV2 = () => {
    document.getElementById("view3").classList.add("hidden");
    document.getElementById("view2").classList.remove("hidden");
  };

  window.adjustDate = (days) => {
    workDate.setDate(workDate.getDate() + days);
    loadData();
  };

  loadData();
</script>
</body>
</html>
