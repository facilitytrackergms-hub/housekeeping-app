<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housekeeping Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .header { text-align: center; margin-bottom: 20px; }
    .task-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .task-name { font-size: 20px; font-weight: bold; color: #1847d1; }
    .status-btn { margin-top: 10px; padding: 10px; width: 100%; border-radius: 10px; border: none; background: #2e5cff; color: white; font-weight: bold; }
    .completed { background: #1c7a32 !; }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="welcomeMsg">Loading Schedule...</h2>
  </div>
  <div id="scheduleContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));
    if (!user) window.location.href = "index.html";

    document.getElementById("welcomeMsg").innerText = `Hi, ${user.firstName}`;

    async function loadTasks() {
      const q = query(collection(db, "tasks"), where("assignment", "==", user.assignment));
      const snap = await getDocs(q);
      const container = document.getElementById("scheduleContainer");
      
      snap.forEach(doc => {
        const task = doc.data();
        container.innerHTML += `
          <div class="task-card">
            <div class="task-name">${task.taskName || 'Task'}</div>
            <button class="status-btn" onclick="alert('Logged!')">MARK COMPLETE</button>
          </div>`;
      });
    }
    loadTasks();
  </script>
</body>
</html>
