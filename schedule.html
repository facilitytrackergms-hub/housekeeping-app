<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin: auto; position: relative; min-height: 400px; }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    h2, h3 { text-align: center; margin: 5px 0; }
    
    button { width: 100%; border: none; border-radius: 15px; background: #1976d2; color: white; font-size: 18px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.98); }
    
    /* SMALLER ROOM BUTTONS GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    .room-btn { 
        min-height: 70px !important; 
        font-size: 16px !important; 
        padding: 8px !important;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0 !important; 
        line-height: 1.2;
    }
    
    .count-tag { font-size: 12px; margin-top: 4px; opacity: 0.9; font-weight: normal; }

    /* LOGIC COLORS */
    .status-red { background: #c62828 !important; }    /* Not Started */
    .status-yellow { background: #fbc02d !important; color: black !important; } /* In Progress */
    .status-green { background: #2e7d32 !important; }  /* Finished */

    .back { background: #555 !important; }
    .hidden { display: none !important; }
    .top-box { border: 2px solid #e0e0e0; border-radius: 20px; padding: 15px; margin-bottom: 15px; background: #fafafa; text-align: center; }
    .date-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
    .date-btn { width: auto; padding: 10px 15px; background: #555; font-size: 16px; }
    
    #categoryButtons button { min-height: 100px; font-size: 17px; }
    select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #1976d2; margin-top: 10px; font-size: 16px; }
    .empty-msg { text-align: center; color: #666; padding: 20px; font-style: italic; grid-column: 1 / -1; }
  </style>
</head>
<body>

<div class="card">
  <div id="view2">
    <div class="view-tag">Schedule Dashboard</div>
    <div class="top-box">
      <div class="date-row">
        <button class="date-btn" onclick="adjustDate(-1)">◀</button>
        <h3 id="dateDisplay" style="min-width: 140px;">Today</h3>
        <button class="date-btn" onclick="adjustDate(1)">▶</button>
      </div>
      <h2 id="empName">Hi, ---</h2>
      <h3 id="assignDisplay" style="color:#1976d2; font-weight: bold;">---</h3>
      <button id="coverBtn" style="font-size:13px; padding:10px; background:#666;" onclick="toggleCover()">CHANGE ASSIGNMENT</button>
      <div id="coverBox" class="hidden">
        <select id="assignSelect" onchange="updateAssignment(this.value)"></select>
      </div>
    </div>
    <div id="categoryButtons" class="grid-2"></div>
    <button class="back" onclick="logout()" style="margin-top:20px;">LOGOUT</button>
  </div>

  <div id="view3" class="hidden">
    <div class="view-tag">Area Selection</div>
    <h2 id="catTitle" style="color:#1976d2; margin-bottom: 15px;">Category</h2>
    <div id="areaButtons" class="grid-2"></div>
    <button class="back" onclick="showV2()" style="margin-top:20px; padding: 18px;">BACK</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = JSON.parse(sessionStorage.getItem("currentEmployee"));
  if(!session) { window.location.href = "index.html"; }

  let currentAssign = session.assignment; 
  let workDate = new Date();
  let matchedAreas = [];

  async function loadData() {
    const dayName = workDate.toLocaleDateString('en-US', { weekday: 'long' });
    const today = dayName.toLowerCase().trim();
    
    document.getElementById("dateDisplay").innerText = dayName;
    document.getElementById("empName").innerText = "Hi, " + (session.firstName || "User");
    document.getElementById("assignDisplay").innerText = currentAssign;

    const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
    const mode = (modeSnap.exists() ? (modeSnap.data().settingValue || modeSnap.data().value) : "two").toLowerCase().trim();
    
    const select = document.getElementById("assignSelect");
    const myAssignLower = currentAssign.toLowerCase().trim();
    let fullList = (mode === "three") ? ["1stfloor", "2ndFloor", "3rdFloor", "Laundry"] : ["HK1", "HK2", "Laundry"];
    const filtered = fullList.filter(item => item.toLowerCase() !== myAssignLower);
    
    select.innerHTML = '<option value="" disabled selected>Switch Schedule...</option>';
    filtered.forEach(sched => {
      const option = document.createElement("option");
      option.value = sched;
      option.textContent = sched;
      select.appendChild(option);
    });

    const targetField = (mode === "three") ? "Floor" : "Mode";
    const q = query(collection(db, "areas"), where(targetField, "==", currentAssign));
    const snap = await getDocs(q);
    
    matchedAreas = [];
    snap.forEach(d => {
      const data = d.data();
      const dbDay = String(data["Schedule"] || "").toLowerCase().trim();
      if(dbDay === "daily" || dbDay === today) {
        matchedAreas.push(data);
      }
    });

    // ⚡ SPEED OPTIMIZATION: Fetch all tasks concurrently before drawing buttons
    document.getElementById("categoryButtons").innerHTML = "<p style='text-align:center; font-weight:bold; color:#1976d2; grid-column: 1/-1;'>Loading Tasks...</p>";

    const taskPromises = matchedAreas.map(async (area) => {
      const cleanId = String(area.workId).toLowerCase().trim();
      const tQuery = query(collection(db, "tasks"), where("workId", "==", cleanId));
      const tSnap = await getDocs(tQuery);
      
      let total = tSnap.size;
      let completed = 0;
      
      tSnap.forEach(doc => {
        if (doc.data().isDone === true) {
          completed++;
        }
      });

      // Save counts into memory for instant access later
      area.taskTotal = total;
      area.taskCompleted = completed;
      return area;
    });

    // Wait for all task counts to finish loading
    await Promise.all(taskPromises);

    // Draw UI instantly from memory
    drawCategories();
  }

  window.drawCategories = function() {
    const box = document.getElementById("categoryButtons");
    const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

    let totalFound = 0;
    const tempContainer = document.createElement("div");

    for (const cat of cats) {
      const catLower = cat.toLowerCase().trim();
      const filtered = matchedAreas.filter(a => String(a["Category"] || "").toLowerCase().trim() === catLower);
      
      const uniqueRooms = [...new Set(filtered.map(a => a["Area"]))];
      const totalRooms = uniqueRooms.length;
      totalFound += totalRooms;
      
      if (totalRooms > 0) {
        let completedRooms = 0;
        
        // Check memory for every room in this category
        for (const areaName of uniqueRooms) {
          const areaObj = filtered.find(a => a["Area"] === areaName);
          
          if (areaObj.taskTotal > 0 && areaObj.taskCompleted === areaObj.taskTotal) {
            completedRooms++;
          }
        }

        const btn = document.createElement("button");
        if (completedRooms === 0) btn.className = "status-red";
        else if (completedRooms < totalRooms) btn.className = "status-yellow";
        else btn.className = "status-green";

        btn.innerText = `${cat} (${completedRooms}/${totalRooms})`;
        btn.onclick = () => showV3(cat);
        tempContainer.appendChild(btn);
      }
    }

    box.innerHTML = "";
    if (totalFound === 0) {
      box.innerHTML = `<div class="empty-msg">No rooms found for ${currentAssign}.</div>`;
    } else {
      while(tempContainer.firstChild) { box.appendChild(tempContainer.firstChild); }
    }
  }

  window.showV3 = function(cat) {
    document.getElementById("view2").classList.add("hidden");
    document.getElementById("view3").classList.remove("hidden");
    document.getElementById("catTitle").innerText = cat;
    const box = document.getElementById("areaButtons");
    box.innerHTML = "";
    
    const filtered = matchedAreas.filter(a => String(a["Category"] || "").toLowerCase().trim() === cat.toLowerCase());
    const seen = new Set();

    for (const area of filtered) {
      if (!seen.has(area["Area"])) {
        seen.add(area["Area"]);
        
        // Grab pre-calculated counts from memory
        const total = area.taskTotal || 0;
        const completed = area.taskCompleted || 0;

        const btn = document.createElement("button");
        
        if (total === 0) btn.className = "room-btn back"; 
        else if (completed === 0) btn.className = "room-btn status-red";
        else if (completed < total) btn.className = "room-btn status-yellow";
        else btn.className = "room-btn status-green";

        btn.innerHTML = `
          <div style="font-weight:bold;">${area["Area"]}</div>
          <div class="count-tag">${completed} / ${total} DONE</div>
        `;
        
        btn.onclick = () => {
          const cleanId = String(area.workId).toLowerCase().trim();
          sessionStorage.setItem("selectedWork", JSON.stringify({ 
              workId: cleanId, 
              areaName: area["Area"] 
          }));
          window.location.href = "tasks.html"; 
        };
        box.appendChild(btn);
      }
    }
  }

  window.adjustDate = (n) => { workDate.setDate(workDate.getDate() + n); loadData(); };
  window.toggleCover = () => document.getElementById("coverBox").classList.toggle("hidden");
  window.updateAssignment = (val) => { 
    if(!val) return; 
    currentAssign = val; 
    session.assignment = val;
    sessionStorage.setItem("currentEmployee", JSON.stringify(session));
    loadData(); 
    document.getElementById("coverBox").classList.add("hidden"); 
  };
  window.showV2 = () => { document.getElementById("view2").classList.remove("hidden"); document.getElementById("view3").classList.add("hidden"); };
  window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };

  loadData();
</script>
</body>
</html>
