<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    
    /* 01 - HEADER SECTION */
    .header { 
      text-align: center; 
      margin-bottom: 20px; 
      background: #1847d1; 
      color: white; 
      padding: 25px 20px; 
      border-radius: 0 0 25px 25px; 
      margin: -20px -20px 20px -20px; 
      position: relative; 
    }
    
    .view-label { 
      position: absolute; 
      top: 10px; 
      right: 15px; 
      font-weight: bold; 
      color: rgba(255,255,255,0.6); 
      font-size: 11px; 
    }
    
    .tag { background: rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
    
    /* 02 - COVER BUTTON & DROPDOWN */
    .cover-btn {
      background: #ffffff;
      color: #1847d1;
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      font-weight: bold;
      font-size: 12px;
      margin-top: 5px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #assignmentSelect {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      width: 90%;
      font-size: 16px;
      border: 2px solid #fff;
      outline: none;
    }

    /* 03 - CATEGORY GRID */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .cat-btn { background: white; border-radius: 15px; padding: 30px 10px; text-align: center; font-weight: bold; color: #1847d1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: none; font-size: 16px; }
    .cat-btn:active { background: #1847d1; color: white; }

    /* 04 - AREA LIST (V3) */
    .area-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #d9534f; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .start-btn { background: #2e5cff; color: white; border: none; border-radius: 10px; padding: 12px 20px; font-weight: bold; cursor: pointer; }
    .back-btn { background: #666; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <div id="vNum" class="view-label">V2 schedule.html</div>
    <h2 id="nameDisplay" style="margin: 0 0 5px 0;">Hi, ---</h2>
    <span id="assignDisplay" class="tag">---</span>
    <br>
    <button class="cover-btn" onclick="toggleCoverDropdown()">COVER ANOTHER ASSIGNMENT</button>
    
    <div id="coverDropdown" style="display:none;">
       <select id="assignmentSelect" onchange="changeAssignment(this.value)">
          <option value="">Loading Crew Members...</option>
       </select>
    </div>
  </div>

  <div id="view-categories">
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div id="view-areas" style="display:none;">
    <h3 id="currentCat" style="color:#1847d1; text-align: center;">Category</h3>
    <div id="areaList"></div>
    <button class="back-btn" onclick="showCategories()">BACK TO CATEGORIES</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));

    if (!user) window.location.href = "index.html";

    document.getElementById("nameDisplay").innerText = `Hi, ${user.firstName}`;
    document.getElementById("assignDisplay").innerText = user.assignment;

    /* 05 - CATEGORY LOGIC */
    function init() {
      const grid = document.getElementById("catGrid");
      const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];
      grid.innerHTML = cats.map(cat => `
        <button class="cat-btn" onclick="loadAreas('${cat}')">${cat}</button>
      `).join('');
    }

    /* 06 - COVER DROPDOWN LOGIC */
    window.toggleCoverDropdown = async function() {
      const dd = document.getElementById("coverDropdown");
      const select = document.getElementById("assignmentSelect");
      if (dd.style.display === "none") {
        dd.style.display = "block";
        const q = query(collection(db, "employees"));
        const snap = await getDocs(q);
        select.innerHTML = '<option value="">Select Crew Member...</option>';
        snap.forEach(d => {
          const emp = d.data();
          if(emp.assignment) {
            select.innerHTML += `<option value="${emp.assignment}">${emp.firstName} (${emp.assignment})</option>`;
          }
        });
      } else {
        dd.style.display = "none";
      }
    }

    window.changeAssignment = function(newVal) {
      if(!newVal) return;
      user.assignment = newVal;
      sessionStorage.setItem("currentEmployee", JSON.stringify(user));
      location.reload();
    }

    /* 07 - AREA LIST LOGIC */
    window.loadAreas = async function(category) {
      document.getElementById("vNum").innerText = "V3 schedule.html";
      document.getElementById("view-categories").style.display = "none";
      document.getElementById("view-areas").style.display = "block";
      document.getElementById("currentCat").innerText = category;
      
      const q = query(collection(db, "areas"), where("category", "==", category));
      const snap = await getDocs(q);
      const list = document.getElementById("areaList");
      list.innerHTML = "";
      
      snap.forEach(d => {
        list.innerHTML += `
          <div class="area-card">
            <div style="font-weight:bold;">${d.data().areaName}</div>
            <button class="start-btn" onclick="openTask('${d.data().workId}', '${d.data().areaName}')">START</button>
          </div>`;
      });
    }

    window.showCategories = () => {
      document.getElementById("vNum").innerText = "V2 schedule.html";
      document.getElementById("view-categories").style.display = "block";
      document.getElementById("view-areas").style.display = "none";
    }

    window.openTask = (workId, areaName) => {
      sessionStorage.setItem("selectedWork", JSON.stringify({ workId, areaName }));
      window.location.href = "tasks.html";
    }

    init();
  </script>
</body>
</html>
