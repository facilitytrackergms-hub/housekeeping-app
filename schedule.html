<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 6px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      margin: 6px 0 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 60px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 17px;
      font-weight: bold;
      padding: 11px;
      margin: 4px 0;
      cursor: pointer;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    .top-info-box {
      border: 2px solid #e0e0e0;
      border-radius: 18px;
      padding: 10px;
      margin: 4px 0 10px;
      background: #fafafa;
    }

    .top-info-box h2 {
      font-size: 24px;
      margin-bottom: 0;
    }

    #coverScheduleSelect {
      margin: 6px 0 0;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      text-align-last: center;
      border-radius: 14px;
      padding: 8px;
      background: white;
    }

    .cover-btn {
      background: #1976d2 !important;
      font-size: 15px;
      padding: 9px;
      border-radius: 12px;
      margin: 8px 0 0;
    }

    #employeeName {
      display: none;
    }

    .date-section-box {
      border: 2px solid #e0e0e0;
      border-radius: 18px;
      padding: 10px;
      margin: 0 0 14px;
      background: #fafafa;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0;
    }

    .date-row h3 {
      margin: 0;
      font-size: 18px;
    }

    .date-change-btn {
      width: auto;
      font-size: 14px;
      padding: 10px 14px;
      margin: 0;
      border-radius: 14px;
      background: #555;
      white-space: nowrap;
    }

    .hidden-date {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .top-date-box {
      margin-bottom: 12px;
    }

    .category-section-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    #categoryButtons button {
      min-height: 92px;
      font-size: 20px;
      border-radius: 18px;
      margin: 0;
      padding: 14px 8px;
      line-height: 1.15;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      overflow: hidden;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 62px;
      font-size: 13px;
      padding: 6px 3px;
      line-height: 1.05;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin: 0;
      overflow: hidden;
    }

    .room-number {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.05;
      max-width: 100%;
      overflow: hidden;
      text-align: center;
      word-break: normal;
    }

    .room-counter {
      font-size: 13px;
      font-weight: bold;
      margin-top: 3px;
    }

    #checklist {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-top: 8px;
    }

    .check-row {
      font-size: 12px;
      padding: 5px 3px;
      border: 1px solid #ddd;
      border-radius: 10px;
      text-align: center;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

 .task-done {
  background: #e8f5e9;
  border-color: #2e7d32;
}

.task-missing {
  background: #ffebee;
  border-color: #c62828;
  color: #c62828;
  font-weight: bold;
}

.task-toggle-btn{
  width:100%;
  margin:0;
  font-size:15px;
  padding:10px 4px;
  border-radius:10px;
}

    #message {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 8px 0;
      color: #2e7d32;
    }

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .custom-modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
    }

    .custom-modal-box {
      position: relative;
      width: 90%;
      max-width: 380px;
      background: white;
      border-radius: 22px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.35);
    }

    .custom-modal-box h3 {
      font-size: 26px;
      margin-bottom: 18px;
      padding-right: 32px;
      padding-left: 32px;
    }

    .custom-modal-box p {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .custom-modal-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

.custom-modal-row button {
  width: 100%;
  font-size: 18px;
  padding: 16px 6px;
  border-radius: 16px;
  margin: 0;
}

.modal-close-x {
  position: absolute;
  top: 7px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #555;
  color: white;
  font-size: 18px;
  font-weight: bold;
  padding: 0;
  margin: 0;
  line-height: 28px;
}
  </style>
</head>

<body>

<div class="card">

  <div id="view2">

    <div class="top-info-box">
      <h2 id="employeeName">Welcome</h2>
      <h2 id="assignmentTitle"></h2>

      <button id="coverScheduleButton" class="cover-btn" onclick="showCoverScheduleDropdown()">
        COVER SCHEDULE
      </button>

      <select id="coverScheduleSelect" class="hidden" onchange="changeCoverSchedule()"></select>
    </div>

    <div class="date-section-box">
      <div class="date-row">
        <h3 id="workDateTitle"></h3>

        <button class="date-change-btn" onclick="openCalendar()">
          CHANGE DATE
        </button>

        <input
          type="date"
          id="quickDatePicker"
          class="hidden-date"
          onchange="changeWorkDateFromCalendar()"
        >
      </div>
    </div>

    <div id="categoryButtons" class="category-section-box"></div>

    <button class="back" onclick="logout()">LOGOUT</button>

  </div>

  <div id="view3" class="hidden">

    <div class="view-center">
      <div class="view-tag" id="areaViewTag">VIEW 3</div>
    </div>

    <div id="areaBigDatePickerBox" class="top-date-box hidden">
      <h3 id="areaDateTitle"></h3>

      <input
        type="date"
        id="bigDatePicker"
        onchange="changeWorkDateFromBigPicker()"
      >
    </div>

  

    <div id="areaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToCategories()">BACK</button>

  </div>

  <div id="view4" class="hidden">

    <div class="view-center">
      <div class="view-tag">VIEW 7</div>
    </div>

    <button id="allTasksButton" class="green" onclick="confirmCheckAllTasks()">
      ALL TASKS
    </button>

    <div id="checklistBox">

      <div id="checklist"></div>

      <div id="reasonBox" class="hidden">

        <h3>Reason</h3>

        <select id="reason">
          <option value="">Select reason</option>
          <option>Resident in room</option>
          <option>Resident refused</option>
          <option>Room occupied</option>
          <option>Supplies missing</option>
          <option>Maintenance issue</option>
          <option>Not enough time</option>
          <option>Other</option>
        </select>

        <textarea id="note" placeholder="Other reason / notes"></textarea>

      </div>

      <button class="green" onclick="saveTaskChecklist()">
        SAVE
      </button>

    </div>

    <p id="message"></p>

    <button class="back" onclick="backToAreas()">BACK</button>

  </div>

</div>

<div id="customConfirmModal" class="custom-modal-bg hidden">

  <div class="custom-modal-box">

    <button class="modal-close-x" onclick="customConfirmNo()">×</button>

    <h3 id="customConfirmTitle">Confirm</h3>

    <p id="customConfirmText"></p>

    <div class="custom-modal-row">
      <button id="customConfirmYesButton" class="green" onclick="customConfirmYes()">YES</button>
      <button id="customConfirmNoButton" class="back" onclick="customConfirmNo()">CANCEL</button>
    </div>

  </div>

</div>

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    writeBatch,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));
  const selectedDailyTask = JSON.parse(sessionStorage.getItem("selectedDailyTask"));

  if (!sessionData || !selectedDailyTask || !selectedDailyTask.assignment) {
    window.location.href = "index.html";
  }

  const employeeId =
    sessionData.employeeId ||
    sessionData.id ||
    sessionData.pin ||
    "";

  const employeeName =
    ((sessionData.firstName || "") + " " + (sessionData.lastName || "")).trim() ||
    sessionData.employeeName ||
    sessionData.name ||
    "Employee";

  let homeAssignment = selectedDailyTask.assignment;
  let currentAssignment = selectedDailyTask.assignment;
  let allAssignments = [];
  let currentWorkDateISO = getTodayISO();
  let currentWorkDateDisplay = "";
  let currentWorkDayName = "";

  let selectedCategory = "";
  let currentArea = "";

  let allTasksForDay = [];
  let progressData = {};
  let currentTaskList = [];
  let selectedDehumidifierPeriod = "";

  let customConfirmResolve = null;
  let customConfirmYesValue = true;
  let customConfirmNoValue = false;

  document.getElementById("employeeName").innerText =
    "Welcome, " + employeeName;

  document.getElementById("assignmentTitle").innerText =
    currentAssignment;

  startSchedule();

  function loadCoverScheduleDropdown(settingsDocs) {
    const select = document.getElementById("coverScheduleSelect");

    allAssignments = [];

    settingsDocs.forEach(function(docItem) {
      const data = docItem.data();

      Object.keys(data).forEach(function(key) {
        const value = String(data[key] || "").trim();

        if (!value) return;

        if (
          value.toLowerCase().includes("schedule") ||
          value.toLowerCase().includes("laundry")
        ) {
          if (!allAssignments.includes(value)) {
            allAssignments.push(value);
          }
        }
      });
    });

    if (!allAssignments.includes(homeAssignment)) {
      allAssignments.unshift(homeAssignment);
    }

    allAssignments.sort();

    select.innerHTML = "";

    allAssignments.forEach(function(assignment) {
      const option = document.createElement("option");
      option.value = assignment;
      option.innerText = assignment;

      if (assignment === currentAssignment) {
        option.selected = true;
      }

      select.appendChild(option);
    });
  }

  function showCoverScheduleDropdown() {
    document.getElementById("coverScheduleSelect").classList.remove("hidden");
    document.getElementById("coverScheduleButton").classList.add("hidden");
  }

  async function changeCoverSchedule() {
    const select = document.getElementById("coverScheduleSelect");

    if (!select.value) return;

    currentAssignment = select.value;
    selectedCategory = "";
    currentArea = "";

    await loadAssignmentTasks();

    drawCategories();
    showView(2);
  }

  async function startSchedule() {
    await loadAssignmentTasks();
    showView(2);
  }

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  function getTodayISO() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");

    return yyyy + "-" + mm + "-" + dd;
  }

  function updateDateDisplay() {
    const date = new Date(currentWorkDateISO + "T00:00:00");

    const weekdays = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];

    currentWorkDayName = weekdays[date.getDay()];

    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const yyyy = date.getFullYear();

    currentWorkDateDisplay = mm + "/" + dd + "/" + yyyy;
  }

  function openCalendar() {
    const picker = document.getElementById("quickDatePicker");

    picker.value = currentWorkDateISO;

    if (picker.showPicker) {
      picker.showPicker();
    } else {
      picker.click();
    }
  }

  async function changeWorkDateFromCalendar() {
    const picker = document.getElementById("quickDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAssignmentTasks();

    if (selectedCategory) {
      drawAreaButtons(selectedCategory);
      showView(3);
    } else {
      drawCategories();
      showView(2);
    }
  }

  async function changeWorkDateFromBigPicker() {
    const picker = document.getElementById("bigDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAssignmentTasks();

    if (selectedCategory) {
      drawAreaButtons(selectedCategory);
      showView(3);
    }
  }

  async function loadAssignmentTasks() {
    showLoading();

    updateDateDisplay();

    document.getElementById("assignmentTitle").innerText =
      currentAssignment === homeAssignment
        ? currentAssignment
        : currentAssignment + " COVER";

    const coverSelect = document.getElementById("coverScheduleSelect");
    if (coverSelect) {
      coverSelect.value = currentAssignment;
    }

    document.getElementById("workDateTitle").innerText =
      currentWorkDayName;

    document.getElementById("areaDateTitle").innerText =
      currentWorkDayName;

    const settingsSnap = await getDocs(
      query(collection(db, "settings"))
    );

    loadCoverScheduleDropdown(settingsSnap.docs);

    let housekeepingMode = "two";

    settingsSnap.docs.forEach(function(docItem) {
      const data = docItem.data();

      if (data.housekeepingMode) {
        housekeepingMode = String(data.housekeepingMode).toLowerCase();
      }
    });

    const areaQuery = query(
      collection(db, "areas")
    );

    const areaSnap = await getDocs(areaQuery);

    const allAssignmentTasks =
      areaSnap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    allTasksForDay =
      allAssignmentTasks.filter(function(item) {

        const activeValue = item.active;

        if (activeValue === false || activeValue === "No") {
          return false;
        }

        const areaSchedule =
          String(item.scheduleDay || "")
          .trim()
          .toLowerCase();

        const correctDay =
          areaSchedule === "daily" ||
          areaSchedule === currentWorkDayName.toLowerCase();

        if (!correctDay) {
          return false;
        }

        let assignmentField = "";

        if (housekeepingMode === "three") {
          assignmentField =
            item.threeHousekeeperSchedule || "";
        } else {
          assignmentField =
            item.twoHousekeeperSchedule || "";
        }

        return (
          String(assignmentField).trim() ===
          String(currentAssignment).trim()
        );
      }).map(function(item) {

        return {
          area: item.areaName,
          task: "",
          category: item.category,
          schedule: item.scheduleDay,
          assignment: currentAssignment,
          active: item.active,
          type: item.type,
          workId: item.workId
        };

      });

    await loadProgressData();

    drawCategories();

    hideLoading();
  }

  async function loadProgressData() {
    progressData = {};

    const progressQuery = query(
      collection(db, "taskProgress"),
      where("workDateISO", "==", currentWorkDateISO)
    );

    const progressSnap = await getDocs(progressQuery);

    progressSnap.docs.forEach(function(progressDoc) {
      const item = progressDoc.data();

      if (item.assignment !== currentAssignment) return;
      if (String(item.employeeId || "") !== String(employeeId || "")) return;

      const area = item.area || "";
      const task = item.task || "";
      const status = item.status || "";

      if (!area || !status) return;

      if (!progressData[area]) {
        progressData[area] = {};
      }

      if (task) {
        progressData[area][task] = status;
      }

      if (status === "Incomplete") {
        progressData[area][""] = "Incomplete";
      } else if (!progressData[area][""]) {
        progressData[area][""] = status;
      }
    });
  }

  function drawCategories() {
    const box = document.getElementById("categoryButtons");
    box.innerHTML = "";

    const categories =
      currentAssignment === "Laundry"
        ? ["Weekly Laundry", "Daily Laundry Check"]
        : ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

    categories.forEach(function(category) {
      const categoryTasks =
        allTasksForDay.filter(function(task) {
          return task.category === category;
        });

      const total = categoryTasks.length;

      if (total === 0) return;

      const counts = getTaskCounts(categoryTasks);

      const btn = document.createElement("button");

      if (counts.incomplete > 0) {
        btn.innerText =
          category + " " + counts.completed + "/" + total + " - ISSUE";
      } else {
        btn.innerText =
          category + " " + counts.completed + "/" + total;
      }

      btn.className =
        getProgressColor(counts.completed, counts.incomplete, total);

      btn.onclick = function() {
        selectedCategory = category;
        drawAreaButtons(category);
        showView(3);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const emptyMessage = document.createElement("h3");
      emptyMessage.innerText = "No tasks found for " + currentAssignment;
      box.appendChild(emptyMessage);
    }
  }

  function drawAreaButtons(category) {
    const box = document.getElementById("areaButtons");
    box.innerHTML = "";

    setAreaViewTag(category);
    setAreaDatePickerVisibility(category);

    document.getElementById("bigDatePicker").value = currentWorkDateISO;

    document.getElementById("areaDateTitle").innerText =
      currentWorkDayName;

    const categoryTasks =
      allTasksForDay.filter(function(task) {
        return task.category === category;
      });

    const areas =
      [...new Set(categoryTasks.map(function(task) {
        return task.area;
      }))];

    areas.forEach(function(area) {
      const displayArea = getAreaDisplayName(area);

      const areaTasks =
        categoryTasks.filter(function(task) {
          return task.area === area;
        });

      const total = areaTasks.length;
      const counts = getTaskCounts(areaTasks);

      const btn = document.createElement("button");

      if (counts.incomplete > 0) {
        btn.innerHTML =
          '<div class="room-number">' + displayArea + '</div>' +
          '<div class="room-counter">' + counts.completed + '/' + total + ' ISSUE</div>';
      } else {
        btn.innerHTML =
          '<div class="room-number">' + displayArea + '</div>' +
          '<div class="room-counter">' + counts.completed + '/' + total + '</div>';
      }

      btn.className =
        getProgressColor(counts.completed, counts.incomplete, total);

      btn.onclick = function() {
        openAreaChoice(area);
      };

      box.appendChild(btn);
    });
  }

  function getAreaDisplayName(area) {
    return String(area || "")
      .replace(/Bathrooms/gi, "Bath")
      .replace(/Bathroom/gi, "Bath");
  }

  function setAreaViewTag(category) {
    const tag = document.getElementById("areaViewTag");

    if (category === "Common Area") {
      tag.innerText = "VIEW 3";
    } else if (category === "Weekly Room") {
      tag.innerText = "VIEW 4";
    } else if (category === "Daily Room") {
      tag.innerText = "VIEW 5";
    } else if (category === "Dehumidifier") {
      tag.innerText = "VIEW 6";
    } else if (category === "Weekly Laundry") {
      tag.innerText = "VIEW 4";
    } else if (category === "Daily Laundry Check") {
      tag.innerText = "VIEW 5";
    } else {
      tag.innerText = "VIEW 3";
    }
  }

  function setAreaDatePickerVisibility(category) {
    const pickerBox = document.getElementById("areaBigDatePickerBox");
    const dateTitle = document.getElementById("areaDateTitle");

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      pickerBox.classList.remove("hidden");
      dateTitle.classList.remove("hidden");
    } else {
      pickerBox.classList.add("hidden");
      dateTitle.classList.add("hidden");
    }
  }

  function getTaskCounts(tasks) {
    let completed = 0;
    let incomplete = 0;
    let untouched = 0;

    tasks.forEach(function(task) {
      const areaProgress = progressData[task.area] || {};
      const status = areaProgress[task.task] || "";

      if (status === "Completed") {
        completed++;
      } else if (status === "Incomplete") {
        incomplete++;
      } else {
        untouched++;
      }
    });

    return {
      completed: completed,
      incomplete: incomplete,
      untouched: untouched
    };
  }

  function getProgressColor(completed, incomplete, total) {
    if (incomplete > 0) return "yellow";
    if (completed === 0) return "red";
    if (completed >= total) return "green";
    return "yellow";
  }

  async function loadTaskGroupData(area) {
    currentArea = area;

    const selectedWork =
      allTasksForDay.find(function(item) {
        return item.area === area && item.category === selectedCategory;
      });

    if (!selectedWork) {
      alert("Area not found.");
      return false;
    }

    const taskQuery = query(
      collection(db, "tasks_new"),
      where("workId", "==", selectedWork.workId)
    );

    const taskSnap = await getDocs(taskQuery);

    currentTaskList =
      taskSnap.docs.map(function(taskDoc) {
        const taskData = taskDoc.data();

        return {
          id: taskDoc.id,
          area: selectedWork.area,
          areaName: selectedWork.area,
          workId: selectedWork.workId,
          task: taskData.taskName,
          category: selectedWork.category,
          schedule: selectedWork.schedule,
          assignment: currentAssignment,
          active: taskData.active
        };
      }).filter(function(task) {
        return task.active !== false;
      });

    return true;
  }


  function getCurrentDehumidifierPeriod() {
    const now = new Date();
    return now.getHours() < 12 ? "AM" : "PM";
  }

  function isTaskForPeriod(task, period) {
    const taskName = String(task.task || "").trim().toUpperCase();
    return taskName.includes(period);
  }

  async function openDehumidifierChoice(area) {
    selectedDehumidifierPeriod = getCurrentDehumidifierPeriod();

    const choice = await showCustomChoice(area, "", selectedDehumidifierPeriod, "TASKS");

    if (choice === "save") {
      const loaded = await loadTaskGroupData(area);

      if (!loaded) return;

      currentTaskList =
        currentTaskList.filter(function(task) {
          return isTaskForPeriod(task, selectedDehumidifierPeriod);
        });

      await saveCurrentAreaComplete();
      return;
    }

    if (choice === "tasks") {
      await openTaskGroup(area, selectedDehumidifierPeriod);
    }
  }

  async function openAreaChoice(area) {
    if (selectedCategory === "Dehumidifier") {
      await openDehumidifierChoice(area);
      return;
    }

    const choice = await showCustomChoice(area, "", "SAVE", "TASKS");

    if (choice === "save") {
      const loaded = await loadTaskGroupData(area);

      if (!loaded) return;

      await saveCurrentAreaComplete();
      return;
    }

    if (choice === "tasks") {
      await openTaskGroup(area);
    }
  }

  async function openTaskGroup(area, dehumidifierPeriod) {
    const loaded = await loadTaskGroupData(area);

    if (!loaded) return;

    if (selectedCategory === "Dehumidifier" && dehumidifierPeriod) {
      selectedDehumidifierPeriod = dehumidifierPeriod;

      currentTaskList =
        currentTaskList.filter(function(task) {
          return isTaskForPeriod(task, selectedDehumidifierPeriod);
        });
    }

    document.getElementById("allTasksButton").innerText =
      selectedCategory === "Dehumidifier" && selectedDehumidifierPeriod
        ? area + " " + selectedDehumidifierPeriod
        : area;

    document.getElementById("message").innerText = "";
    document.getElementById("reason").value = "";
    document.getElementById("note").value = "";
    document.getElementById("reasonBox").classList.add("hidden");

    buildChecklist();

    showView(4);
  }

  async function saveCurrentAreaComplete() {
    showLoading();

    const saveItems = [];

    currentTaskList.forEach(function(task) {
      saveItems.push({
        task: task,
        status: "Completed",
        reason: ""
      });
    });

    await saveTaskStatuses(saveItems);

    await loadAssignmentTasks();

    hideLoading();

    drawAreaButtons(selectedCategory);
    showView(3);
  }

  function buildChecklist() {

    const box = document.getElementById("checklist");
    box.innerHTML = "";

    const areaProgress = progressData[currentArea] || {};

    currentTaskList.forEach(function(task, index) {

      const savedStatus = areaProgress[task.task] || "";

      const isCompleted = savedStatus === "Completed";

      const div = document.createElement("div");

      div.className =
        isCompleted
          ? "check-row task-done"
          : "check-row task-missing";

      div.innerHTML =
        '<button ' +
        'id="task_' + index + '" ' +
        'class="task-toggle-btn ' +
        (isCompleted ? 'green' : 'red') +
        '" ' +
        'data-done="' + (isCompleted ? 'true' : 'false') + '" ' +
        'onclick="toggleTaskButton(' + index + ')">' +
        task.task +
        '</button>';

      box.appendChild(div);

    });

    updateReasonVisibility();

  }

  async function confirmCheckAllTasks() {
    const confirmed = await showCustomConfirm("All tasks done?");

    if (!confirmed) {
      return;
    }

    checkAllTasks();
  }

  function checkAllTasks() {
    currentTaskList.forEach(function(task, index) {
      const btn = document.getElementById("task_" + index);

      if (btn) {
        btn.dataset.done = "true";
        btn.classList.remove("red");
        btn.classList.add("green");
      }
    });

    updateReasonVisibility();

    document.getElementById("reasonBox").classList.add("hidden");
    document.getElementById("reason").value = "";
    document.getElementById("note").value = "";
  }

  function updateChecklistColors() {
    currentTaskList.forEach(function(task, index) {
      const btn = document.getElementById("task_" + index);

      if (!btn) return;

      const row = btn.closest(".check-row");

      if (!row) return;

      if (btn.dataset.done === "true") {
        row.classList.remove("task-missing");
        row.classList.add("task-done");
        btn.classList.remove("red");
        btn.classList.add("green");
      } else {
        row.classList.remove("task-done");
        row.classList.add("task-missing");
        btn.classList.remove("green");
        btn.classList.add("red");
      }
    });

    updateReasonVisibility();
  }

  function updateReasonVisibility() {
    let allChecked = true;

    currentTaskList.forEach(function(task, index) {
      const btn = document.getElementById("task_" + index);

      if (btn.dataset.done !== "true") {
        allChecked = false;
      }
    });

    if (allChecked) {
      document.getElementById("reasonBox").classList.add("hidden");
      document.getElementById("reason").value = "";
      document.getElementById("note").value = "";
    } else {
      document.getElementById("reasonBox").classList.remove("hidden");
    }
  }


  function toggleTaskButton(index) {
    const btn = document.getElementById("task_" + index);

    if (btn.dataset.done === "true") {
      btn.dataset.done = "false";
    } else {
      btn.dataset.done = "true";
    }

    updateChecklistColors();
  }

  async function saveTaskChecklist() {
    showLoading();

    const saveItems = [];

    let hasIncomplete = false;

    currentTaskList.forEach(function(task, index) {
      const checked =
        document.getElementById("task_" + index).dataset.done === "true";

      const status =
        checked ? "Completed" : "Incomplete";

      if (!checked) {
        hasIncomplete = true;
      }

      saveItems.push({
        task: task,
        status: status,
        reason: checked ? "" : getReasonText()
      });
    });

    if (hasIncomplete && getReasonText() === "") {
      hideLoading();
      alert("Select a reason before saving.");
      return;
    }

    await saveTaskStatuses(saveItems);

    await loadAssignmentTasks();

    hideLoading();

    document.getElementById("message").innerText = "TASK SAVED";

    selectedDehumidifierPeriod = "";

    setTimeout(function() {
      drawAreaButtons(selectedCategory);
      showView(3);
    }, 800);
  }

  function getReasonText() {
    const reason = document.getElementById("reason").value || "";
    const note = document.getElementById("note").value || "";

    if (reason && note) {
      return reason + " - " + note;
    }

    if (reason) {
      return reason;
    }

    return note;
  }

  async function completeWholeCategory() {
    const categoryAreas =
      allTasksForDay.filter(function(item) {
        return item.category === selectedCategory;
      });

    if (categoryAreas.length === 0) {
      alert("No areas in this category.");
      return;
    }

    const confirmMessage = getCompleteAllConfirmText(selectedCategory);

    const confirmed = await showCustomConfirm(confirmMessage);

    if (!confirmed) {
      return;
    }

    showLoading();

    const saveItems = [];

    for (let i = 0; i < categoryAreas.length; i++) {
      const areaItem = categoryAreas[i];

      const taskQuery = query(
        collection(db, "tasks_new"),
        where("workId", "==", areaItem.workId)
      );

      const taskSnap = await getDocs(taskQuery);

      taskSnap.docs.forEach(function(taskDoc) {
        const taskData = taskDoc.data();

        if (taskData.active === false) {
          return;
        }

        saveItems.push({
          task: {
            id: taskDoc.id,
            area: areaItem.area,
            areaName: areaItem.area,
            workId: areaItem.workId,
            task: taskData.taskName,
            category: areaItem.category,
            schedule: areaItem.schedule,
            assignment: currentAssignment,
            active: taskData.active
          },
          status: "Completed",
          reason: ""
        });
      });
    }

    await saveTaskStatuses(saveItems);

    hideLoading();

    await loadAssignmentTasks();

    drawAreaButtons(selectedCategory);
    drawCategories();
  }


  function getCompleteAllConfirmText(category) {
    if (category === "Weekly Room" || category === "Daily Room") {
      return "All rooms done?";
    }

    if (category === "Common Area") {
      return "All areas done?";
    }

    if (category === "Dehumidifier") {
      return "All dehumidifiers done?";
    }

    return "All tasks done?";
  }

  function showCustomConfirm(message) {
    return showCustomModal("Confirm", message, "YES", "CANCEL", true, false);
  }

  function showCustomChoice(title, message, yesText, noText) {
    return showCustomModal(title, message, yesText, noText, "save", "tasks");
  }

  function showCustomModal(title, message, yesText, noText, yesValue, noValue) {
    const textBox = document.getElementById("customConfirmText");

    document.getElementById("customConfirmTitle").innerText = title;
    textBox.innerText = message;
    document.getElementById("customConfirmYesButton").innerText = yesText;
    document.getElementById("customConfirmNoButton").innerText = noText;

    if (message) {
      textBox.classList.remove("hidden");
    } else {
      textBox.classList.add("hidden");
    }

    customConfirmYesValue = yesValue;
    customConfirmNoValue = noValue;

    document.getElementById("customConfirmModal").classList.remove("hidden");

    return new Promise(function(resolve) {
      customConfirmResolve = resolve;
    });
  }

  function customConfirmYes() {
    document.getElementById("customConfirmModal").classList.add("hidden");

    if (customConfirmResolve) {
      customConfirmResolve(customConfirmYesValue);
    }
  }

  function customConfirmNo() {
    document.getElementById("customConfirmModal").classList.add("hidden");

    if (customConfirmResolve) {
      customConfirmResolve(customConfirmNoValue);
    }
  }

  function updateLocalProgress(task, status) {
    if (!progressData[task.area]) {
      progressData[task.area] = {};
    }

    progressData[task.area][task.task] = status;

    if (status === "Incomplete") {
      progressData[task.area][""] = "Incomplete";
    } else {
      const areaTasks =
        currentTaskList.filter(function(item) {
          return item.area === task.area;
        });

      let hasIncomplete = false;

      areaTasks.forEach(function(item) {
        if (progressData[task.area][item.task] === "Incomplete") {
          hasIncomplete = true;
        }
      });

      if (!hasIncomplete) {
        progressData[task.area][""] = "Completed";
      }
    }
  }

  async function saveTaskStatuses(saveItems) {

    const batch = writeBatch(db);

    saveItems.forEach(function(item) {

      const task = item.task;
      const status = item.status;
      const reason = item.reason || "";

      updateLocalProgress(task, status);

      const cleanTaskId =
        (
          String(task.area || "") + "_" +
          String(task.category || "") + "_" +
          String(task.schedule || "") + "_" +
          String(task.task || "")
        )
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");

      const progressId = makeProgressId(task);

      const progressRef =
        doc(db, "taskProgress", progressId);

      batch.set(progressRef, {

        workDateISO: currentWorkDateISO,
        workDate: currentWorkDateDisplay,
        weekday: currentWorkDayName,

        employeeId: String(employeeId || ""),
        employeeName: employeeName,

        assignment: currentAssignment,

        area: task.area,
        workId: task.workId || "",

        task: task.task,
        taskId: cleanTaskId,

        schedule: task.schedule || "",
        category: task.category || "",

        status: status,
        reason: reason,

        updatedAt: serverTimestamp()
      });

      const logRef =
        doc(collection(db, "taskLogs"));

      batch.set(logRef, {

        workDateISO: currentWorkDateISO,
        workDate: currentWorkDateDisplay,
        weekday: currentWorkDayName,

        employeeId: String(employeeId || ""),
        employeeName: employeeName,

        assignment: currentAssignment,

        area: task.area,
        workId: task.workId || "",

        task: task.task,
        taskId: cleanTaskId,

        schedule: task.schedule || "",
        category: task.category || "",

        status: status,
        reason: reason,

        timestamp: serverTimestamp()
      });

    });

    await batch.commit();
  }

  function makeProgressId(task) {

    const taskId =
      String(task.area || "") + "_" +
      String(task.category || "") + "_" +
      String(task.schedule || "") + "_" +
      String(task.task || "");

    const cleanTaskId =
      taskId
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");

    const raw =
      currentWorkDateISO + "_" +
      String(employeeId || "") + "_" +
      currentAssignment + "_" +
      cleanTaskId;

    return raw.replace(/[^a-zA-Z0-9_-]/g, "_");
  }

  function showView(num) {
    [2, 3, 4].forEach(function(viewNumber) {
      document
        .getElementById("view" + viewNumber)
        .classList
        .add("hidden");
    });

    document
      .getElementById("view" + num)
      .classList
      .remove("hidden");
  }

  function backToCategories() {
    drawCategories();
    showView(2);
  }

  function backToAreas() {
    drawAreaButtons(selectedCategory);
    showView(3);
  }

  function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }

  window.showCoverScheduleDropdown = showCoverScheduleDropdown;
  window.changeCoverSchedule = changeCoverSchedule;
  window.openCalendar = openCalendar;
  window.changeWorkDateFromCalendar = changeWorkDateFromCalendar;
  window.changeWorkDateFromBigPicker = changeWorkDateFromBigPicker;
  window.completeWholeCategory = completeWholeCategory;
  window.openAreaChoice = openAreaChoice;
  window.confirmCheckAllTasks = confirmCheckAllTasks;
  window.checkAllTasks = checkAllTasks;
  window.updateChecklistColors = updateChecklistColors;
  window.updateReasonVisibility = updateReasonVisibility;
  window.toggleTaskButton = toggleTaskButton;
  window.saveTaskChecklist = saveTaskChecklist;
  window.backToCategories = backToCategories;
  window.backToAreas = backToAreas;
  window.logout = logout;
  window.customConfirmYes = customConfirmYes;
  window.customConfirmNo = customConfirmNo;

</script>

</body>
</html>
