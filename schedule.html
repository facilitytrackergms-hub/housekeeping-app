<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>
  <style>
    /* 01 - GLOBAL STYLE */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin: auto; position: relative; }
    
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
    h2, h3 { text-align: center; margin: 5px 0; }
    
    button { width: 100%; border: none; border-radius: 15px; background: #1976d2; color: white; font-size: 18px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; transition: 0.2s; }
    .red { background: #c62828 !important; }
    .back { background: #555 !important; }
    .hidden { display: none !important; }

    .top-box { border: 2px solid #e0e0e0; border-radius: 20px; padding: 15px; margin-bottom: 15px; background: #fafafa; text-align: center; }
    .date-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
    .date-btn { width: auto; padding: 10px 15px; background: #555; font-size: 16px; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #categoryButtons button { min-height: 110px; font-size: 17px; line-height: 1.2; }
    #areaButtons button { min-height: 80px; font-size: 20px; }

    select { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #1976d2; margin-top: 10px; font-size: 16px; }
  </style>
</head>
<body>

<div class="card">
  <div id="view2">
    <div class="view-tag">V2 schedule.html</div>
    
    <div class="top-box">
      <div class="date-row">
        <button class="date-btn" onclick="adjustDate(-1)">◀</button>
        <h3 id="dateDisplay" style="min-width: 140px;">Today</h3>
        <button class="date-btn" onclick="adjustDate(1)">▶</button>
      </div>
      <h2 id="empName">Hi, ---</h2>
      <h3 id="assignDisplay" style="color:#1976d2; font-weight: bold;">---</h3>
      
      <button id="coverBtn" style="font-size:13px; padding:10px; background:#666;" onclick="toggleCover()">COVER ANOTHER ASSIGNMENT</button>
      <div id="coverBox" class="hidden">
        <select id="assignSelect" onchange="updateAssignment(this.value)"></select>
      </div>
    </div>

    <div id="categoryButtons" class="grid-2"></div>
    <button class="back" onclick="logout()" style="margin-top:20px;">LOGOUT</button>
  </div>

  <div id="view3" class="hidden">
    <div class="view-tag">V3 schedule.html</div>
    <h2 id="catTitle" style="color:#1976d2; margin-bottom: 15px;">Category</h2>
    <div id="areaButtons" class="grid-2"></div>
    <button class="back" onclick="showV2()" style="margin-top:20px; padding: 18px;">BACK TO CATEGORIES</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = JSON.parse(sessionStorage.getItem("currentEmployee"));
  if(!session) { window.location.href = "index.html"; }

  let currentAssign = session.assignment;
  let workDate = new Date();
  let matchedAreas = [];

  // 1. BULLETPROOF DATA LOAD
  async function loadData() {
    const dayName = workDate.toLocaleDateString('en-US', { weekday: 'long' });
    const today = dayName.toLowerCase().trim();
    const myAssign = currentAssign.toLowerCase().trim();

    document.getElementById("dateDisplay").innerText = dayName;
    document.getElementById("empName").innerText = "Hi, " + (session.firstName || "User");
    document.getElementById("assignDisplay").innerText = currentAssign;

    // A. Get Mode
    const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
    const modeData = modeSnap.exists() ? modeSnap.data() : {};
    const mode = (modeData.settingValue || modeData.value || "two").toLowerCase().trim();
    const field = (mode === "three") ? "threeHousekeeperSchedule" : "twoHousekeeperSchedule";

    // B. Get Areas
    const snap = await getDocs(collection(db, "areas"));
    matchedAreas = [];
    const allAssignments = new Set();

    snap.forEach(d => {
      const data = d.data();
      const dbAssign = String(data[field] || "").toLowerCase().trim();
      const dbDay = String(data.scheduleDay || "").toLowerCase().trim();
      
      if(dbAssign) allAssignments.add(String(data[field]).trim());

      // THE FILTER
      if(dbAssign === myAssign && (dbDay === "daily" || dbDay === today)) {
        matchedAreas.push(data);
      }
    });

    // C. Populate Dropdown
    const select = document.getElementById("assignSelect");
    select.innerHTML = '<option value="">Select Schedule...</option>' + 
      Array.from(allAssignments).sort().map(s => `<option value="${s}">${s}</option>`).join('');

    drawCategories();
  }

  // 2. VIEW DRAWING (Counting Areas correctly)
  function drawCategories() {
    const box = document.getElementById("categoryButtons");
    box.innerHTML = "";
    const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

    cats.forEach(cat => {
      const catLower = cat.toLowerCase().trim();
      const count = matchedAreas.filter(a => String(a.category || "").toLowerCase().trim() === catLower).length;
      
      const btn = document.createElement("button");
      btn.className = (count > 0) ? "red" : "back";
      btn.innerText = `${cat} (${count})`;
      btn.onclick = () => { if(count > 0) showV3(cat); };
      box.appendChild(btn);
    });
  }

  function showV3(cat) {
    document.getElementById("view2").classList.add("hidden");
    document.getElementById("view3").classList.remove("hidden");
    document.getElementById("catTitle").innerText = cat;

    const box = document.getElementById("areaButtons");
    box.innerHTML = "";
    const catLower = cat.toLowerCase().trim();
    const filtered = matchedAreas.filter(a => String(a.category || "").toLowerCase().trim() === catLower);

    filtered.forEach(area => {
      const btn = document.createElement("button");
      btn.className = "red";
      btn.innerHTML = `<div style="font-size: 22px;">${area.areaName}</div>`;
      btn.onclick = () => {
        sessionStorage.setItem("selectedWork", JSON.stringify({ workId: area.workId, areaName: area.areaName }));
        window.location.href = "tasks.html";
      };
      box.appendChild(btn);
    });
  }

  window.adjustDate = (n) => {
    workDate.setDate(workDate.getDate() + n);
    loadData();
  };

  window.toggleCover = () => document.getElementById("coverBox").classList.toggle("hidden");

  window.updateAssignment = (val) => {
    if(!val) return;
    currentAssign = val;
    loadData();
    document.getElementById("coverBox").classList.add("hidden");
  };

  window.showV2 = () => {
    document.getElementById("view2").classList.remove("hidden");
    document.getElementById("view3").classList.add("hidden");
  };

  window.logout = () => { sessionStorage.clear(); window.location.href = "index.html"; };

  loadData();
</script>
</body>
</html>
