<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Schedule</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .header { text-align: center; margin-bottom: 30px; }
    h2 { color: #1847d1; margin-bottom: 5px; font-size: 28px; }
    .tag { background: black; color: white; padding: 5px 12px; border-radius: 8px; font-size: 14px; }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .info { flex-grow: 1; }
    .area-name { font-size: 20px; font-weight: bold; color: #333; }
    .cat-name { font-size: 14px; color: #666; text-transform: uppercase; }
    .start-btn { background: #2e5cff; color: white; border: none; border-radius: 12px; padding: 15px 25px; font-weight: bold; cursor: pointer; }
    .logout { display: block; margin: 40px auto; color: #666; border: none; background: none; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="nameDisplay">Loading...</h2>
    <span id="assignDisplay" class="tag">---</span>
  </div>
  <div id="list"></div>
  <button class="logout" onclick="sessionStorage.clear(); window.location.href='index.html'">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));
    if (!user) window.location.href = "index.html";

    document.getElementById("nameDisplay").innerText = `Hi, ${user.firstName}`;
    document.getElementById("assignDisplay").innerText = user.assignment;

    async function loadSchedule() {
      // 1. Get Global Mode
      const modeSnap = await getDoc(doc(db, "settings", "housekeepingMode"));
      const mode = modeSnap.exists() ? modeSnap.data().settingValue : "two";

      // 2. Identify correct field to filter by (twoHousekeeperSchedule vs threeHousekeeperSchedule)
      const scheduleField = (mode === "three") ? "threeHousekeeperSchedule" : "twoHousekeeperSchedule";
      
      // 3. Get Today's Day
      const day = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date());

      // 4. Query the 'areas' collection based on user assignment and mode
      const q = query(
        collection(db, "areas"), 
        where(scheduleField, "==", user.assignment),
        where("scheduleDay", "in", ["Daily", day])
      );

      const snap = await getDocs(q);
      const listDiv = document.getElementById("list");
      listDiv.innerHTML = "";

      if (snap.empty) {
        listDiv.innerHTML = `<p style="text-align:center;">No tasks scheduled for ${day}.</p>`;
        return;
      }

      snap.forEach(d => {
        const data = d.data();
        listDiv.innerHTML += `
          <div class="card">
            <div class="info">
              <div class="cat-name">${data.category}</div>
              <div class="area-name">${data.areaName}</div>
            </div>
            <button class="start-btn" onclick="openTask('${data.workId}', '${data.areaName}')">START</button>
          </div>`;
      });
    }

    window.openTask = function(workId, areaName) {
      sessionStorage.setItem("selectedWork", JSON.stringify({ workId: workId, areaName: areaName }));
      window.location.href = "task-details.html";
    };

    loadSchedule();
  </script>
</body>
</html>
