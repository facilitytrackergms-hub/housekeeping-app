<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>
  <style>
    /* GLOBAL STYLE */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 18px 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .view-center { text-align: center; }
    h2, h3 { text-align: center; margin-top: 0; }
    h2 { font-size: 30px; }
    input[type="date"] { width: 100%; font-size: 22px; padding: 14px; margin: 10px 0 18px; border-radius: 14px; border: 1px solid #ccc; text-align: center; }
    button { width: 100%; border: none; border-radius: 14px; background: #1976d2; color: white; font-size: 20px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; }
    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .back { background: #555; color: white; }
    .hidden { display: none !important; }
    .task-row { background: #fff; border: 1px solid #ddd; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; flex-direction: column; }
    .task-controls { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
    .task-controls button { font-size: 14px; padding: 8px; margin: 0; flex: 1; }

    /* Progress-based Button Colors */
    button.red { background-color: #d93025 !important; color: white; }
    button.yellow { background-color: #f9ab00 !important; color: black; }
    button.green { background-color: #1e8e3e !important; color: white; }
    button.standard { background-color: #1976d2; color: white; }
  </style>
</head>
<body>

<div class="card">
  <h2 id="employeeName">Welcome</h2>

  <div id="view1">
    <div class="view-center"><div class="view-tag">VIEW 1</div></div>
    <button onclick="navToView2('Housekeeper 1')">Housekeeper 1</button>
    <button onclick="navToView2('Housekeeper 2')">Housekeeper 2</button>
    <button onclick="navToView2('Laundry')">Laundry</button>
    <button class="back" id="btnLogout">LOGOUT</button>
  </div>

  <div id="view2" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 2</div></div>
    <h3 id="v2Title">Categories</h3>
    <div id="categoryButtons"></div>
    <button class="back" onclick="showView(1)">BACK</button>
  </div>

  <div id="view3" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 3</div></div>
    <div class="view-center hidden" id="datePickerContainer">
      <label style="font-weight: bold; font-size: 14px;">Selected Work Date:</label>
      <input type="date" id="globalWorkDate">
    </div>
    <h3 id="v3Title" style="margin-top:15px;">Select Area</h3>
    <div id="areaBtnContainer" class="rooms-grid"></div>
    <button class="back" onclick="showView(2)">BACK</button>
  </div>

  <div id="view4" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 4</div></div>
    <h3 id="v4Title">Tasks</h3>
    <div id="taskListContainer"></div>
    <button class="back" onclick="showView(3)">BACK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
  authDomain: "gms-task-tracker.firebaseapp.com",
  projectId: "gms-task-tracker",
  storageBucket: "gms-task-tracker.firebasestorage.app",
  messagingSenderId: "790880979860",
  appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
  measurementId: "G-5TRHQMS039"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));
if (!sessionData) window.location.href = "index.html";

let currentWorkDate = new Date().toISOString().split('T')[0];
document.getElementById("globalWorkDate").value = currentWorkDate;
document.getElementById("employeeName").innerText = "Welcome, " + sessionData.firstName;

let currentAssignment = "";
let selectedCategory = "";
let progressData = {}; // [area][task] = status
let allTasksForDay = []; 

window.showView = (num) => {
    [1,2,3,4].forEach(v => document.getElementById('view'+v).classList.add('hidden'));
    document.getElementById('view'+num).classList.remove('hidden');
};

// --- PROGRESS LOGIC ---
function getTaskCounts(tasks) {
  let completed = 0;
  let incomplete = 0;
  let untouched = 0;

  tasks.forEach(task => {
    const status = progressData[task.area]?.[task.task] || "";
    if (status === "Completed") completed++;
    else if (status === "Incomplete") incomplete++;
    else untouched++;
  });

  return { completed, incomplete, untouched };
}

function getProgressColor(completed, incomplete, total) {
  if (incomplete > 0) return "yellow";
  if (completed === 0) return "red";
  if (completed >= total) return "green";
  return "yellow";
}

async function refreshProgressData() {
    const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const selectedDay = dayNames[new Date(currentWorkDate + 'T00:00:00').getDay()];

    const q = query(collection(db, "tasks"), where("assignment", "==", currentAssignment));
    const snap = await getDocs(q);
    
    allTasksForDay = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(item => {
        const itemSched = (item.schedule || "").toLowerCase();
        return itemSched === selectedDay.toLowerCase() || itemSched === "daily";
    });

    progressData = {};
    allTasksForDay.forEach(item => {
        if (!progressData[item.area]) progressData[item.area] = {};
        progressData[item.area][item.task] = item.status || "";
    });
}

// --- NAVIGATION ---
window.navToView2 = async (assignment) => {
    currentAssignment = assignment;
    await refreshProgressData();
    const cats = ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];
    const container = document.getElementById("categoryButtons");
    container.innerHTML = "";

    cats.forEach(cat => {
        const catTasks = allTasksForDay.filter(t => t.category === cat);
        const total = catTasks.length;
        const counts = getTaskCounts(catTasks);
        
        const btn = document.createElement("button");
        btn.innerText = cat + (counts.incomplete > 0 ? ` ${counts.completed}/${total} - ISSUE` : ` ${counts.completed}/${total}`);
        btn.className = total > 0 ? getProgressColor(counts.completed, counts.incomplete, total) : "standard";
        btn.onclick = () => navToView3(cat);
        container.appendChild(btn);
    });
    showView(2);
};

window.navToView3 = async (cat) => {
    selectedCategory = cat;
    const datePicker = document.getElementById("datePickerContainer");
    if (cat === "Weekly Room") datePicker.classList.remove("hidden");
    else {
        datePicker.classList.add("hidden");
        currentWorkDate = new Date().toISOString().split('T')[0];
        document.getElementById("globalWorkDate").value = currentWorkDate;
        await refreshProgressData();
    }

    const container = document.getElementById("areaBtnContainer");
    container.innerHTML = "Loading...";
    showView(3);

    const catTasks = allTasksForDay.filter(t => t.category === cat);
    const uniqueAreas = [...new Set(catTasks.map(t => t.area))];

    container.innerHTML = "";
    uniqueAreas.forEach(area => {
        const areaTasks = catTasks.filter(t => t.area === area);
        const total = areaTasks.length;
        const counts = getTaskCounts(areaTasks);
        
        const btn = document.createElement("button");
        btn.innerText = area + (counts.incomplete > 0 ? ` ${counts.completed}/${total} - ISSUE` : ` ${counts.completed}/${total}`);
        btn.className = getProgressColor(counts.completed, counts.incomplete, total);
        btn.onclick = () => navToView4(area);
        container.appendChild(btn);
    });
};

window.navToView4 = (area) => {
    localStorage.setItem("currentArea", area);
    showView(4);
    loadTasks();
};

window.loadTasks = () => {
    const area = localStorage.getItem("currentArea");
    const container = document.getElementById("taskListContainer");
    const areaTasks = allTasksForDay.filter(t => t.area === area && t.category === selectedCategory);

    let html = `<h4 style="text-align:center;">${area}</h4>`;
    areaTasks.forEach(t => {
        const status = progressData[area]?.[t.task] || "";
        html += `
            <div class="task-row">
                <span style="font-weight:bold">${t.task}</span>
                <div class="task-controls">
                    <button class="${status === 'Completed' ? 'green' : 'standard'}" onclick="updateTaskStatus('${t.id}', 'Completed')">DONE</button>
                    <button class="${status === 'Incomplete' ? 'yellow' : 'standard'}" onclick="updateTaskStatus('${t.id}', 'Incomplete')">ISSUE</button>
                    <button class="back" onclick="updateTaskStatus('${t.id}', '')">CLEAR</button>
                </div>
            </div>`;
    });
    container.innerHTML = html;
};

window.updateTaskStatus = async (id, status) => {
    const task = allTasksForDay.find(t => t.id === id);
    await updateDoc(doc(db, "tasks", id), { status: status });
    
    if (!progressData[task.area]) progressData[task.area] = {};
    progressData[task.area][task.task] = status;
    
    loadTasks(); // Redraw task list to show current selection
};

document.getElementById("globalWorkDate").onchange = async (e) => {
    currentWorkDate = e.target.value;
    await refreshProgressData();
    navToView3(selectedCategory);
};

document.getElementById("btnLogout").onclick = () => { sessionStorage.clear(); window.location.href = "index.html"; };
</script>
</body>
</html>
