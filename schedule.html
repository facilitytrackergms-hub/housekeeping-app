<!-- Purpose: Corrected Schedule Page with View 1 & 2 -->
<!-- Location: schedule.html -->

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Tracker</title>
  <style>
    /* Global Styles */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 18px 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; }
    .view-center { text-align: center; }
    h2, h3 { text-align: center; margin-top: 0; }
    h2 { font-size: 30px; }
    h3 { font-size: 24px; }
    input, select, textarea { width: 100%; font-size: 22px; padding: 14px; margin: 10px 0 18px; border-radius: 14px; border: 1px solid #ccc; }
    textarea { min-height: 90px; }
    button { width: 100%; border: none; border-radius: 14px; background: #1976d2; color: white; font-size: 22px; font-weight: bold; padding: 16px; margin: 8px 0; cursor: pointer; }
    .green { background: #2e7d32; }
    .yellow { background: #f9a825; color: black; }
    .red { background: #c62828; }
    .back { background: #555; }
    .hidden { display: none !important; }
    .loading-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); display: flex; justify-content: center; align-items: center; z-index: 99999; }
    .spinner { width: 70px; height: 70px; border: 8px solid #ddd; border-top: 8px solid #1976d2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <!-- VIEW 1: ASSIGNMENT SELECTION -->
  <div id="assignmentScreen">
    <div class="view-center"><div class="view-tag">VIEW 1</div></div>
    <h2 id="employeeName"></h2>
    <button onclick="chooseAssignment('Housekeeper 1')">Housekeeper 1</button>
    <button onclick="chooseAssignment('Housekeeper 2')">Housekeeper 2</button>
    <button onclick="chooseAssignment('Laundry')">Laundry</button>
    <button class="back" onclick="logout()">LOGOUT</button>
  </div>

  <!-- VIEW 2: DATE SELECTION (New) -->
  <div id="dateScreen" class="hidden">
    <div class="view-center"><div class="view-tag">VIEW 2</div></div>
    <h3>Select Date</h3>
    <input type="date" id="workDate">
    <button class="green" onclick="confirmDate()">CONTINUE</button>
    <button class="back" onclick="location.reload()">BACK</button>
  </div>
</div>

<div id="loadingScreen" class="loading-bg hidden"><div class="spinner"></div></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4kZ1JPlMrjzvjHSQxgpuZXl2zZ9jekz8j-tasSjS84uRS5iCx0UReV0b0s4tSGea-/exec";

const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

if (!sessionData) {
    window.location.href = "index.html";
}

let currentEmployee = sessionData.firstName;
let currentEmployeeId = sessionData.employeeId;
let currentAssignment = "";
let currentWorkDateValue = "";

document.getElementById("employeeName").innerText = "Welcome, " + currentEmployee;

// --- VIEW 1 LOGIC ---
function chooseAssignment(assignment) {
    currentAssignment = assignment;
    document.getElementById("assignmentScreen").classList.add("hidden");
    document.getElementById("dateScreen").classList.remove("hidden");
}

// --- VIEW 2 LOGIC ---
function confirmDate() {
    const dateInput = document.getElementById("workDate").value;
    if (!dateInput) {
        alert("Please select a date first.");
        return;
    }
    currentWorkDateValue = dateInput;
    alert("Moving to View 3 logic for: " + currentAssignment + " on " + currentWorkDateValue);
}

function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
