<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCR Tasks</title>
    <style>
        /* 01 - STYLES */
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #eef2f7; padding: 10px; }
        .card { width: 100%; max-width: 460px; background: white; border-radius: 28px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); margin: auto; }
        .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; }
        h2 { text-align: center; color: #1847d1; margin-bottom: 5px; font-size: 28px; }
        
        .counter-box { text-align: center; font-size: 20px; font-weight: bold; color: #1847d1; margin-bottom: 20px; }
        
        .task-card { background: #f9fbff; border: 2px solid #dce3f0; border-radius: 20px; padding: 20px; margin-top: 18px; }
        .task-name { font-size: 22px; font-weight: bold; color: #1847d1; margin-bottom: 15px; text-align: center; }
        
        .buttons { display: flex; gap: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; }
        .yes { background: #22aa44; }
        .no { background: #d93025; }
        .back-btn { width: 100%; padding: 18px; background: #333; color: white; border: none; border-radius: 18px; font-size: 20px; margin-top: 25px; cursor: pointer; }

        .status-msg { text-align: center; margin-top: 10px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <div class="view-tag">Task Checklist</div>
    <h2 id="areaTitle">Loading Area...</h2>
    <div class="counter-box">
        Progress: <span id="completedCount">0</span> / <span id="totalCount">0</span>
    </div>
    
    <div id="taskList"></div>

    <button class="back-btn" onclick="window.location.href='schedule.html'">BACK TO ROOMS</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
        authDomain: "gms-task-tracker.firebaseapp.com",
        projectId: "gms-task-tracker",
        storageBucket: "gms-task-tracker.firebasestorage.app",
        messagingSenderId: "790880979860",
        appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const selectedWork = JSON.parse(sessionStorage.getItem("selectedWork"));
    if (!selectedWork) { window.location.href = "schedule.html"; }

    document.getElementById("areaTitle").innerText = selectedWork.areaName;

    let totalTasks = 0;
    let completedTasks = 0;

    async function loadTasks() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        try {
            const q = query(collection(db, "tasks"), where("workId", "==", selectedWork.workId));
            const snap = await getDocs(q);

            if (snap.empty) {
                list.innerHTML = "<p style='text-align:center;'>No tasks found for this area.</p>";
                return;
            }

            totalTasks = snap.size;
            document.getElementById("totalCount").innerText = totalTasks;

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const docId = docSnap.id;
                if (data.status === "done") completedTasks++;

                const row = document.createElement("div");
                row.className = "task-card";
                row.innerHTML = `
                    <div class="task-name">${data.Task}</div>
                    <div class="buttons">
                        <button class="yes" onclick="updateStatus('${docId}', 'done')">YES</button>
                        <button class="no" onclick="updateStatus('${docId}', 'incomplete')">NO</button>
                    </div>
                    <div id="msg-${docId}" class="status-msg" style="color: ${data.status === 'done' ? '#22aa44' : '#d93025'}">
                        ${data.status === 'done' ? 'Task Completed' : (data.status === 'incomplete' ? 'Marked Incomplete' : '')}
                    </div>
                `;
                list.appendChild(row);
            });

            document.getElementById("completedCount").innerText = completedTasks;

        } catch (err) {
            console.error(err);
            list.innerHTML = "<p>Error loading tasks.</p>";
        }
    }

    window.updateStatus = async function(docId, newStatus) {
        const msg = document.getElementById(`msg-${docId}`);
        const prevStatus = msg.innerText.includes("Completed") ? "done" : "incomplete";
        
        try {
            await updateDoc(doc(db, "tasks", docId), { status: newStatus });
            
            // UI Updates
            if (newStatus === "done") {
                msg.innerText = "Task Completed";
                msg.style.color = "#22aa44";
                if (prevStatus !== "done") completedTasks++;
            } else {
                msg.innerText = "Marked Incomplete";
                msg.style.color = "#d93025";
                if (prevStatus === "done") completedTasks--;
            }
            
            document.getElementById("completedCount").innerText = completedTasks;

        } catch (err) {
            alert("Error updating task.");
        }
    }

    loadTasks();
</script>
</body>
</html>
