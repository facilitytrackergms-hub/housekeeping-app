<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Checklist</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { color: #1847d1; margin-top: 0; }
    .item { display: flex; align-items: center; padding: 18px 0; border-bottom: 1px solid #eee; font-size: 19px; }
    input[type="checkbox"] { width: 30px; height: 30px; margin-right: 15px; cursor: pointer; }
    .finish-btn { margin-top: 30px; width: 100%; padding: 22px; background: #1c7a32; color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Loading...</h2>
    <div id="checklist"></div>
    <button class="finish-btn" onclick="submit()">FINISH AREA</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const work = JSON.parse(sessionStorage.getItem("selectedWork"));
    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));

    if (!work || !user) window.location.href = "index.html";
    document.getElementById("title").innerText = work.areaName;

    async function loadTasks() {
      // Query 'tasks_new' using the workId generated by your script
      const q = query(collection(db, "tasks_new"), where("workId", "==", work.workId));
      const snap = await getDocs(q);
      const list = document.getElementById("checklist");
      
      snap.forEach(doc => {
        list.innerHTML += `<div class="item"><input type="checkbox"> ${doc.data().taskName}</div>`;
      });
    }

    window.submit = async function() {
      await addDoc(collection(db, "logs"), {
        employeeName: user.employeeName,
        area: work.areaName,
        workId: work.workId,
        timestamp: serverTimestamp()
      });
      window.location.href = "schedule.html";
    };

    loadTasks();
  </script>
</body>
</html>
