<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCR Tasks</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; padding: 10px; }
    .card { width: 100%; max-width: 430px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin: auto; }
    .view-tag { display: inline-block; background: black; color: white; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; }
    h2 { text-align: center; color: #1976d2; margin-bottom: 20px; }
    .task-row { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 2px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    .task-name { font-size: 18px; font-weight: bold; }
    .check-btn { width: 40px; height: 40px; border-radius: 10px; border: 3px solid #1976d2; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .done { background: #4caf50 !important; border-color: #4caf50 !important; color: white; }
    .done::after { content: '✔'; font-size: 20px; }
    .back-btn { width: 100%; padding: 15px; background: #555; color: white; border: none; border-radius: 15px; font-size: 16px; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <div class="view-tag">Task Checklist</div>
  <h2 id="areaTitle">Loading...</h2>
  <div id="taskList"></div>
  <button class="back-btn" onclick="window.location.href='schedule.html'">BACK TO ROOMS</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const selectedWork = JSON.parse(sessionStorage.getItem("selectedWork"));
  if (!selectedWork) { window.location.href = "schedule.html"; }

  document.getElementById("areaTitle").innerText = selectedWork.areaName;

  async function loadTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "<p>Finding tasks for this room...</p>";

    try {
      const q = query(collection(db, "tasks"), where("workId", "==", selectedWork.workId));
      const snap = await getDocs(q);

      list.innerHTML = ""; 

      if (snap.empty) {
        list.innerHTML = `<div class="empty-msg">No tasks found for ${selectedWork.areaName}</div>`;
        return;
      }

      snap.forEach(doc => {
        const data = doc.data();
        const taskText = data.Task;  
        
        if (taskText && taskText.trim() !== "" && taskText !== "0") {
          const row = document.createElement("div");
          row.className = "task-row";
          row.innerHTML = `
            <span class="task-name">${taskText}</span>
            <div class="check-btn" onclick="this.classList.toggle('done')"></div>
          `;
          list.appendChild(row);
        }
      });

    } catch (err) {
      console.error("Fetch Error:", err);
      // This will immediately print the bug to the screen if it crashes again
      list.innerHTML = `<p style="color:red; font-weight:bold;">Error: ${err.message}</p>`;
    }
  }

  loadTasks();
</script>
</body>
</html>
