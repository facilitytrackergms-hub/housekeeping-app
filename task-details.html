<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Area Checklist</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #eef2f7; }
    .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 18px; }
    input[type="checkbox"] { width: 28px; height: 28px; margin-right: 15px; }
    .done-btn { margin-top: 25px; width: 100%; padding: 22px; background: #1c7a32; color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="areaTitle">Loading...</h2>
    <div id="checklist"></div>
    <button class="done-btn" onclick="finish()">FINISH AREA</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const sel = JSON.parse(sessionStorage.getItem("selectedDailyTask"));
    const user = JSON.parse(sessionStorage.getItem("currentEmployee"));

    document.getElementById("areaTitle").innerText = sel.assignment;

    async function load() {
      const q = query(collection(db, sel.source), where("Area", "==", sel.assignment));
      const snap = await getDocs(q);
      const list = document.getElementById("checklist");
      snap.forEach(doc => {
        list.innerHTML += `<div class="item"><input type="checkbox"> ${doc.data().Task}</div>`;
      });
    }

    window.finish = async function() {
      await addDoc(collection(db, "logs"), {
        employeeName: user.employeeName,
        area: sel.assignment,
        timestamp: serverTimestamp()
      });
      window.location.href = "schedule.html";
    };

    load();
  </script>
</body>
</html>
