<!DOCTYPE html>
<html>

<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .view-center {
      text-align: center;
    }

    .admin-dashboard-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.4px;
      color: white;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      border-radius: 14px;
      padding: 7px 10px;
      margin: 0 0 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 2px 8px rgba(13,71,161,0.25);
    }

    .admin-mode-toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin: 0 0 8px;
    }

    .admin-mode-toggle-row button {
      min-height: 38px;
      font-size: 14px;
      padding: 8px 6px;
      margin: 0;
      border-radius: 12px;
      background: #e6e6e6;
      color: #111;
      border: 1px solid #bbb;
    }

    .admin-mode-toggle-row button.active-mode {
      background: #0d47a1;
      color: white;
      border-color: #0d47a1;
    }

    .admin-dashboard-subtitle {
      font-size: 13px;
      font-weight: 900;
      color: #333;
      margin: 8px 0 4px;
      line-height: 1.15;
    }

    .app-version-label {
