<!DOCTYPE html>
<html>

<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    label {
      font-size: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      margin: 6px 0 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 17px;
      font-weight: bold;
      padding: 11px;
      margin: 5px 0;
      cursor: pointer;
    }

    .assignment-title {
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 6px;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    /* =========================
       03 - BUTTON GRIDS
    ========================== */

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 58px;
      font-size: 16px;
      padding: 7px 5px;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin: 0;
    }

    .room-number {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.1;
    }

    .room-counter {
      font-size: 14px;
      font-weight: bold;
      margin-top: 2px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .button-row button {
      font-size: 15px;
      padding: 10px 6px;
      margin: 0;
    }

    .button-row-three {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .button-row-three button {
      font-size: 14px;
      padding: 10px 4px;
      margin: 0;
    }

    /* =========================
       04 - EDIT CARDS
    ========================== */

    .task-card {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      background: #fafafa;
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin: 8px 0;
    }

    .check-item {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 8px;
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fafafa;
    }

    .check-item input {
      width: auto;
      margin: 0;
    }

    #adminMessage,
    #employeeMessage {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    /* =========================
       05 - LOADING SCREEN STYLE
    ========================== */

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* =========================
       05B - CUSTOM MESSAGE POPUP
    ========================== */

    .app-message-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100000;
      padding: 18px;
    }

    .app-message-card {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.25);
      text-align: center;
    }

    .app-message-card h3 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .app-message-card p {
      margin: 0 0 14px;
      font-size: 17px;
      font-weight: bold;
      line-height: 1.3;
    }

    .app-message-card button {
      margin-top: 4px;
    }

  </style>
</head>

<body>

<div class="card">

  <!-- =========================
       06 - ADMIN VIEW 2 - MAIN DASHBOARD
  ========================== -->

  <div id="adminView2">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 2</div>
    </div>

    <label>Assignment</label>
    <select id="adminAssignmentSelect" onchange="changeAdminAssignment()">
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <div id="adminCategoryButtons" class="rooms-grid"></div>

  </div>

  <!-- =========================
       07 - ADMIN VIEW 3 / 4 / 5 / 6 - AREA LIST
  ========================== -->

  <div id="adminAreaView" class="hidden">

    <div class="view-center">
      <div class="view-tag" id="adminAreaViewTag">ADMIN VIEW 3</div>
    </div>

    <div class="assignment-title" id="adminAreaAssignmentTitle"></div>
    <h2 id="adminAreaTitle">Area</h2>

    <div id="adminAreaBigDatePickerBox" class="hidden">
      <h3 id="adminAreaDateTitle"></h3>

      <input
        type="date"
        id="adminBigDatePicker"
        onchange="changeAdminWorkDateFromBigPicker()"
      >
    </div>

    <input
      id="adminAreaSearchInput"
      class="hidden"
      placeholder="Search room"
      oninput="searchAdminAreas()"
    >

    <button id="adminAddAreaButton" class="green" onclick="openNewAdminArea()">
      ADD NEW AREA
    </button>

    <div id="adminBulkTaskBox" class="task-card hidden">
      <h3>Default Tasks</h3>
      <div id="adminBulkTaskChecks" class="check-grid"></div>

      <div class="button-row">
        <button class="green" onclick="addCheckedTasksToAllAreas()">ADD TO ALL</button>
        <button class="red" onclick="deleteCheckedTasksFromAllAreas()">DELETE FROM ALL</button>
      </div>
    </div>

    <div id="adminAreaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       08 - ADMIN VIEW 7 - EDIT AREA / TASKS
  ========================== -->

  <div id="adminEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 7</div>
    </div>

    <div class="assignment-title" id="adminEditAssignmentTitle"></div>
    <h2 id="adminEditTitle">Edit Area</h2>

    <label>Area Name</label>
    <input id="adminEditAreaInput">

    <label>Assignment</label>
    <select id="adminEditAssignmentInput">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <select id="adminEditCategoryInput" class="hidden">
      <option value="">Select category</option>
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
      <option>Weekly Laundry</option>
      <option>Daily Laundry Check</option>
    </select>

    <div id="adminAreaScheduleBox" class="hidden">
      <label>Schedule Day</label>
      <select id="adminAreaScheduleInput" onchange="changeAdminAreaScheduleDay()">
        <option value="">Select day</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
      </select>
    </div>

    <div id="adminSingleTaskBox" class="task-card hidden">
      <h3>Default Tasks</h3>
      <div id="adminSingleTaskChecks" class="check-grid"></div>

      <div class="button-row">
        <button class="green" onclick="addCheckedTasksToSingleArea()">ADD TO ROOM</button>
        <button class="red" onclick="deleteCheckedTasksFromSingleArea()">DELETE FROM ROOM</button>
      </div>
    </div>

    <h3>Sub Tasks</h3>

    <button class="green" onclick="openNewAdminSubTask()">ADD NEW SUB TASK</button>

    <div id="adminSubtaskButtons" class="rooms-grid"></div>

    <div id="adminSubtaskEditor" class="task-card hidden">

      <div class="view-center">
        <div class="view-tag" id="adminSubtaskViewTag">ADMIN VIEW 7-1</div>
      </div>

      <div class="assignment-title" id="adminSubtaskAssignmentTitle"></div>
      <h3 id="adminSubtaskEditorTitle">Edit Sub Task</h3>

      <label>Task Name</label>
      <input id="adminTaskNameInput" list="taskNameOptions" placeholder="Type or choose task">

      <datalist id="taskNameOptions"></datalist>

      <div id="adminTaskScheduleBox" class="hidden">
        <label>Schedule Day</label>
        <select id="adminTaskScheduleInput">
          <option value="">Select day</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option>Sunday</option>
        </select>
      </div>

      <div class="button-row">
        <button class="green" onclick="saveAdminSubTask()">SAVE ROOM</button>
        <button id="saveAllWeeklyButton" class="yellow hidden" onclick="saveAdminSubTaskToAllWeeklyRooms()">SAVE ALL</button>
      </div>

      <div class="button-row">
        <button class="red" onclick="deleteAdminSubTask()">DELETE</button>
        <button class="back" onclick="closeAdminSubTaskEditor()">CANCEL</button>
      </div>

    </div>

    <div class="button-row-three">
      <button class="green" onclick="saveAdminAreaOnly()">SAVE</button>
      <button class="red" id="deleteAreaButton" onclick="deleteAdminArea()">DELETE AREA</button>
      <button class="back" onclick="backToAdminAreas()">BACK</button>
    </div>

    <p id="adminMessage"></p>

  </div>

  <!-- =========================
       09 - ADMIN VIEW 8 - EMPLOYEES LIST
  ========================== -->

  <div id="adminEmployeesView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 8 - EMPLOYEES</div>
    </div>

    <div class="assignment-title" id="adminEmployeesAssignmentTitle"></div>
    <h2>Employees</h2>

    <button class="green" onclick="openNewEmployee()">ADD EMPLOYEE</button>

    <div id="employeeList"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       10 - ADMIN VIEW 9 - EDIT EMPLOYEE
  ========================== -->

  <div id="adminEmployeeEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 9 - EDIT EMPLOYEE</div>
    </div>

    <div class="assignment-title" id="adminEmployeeEditAssignmentTitle"></div>
    <h2 id="employeeEditTitle">Employee</h2>

    <label>First Name</label>
    <input id="empFirstName">

    <label>Last Name</label>
    <input id="empLastName">

    <label>PIN</label>
    <input id="empPin">

    <label>Assignment</label>
    <select id="empAssignment">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>Role</label>
    <select id="empRole">
      <option value="">Select role</option>
      <option value="employee">employee</option>
      <option value="admin">admin</option>
    </select>

    <label>Active</label>
    <select id="empActive">
      <option value="">Select active</option>
      <option value="true">true</option>
      <option value="false">false</option>
    </select>

    <div class="button-row">
      <button class="green" onclick="saveEmployee()">SAVE</button>
      <button class="red" onclick="deleteEmployee()">DELETE</button>
    </div>

    <p id="employeeMessage"></p>

    <button class="back" onclick="openEmployees()">BACK</button>

  </div>

  <!-- =========================
       10B - ADMIN VIEW 10 - REASSIGNMENT
  ========================== -->

  <div id="adminReassignmentView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 10</div>
    </div>

    <h2>Reassignment</h2>

    <label>From</label>
    <select id="reassignFrom">
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>To</label>
    <select id="reassignTo">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>Category</label>
    <select id="reassignCategory" onchange="changeReassignmentCategory()">
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
      <option>Weekly Laundry</option>
      <option>Daily Laundry Check</option>
    </select>

    <div id="reassignDateBox" class="hidden">
      <h3 id="reassignDateTitle"></h3>

      <input
        type="date"
        id="reassignDatePicker"
        onchange="changeReassignmentDate()"
      >
    </div>

   <div class="button-row">

  <button class="green" onclick="loadReassignmentAreas()">
    LOAD
  </button>

  <button class="yellow" onclick="checkAssignmentCounts()">
    CHECK COUNT
  </button>

</div>

    <div id="reassignmentAreaList" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

</div>

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<div id="appMessageBox" class="app-message-bg hidden">
  <div class="app-message-card">
    <h3 id="appMessageTitle">Message</h3>
    <p id="appMessageText"></p>
    <button class="green" onclick="closeAppMessage()">OK</button>
  </div>
</div>


<script type="module">

  /* =========================
     11 - FIREBASE IMPORTS
  ========================== */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  /* =========================
     12 - FIREBASE CONFIG
  ========================== */

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* =========================
     13 - SESSION DATA
  ========================== */

  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

  if (!sessionData) {
    window.location.href = "index.html";
  }

  /* =========================
     14 - GLOBAL ADMIN VARIABLES
  ========================== */

  let currentAssignment =
    sessionData.assignment ||
    "HK Schedule 1";

  let currentWorkDateISO = getTodayISO();
  let currentWorkDayName = "";

  let reassignWorkDateISO = getTodayISO();
  let reassignWorkDayName = "";

  let selectedCategory = "";
  let selectedArea = "";
  let selectedAreaScheduleDay = "";
  let adminAreaSearchTerm = "";

  let allTasksForDay = [];
  let allTasksForAssignment = [];
  let currentAreaTasks = [];

  let currentEmployeeId = "";

  let currentEditingTaskId = "";
  let currentEditingTaskIndex = -1;
  let originalEditingTaskName = "";

  const DEFAULT_WEEKLY_ROOM_TASKS = [
    "Vac",
    "Fridge",
    "Bath",
    "Mop",
    "Toilet",
    "Sink",
    "Dust",
    "Bed",
    "AC Filter"
  ];

  const DEFAULT_DAILY_ROOM_TASKS = [
    "Clean"
  ];

  /* =========================
     15 - ADMIN STARTUP
  ========================== */

  startAdmin();

  async function startAdmin() {
    document.getElementById("adminAssignmentSelect").value = currentAssignment;
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     16 - LOADING FUNCTIONS
  ========================== */

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  /* =========================
     16B - CUSTOM MESSAGE FUNCTIONS
  ========================== */

  function showAppMessage(message, title) {
    document.getElementById("appMessageTitle").innerText =
      title || "Notice";

    document.getElementById("appMessageText").innerText =
      message;

    document.getElementById("appMessageBox").classList.remove("hidden");
  }

  function closeAppMessage() {
    document.getElementById("appMessageBox").classList.add("hidden");
  }


  /* =========================
     17 - VIEW SWITCHING
  ========================== */

  function showAdminView(viewId) {
    [
      "adminView2",
      "adminAreaView",
      "adminEditView",
      "adminEmployeesView",
      "adminEmployeeEditView",
      "adminReassignmentView"
    ].forEach(function(id) {
      const el = document.getElementById(id);

      if (el) {
        el.classList.add("hidden");
      }
    });

    updateAssignmentTitles();

    document.getElementById(viewId).classList.remove("hidden");
  }

  function updateAssignmentTitles() {
    [
      "adminAreaAssignmentTitle",
      "adminEditAssignmentTitle",
      "adminSubtaskAssignmentTitle",
      "adminEmployeesAssignmentTitle",
      "adminEmployeeEditAssignmentTitle"
    ].forEach(function(id) {
      const el = document.getElementById(id);

      if (el) {
        el.innerText = currentAssignment;
      }
    });
  }

  /* =========================
     18 - DATE FUNCTIONS
  ========================== */

  function getTodayISO() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");

    return yyyy + "-" + mm + "-" + dd;
  }

  function updateDateDisplay() {
    const date = new Date(currentWorkDateISO + "T00:00:00");

    const weekdays = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];

    currentWorkDayName = weekdays[date.getDay()];
  }

  function updateReassignmentDateDisplay() {
    const date = new Date(reassignWorkDateISO + "T00:00:00");

    const weekdays = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];

    reassignWorkDayName = weekdays[date.getDay()];

    const title = document.getElementById("reassignDateTitle");

    if (title) {
      title.innerText = reassignWorkDayName;
    }
  }

  async function changeAdminWorkDateFromBigPicker() {
    const picker = document.getElementById("adminBigDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAdminTasks();

    if (selectedCategory) {
      drawAdminAreaButtons(selectedCategory);
      showAdminView("adminAreaView");
    }
  }

  /* =========================
     19 - ASSIGNMENT CHANGE
  ========================== */

  async function changeAdminAssignment() {
    currentAssignment = document.getElementById("adminAssignmentSelect").value;
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     20 - LOAD TASKS FROM FIRESTORE
  ========================== */

  async function loadAdminTasks() {
    showLoading();

    updateDateDisplay();
    updateAssignmentTitles();

    const dateTitle = document.getElementById("adminAreaDateTitle");

    if (dateTitle) {
      dateTitle.innerText = currentWorkDayName;
    }

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", currentAssignment)
    );

    const taskSnap = await getDocs(taskQuery);

    allTasksForAssignment =
      taskSnap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    updateTaskNameOptions();

    allTasksForDay =
      allTasksForAssignment.filter(function(item) {
        const activeValue = item.active;

        if (activeValue === false || activeValue === "No") {
          return false;
        }

        const schedule =
          String(item.schedule || "").trim().toLowerCase();

        const scheduleDate =
          String(item.scheduleDate || "").trim();

        if (scheduleDate && scheduleDate === currentWorkDateISO) {
          return true;
        }

        return (
          schedule === "daily" ||
          schedule === "weekly" ||
          schedule === currentWorkDayName.toLowerCase()
        );
      });

    drawAdminCategories();

    hideLoading();
  }

  /* =========================
     21 - UPDATE TASK NAME OPTIONS
  ========================== */

  function updateTaskNameOptions() {
    const list = document.getElementById("taskNameOptions");

    if (!list) return;

    list.innerHTML = "";

    const names =
      [...new Set(allTasksForAssignment.map(function(task) {
        return String(task.task || "").trim();
      }).filter(function(name) {
        return name !== "";
      }))];

    names.forEach(function(name) {
      const option = document.createElement("option");
      option.value = name;
      list.appendChild(option);
    });
  }

  /* =========================
     22 - DRAW CATEGORY BUTTONS
  ========================== */

  function drawAdminCategories() {
    const box = document.getElementById("adminCategoryButtons");
    box.innerHTML = "";

    const buttons =
      currentAssignment === "Laundry"
        ? ["Weekly Laundry", "Daily Laundry Check", "Reassignment", "Employees", "Logout"]
        : ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier", "Reassignment", "Employees", "Logout"];

    buttons.forEach(function(item) {
      const btn = document.createElement("button");

      btn.innerText = item;

      if (item === "Logout") {
        btn.className = "back";
        btn.onclick = logout;
      } else {
        btn.className = "yellow";

        if (item === "Employees") {
          btn.onclick = openEmployees;

  /* =========================

  ========================== */

  async function addCheckedTasksToAllAreas() {
    const checkedTasks = getCheckedTaskNames("bulkTaskCheck");

    if (checkedTasks.length === 0) {
      alert("Select tasks.");
      return;
    }

    const schedule = getScheduleForBulkTask();

    const areas =
      [...new Set(allTasksForAssignment.filter(function(task) {
        return (
          task.category === selectedCategory &&
          String(task.schedule || "").trim().toLowerCase() === String(schedule || "").trim().toLowerCase()
        );
      }).map(function(task) {
        return task.area;
      }).filter(function(area) {
        return String(area || "").trim() !== "";
      }))];

    if (areas.length === 0) {
      alert("No rooms found.");
      return;
    }

    const ok = confirm("Add checked tasks to all " + areas.length + " rooms? Duplicates will be skipped.");
    if (!ok) return;

    showLoading();

    let addedCount = 0;

    for (let a = 0; a < areas.length; a++) {
      const area = areas[a];

      for (let t = 0; t < checkedTasks.length; t++) {
        const taskName = checkedTasks[t];

        const exists =
          allTasksForAssignment.some(function(task) {
            return (
              task.assignment === currentAssignment &&
              task.category === selectedCategory &&
              task.area === area &&
              String(task.task || "").trim().toLowerCase() === taskName.toLowerCase() &&
              String(task.schedule || "").trim().toLowerCase() === schedule.toLowerCase()
            );
          });

        if (!exists) {
          await addDoc(collection(db, "tasks"), {
            assignment: currentAssignment,
            category: selectedCategory,
            area: area,
            task: taskName,
            schedule: schedule,
            active: true,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          addedCount++;
        }
      }
    }

    await loadAdminTasks();
    drawAdminAreaButtons(selectedCategory);

    hideLoading();

    alert("Added " + addedCount + " missing tasks.");
  }

      }

      tasksToDelete =
        currentAreaTasks.filter(function(task) {
          return String(task.schedule || "").trim().toLowerCase() ===
            String(selectedAreaScheduleDay || "").trim().toLowerCase();
        });

      confirmText = "Delete only " + selectedAreaScheduleDay + " tasks for this room?";
    }

    if (tasksToDelete.length === 0) {
      alert("No tasks found for this day.");
      return;
    }

    const ok = confirm(confirmText);
    if (!ok) return;

    showLoading();

    for (let i = 0; i < tasksToDelete.length; i++) {
      await deleteDoc(doc(db, "tasks", tasksToDelete[i].id));
    }

    await loadAdminTasks();

    if (selectedArea) {
      openAdminEditArea(selectedArea);
    } else {
      showAdminView("adminAreaView");
    }

    hideLoading();
  }

    drawAdminAreaButtons(selectedCategory);

     44 - OPEN EMPLOYEES
  ========================== */

  async function openEmployees() {

    const snap = await getDocs(collection(db, "employees"));

      return {

    });

    employees.forEach(function(emp) {

      const name =
        ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||

        emp.name ||

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(name) + '</div>' +

      const empty = document.createElement("h3");

     45 - OPEN NEW EMPLOYEE

    document.getElementById("employeeEditTitle").innerText = "New Employee";

    document.getElementById("empAssignment").value = "";
    document.getElementById("empRole").value = "";
    document.getElementById("empActive").value = "";

  /* =========================
     46 - OPEN EXISTING EMPLOYEE
  ========================== */

  function openEmployeeEditor(emp) {
    currentEmployeeId = emp.id;

    const name =
      ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
      emp.employeeName ||
      emp.name ||
      "Employee";

    document.getElementById("employeeEditTitle").innerText = name;
    document.getElementById("empFirstName").value = emp.firstName || "";
    document.getElementById("empLastName").value = emp.lastName || "";

    document.getElementById("empRole").value = emp.role || "";

  /* =========================
     47 - SAVE EMPLOYEE
  ========================== */

  async function saveEmployee() {
    const firstName = document.getElementById("empFirstName").value.trim();
    const lastName = document.getElementById("empLastName").value.trim();
    const pin = document.getElementById("empPin").value.trim();
    const assignment = document.getElementById("empAssignment").value;
    const role = document.getElementById("empRole").value;
    const activeValue = document.getElementById("empActive").value;

    if (!firstName || !pin || !assignment || !role || !activeValue) {
      alert("Fill first name, PIN, assignment, role, and active.");
      return;
    }

    const active = activeValue === "true";

    showLoading();

    const data = {
      firstName: firstName,
      lastName: lastName,
      pin: pin,
      assignment: assignment,
      role: role,
      active: active,
      updatedAt: serverTimestamp()
    };

    if (currentEmployeeId) {
      await updateDoc(doc(db, "employees", currentEmployeeId), data);
    } else {
      data.createdAt = serverTimestamp();
      const newDoc = await addDoc(collection(db, "employees"), data);
      currentEmployeeId = newDoc.id;
    }

    hideLoading();

    document.getElementById("employeeMessage").innerText = "Saved.";
  }

  /* =========================
     48 - DELETE EMPLOYEE
  ========================== */

  async function deleteEmployee() {
    if (!currentEmployeeId) {
      openEmployees();
      return;
    }

    const ok = confirm("Delete this employee?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "employees", currentEmployeeId));

    hideLoading();

    openEmployees();
  }

  /* =========================
     48A - DUPLICATE TASK CHECK
  ========================== */

  async function taskAlreadyExistsInTargetAssignment(task, targetAssignment) {
    const duplicateQuery = query(
      collection(db, "tasks"),
      where("area", "==", task.area),
      where("category", "==", task.category),
      where("task", "==", task.task),
      where("schedule", "==", task.schedule),
      where("assignment", "==", targetAssignment)
    );

    const snap = await getDocs(duplicateQuery);

    return snap.docs.some(function(docSnap) {
      return docSnap.id !== task.id;
    });
  }

  async function findDuplicateTaskForTargetAssignment(tasks, targetAssignment) {
    for (let i = 0; i < tasks.length; i++) {
      const exists = await taskAlreadyExistsInTargetAssignment(
        tasks[i],
        targetAssignment
      );

      if (exists) {
        return tasks[i];
      }
    }

    return null;
  }

  /* =========================
     48B - REASSIGNMENT
  ========================== */

  async function openReassignment() {
    reassignWorkDateISO = currentWorkDateISO;
    updateReassignmentDateDisplay();

    document.getElementById("reassignFrom").value = currentAssignment;
    document.getElementById("reassignTo").value = "";
    document.getElementById("reassignCategory").value = "Common Area";
    document.getElementById("reassignDatePicker").value = reassignWorkDateISO;
    document.getElementById("reassignmentAreaList").innerHTML = "";

    setReassignmentDateVisibility();

    showAdminView("adminReassignmentView");
  }

  function setReassignmentDateVisibility() {
    const category = document.getElementById("reassignCategory").value;
    const box = document.getElementById("reassignDateBox");

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      box.classList.remove("hidden");
    } else {
      box.classList.add("hidden");
    }
  }

  async function changeReassignmentCategory() {
    setReassignmentDateVisibility();
    document.getElementById("reassignmentAreaList").innerHTML = "";
  }

  async function changeReassignmentDate() {
    const picker = document.getElementById("reassignDatePicker");

    if (!picker.value) return;

    reassignWorkDateISO = picker.value;
    updateReassignmentDateDisplay();

    await loadReassignmentAreas();
  }

  function filterReassignmentTasksByDate(tasks, category) {
    if (category !== "Weekly Room" && category !== "Weekly Laundry") {
      return tasks;
    }

    return tasks.filter(function(task) {
      return String(task.schedule || "").trim().toLowerCase() ===
        String(reassignWorkDayName || "").trim().toLowerCase();
    });
  }

  async function loadReassignmentAreas() {
    const fromAssignment = document.getElementById("reassignFrom").value;
    const category = document.getElementById("reassignCategory").value;

    if (!fromAssignment || !category) {
      showAppMessage("Select from and category.");
      return;
    }

    updateReassignmentDateDisplay();
    setReassignmentDateVisibility();

    showLoading();

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", fromAssignment),
      where("category", "==", category)
    );

    const snap = await getDocs(taskQuery);

    let tasks =
      snap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    tasks = filterReassignmentTasksByDate(tasks, category);

    const areas =
      [...new Set(tasks.map(function(task) {
        return task.area;
      }).filter(function(area) {
        return String(area || "").trim() !== "";
      }))];

    const box = document.getElementById("reassignmentAreaList");
    box.innerHTML = "";

    areas.forEach(function(area) {
      const count =
        tasks.filter(function(task) {
          return task.area === area;
        }).length;

      const btn = document.createElement("button");

      btn.className = "yellow";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(area) + '</div>' +
        '<div class="room-counter">' + count + ' TASKS</div>';

      btn.onclick = function() {
        moveReassignmentArea(area);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");

      if (category === "Weekly Room" || category === "Weekly Laundry") {
        empty.innerText = "No areas found for " + reassignWorkDayName + ".";
      } else {
        empty.innerText = "No areas found.";
      }

      box.appendChild(empty);
    }

    hideLoading();
  }

  async function moveReassignmentArea(area) {
    const fromAssignment = document.getElementById("reassignFrom").value;
    const toAssignment = document.getElementById("reassignTo").value;
    const category = document.getElementById("reassignCategory").value;

    if (!fromAssignment || !toAssignment || !category) {
      showAppMessage("Select from, to, and category.");
      return;
    }

    if (fromAssignment === toAssignment) {
      showAppMessage("This assignment is already on the schedule. Choose another assignment.");
      return;
    }

    updateReassignmentDateDisplay();

    let confirmText =
      "Move " +
      area +
      " to " +
      toAssignment +
      "?";

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      confirmText =
        "Move " +
        area +
        " " +
        reassignWorkDayName +
        " tasks to " +
        toAssignment +
        "?";
    }

    const ok = confirm(confirmText);

    if (!ok) return;

    showLoading();

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", fromAssignment),
      where("category", "==", category),
      where("area", "==", area)
    );

    const snap = await getDocs(taskQuery);

    let tasks =
      snap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    tasks = filterReassignmentTasksByDate(tasks, category);

    const duplicateTask =
      await findDuplicateTaskForTargetAssignment(
        tasks,
        toAssignment
      );

    if (duplicateTask) {
      hideLoading();

      showAppMessage(
        "Cannot duplicate assignments. " +
        duplicateTask.area +
        " / " +
        duplicateTask.task +
        " / " +
        duplicateTask.schedule +
        " already exists in " +
        toAssignment +
        "."
      );

      return;
    }

    for (let i = 0; i < tasks.length; i++) {
      await updateDoc(
        doc(db, "tasks", tasks[i].id),
        {
          assignment: toAssignment,
          updatedAt: serverTimestamp()
        }
      );
    }

    await loadAdminTasks();

    hideLoading();

    showAppMessage("Moved.");

    await loadReassignmentAreas();
  }


  async function checkAssignmentCounts() {
    const category = document.getElementById("reassignCategory").value;

    if (!category) {
      showAppMessage("Select category.");
      return;
    }

    updateReassignmentDateDisplay();
    setReassignmentDateVisibility();

    showLoading();

    const taskQuery = query(
      collection(db, "tasks"),
      where("category", "==", category)
    );

    const snap = await getDocs(taskQuery);

    let tasks =
      snap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    tasks = filterReassignmentTasksByDate(tasks, category);

    const assignments = [
      "HK Schedule 1",
      "HK Schedule 2",
      "Laundry"
    ];

    let message = "";

    assignments.forEach(function(assignment) {
      const areas =
        [...new Set(tasks.filter(function(task) {
          return task.assignment === assignment;
        }).map(function(task) {
          return task.area;
        }).filter(function(area) {
          return String(area || "").trim() !== "";
        }))];

      message += assignment + ": " + areas.length + " rooms\n";
    });

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      message = category + " - " + reassignWorkDayName + "\n\n" + message;
    } else {
      message = category + "\n\n" + message;
    }

    hideLoading();

    showAppMessage(message, "Assignment Workload");
  }

  /* =========================
     49 - LOGOUT
  ========================== */

  function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }

  /* =========================
     50 - HTML ESCAPE HELPER
  ========================== */

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* =========================
     51 - SCHEDULE HELPER
  ========================== */

  function getScheduleForSubTask(category) {
    if (category === "Weekly Room" || category === "Weekly Laundry") {
      const selectedDay = document.getElementById("adminTaskScheduleInput").value;

      if (!selectedDay) {
        alert("Select schedule day.");
        throw new Error("Missing schedule day");
      }

      return selectedDay;
    }

    return "daily";
  }
