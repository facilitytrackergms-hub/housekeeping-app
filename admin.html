<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 8px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    label {
      font-size: 18px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      font-size: 20px;
      padding: 12px;
      margin: 8px 0 14px;
      border-radius: 14px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 80px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1976d2;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 14px;
      margin: 6px 0;
      cursor: pointer;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 64px;
      font-size: 18px;
      padding: 8px 6px;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      margin: 0;
    }

    .room-number {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.1;
    }

    .room-counter {
      font-size: 15px;
      font-weight: bold;
      margin-top: 3px;
    }

    .task-card {
      border: 1px solid #ccc;
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      background: #fafafa;
    }

    .task-card h3 {
      margin-bottom: 6px;
    }

    .small-row {
      display: flex;
      gap: 8px;
    }

    .small-row button {
      flex: 1;
      font-size: 16px;
      padding: 10px;
    }

    #adminMessage,
    #employeeMessage {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div class="card">

  <div id="adminView2">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 2</div>
    </div>

    <h2>Admin Dashboard</h2>

    <label>Assignment</label>
    <input id="adminAssignmentInput" value="HK Schedule 1">

    <button onclick="openAdminCategory('Common Area')">COMMON AREA</button>
    <button onclick="openAdminCategory('Weekly Room')">WEEKLY ROOM</button>
    <button onclick="openAdminCategory('Daily Room')">DAILY ROOM</button>
    <button onclick="openAdminCategory('Dehumidifier')">DEHUMIDIFIER</button>

    <button class="yellow" onclick="openEmployees()">EMPLOYEES</button>

    <button class="back" onclick="goLogin()">BACK TO LOGIN</button>

  </div>

  <div id="adminAreaView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 3</div>
    </div>

    <h2 id="adminCategoryTitle"></h2>

    <button class="green" onclick="openNewAdminArea()">
      ADD NEW AREA
    </button>

    <div id="adminAreaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminHome()">BACK</button>

  </div>

  <div id="adminAreaEditorView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN AREA EDIT</div>
    </div>

    <h2 id="adminAreaEditorTitle">Area Editor</h2>

    <label>Area Name</label>
    <input id="adminEditAreaInput">

    <label>Assignment</label>
    <input id="adminEditAssignmentInput">

    <label>Category</label>
    <select id="adminEditCategoryInput">
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
    </select>

    <h3>Sub Tasks</h3>

    <div id="adminSubtaskList"></div>

    <h3>Add New Sub Task</h3>

    <label>Sub Task Name</label>
    <input id="adminNewTaskInput" placeholder="Example: Clean sink">

    <label>Schedule Day</label>
    <select id="adminNewScheduleInput">
      <option value="daily">daily</option>
      <option value="Sunday">Sunday</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>

    <label>Schedule Date</label>
    <input id="adminNewDateInput" type="date">

    <label>Start Time</label>
    <input id="adminNewStartTimeInput" type="time">

    <label>End Time</label>
    <input id="adminNewEndTimeInput" type="time">

    <button class="green" onclick="addAdminSubtask()">ADD SUB TASK</button>

    <button class="green" onclick="saveAdminAreaChanges()">SAVE AREA CHANGES</button>

    <button class="red" onclick="deleteAdminArea()">DELETE WHOLE AREA</button>

    <p id="adminMessage"></p>

    <button class="back" onclick="backToAdminAreas()">BACK</button>

  </div>

  <div id="adminEmployeesView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN EMPLOYEES</div>
    </div>

    <h2>Employees</h2>

    <button class="green" onclick="openNewEmployee()">ADD EMPLOYEE</button>

    <div id="employeeList"></div>

    <button class="back" onclick="backToAdminHome()">BACK</button>

  </div>

  <div id="adminEmployeeEditorView" class="hidden">

    <div class="view-center">
      <div class="view-tag">EDIT EMPLOYEE</div>
    </div>

    <h2 id="employeeEditTitle">Employee</h2>

    <label>First Name</label>
    <input id="empFirstName">

    <label>Last Name</label>
    <input id="empLastName">

    <label>PIN</label>
    <input id="empPin">

    <label>Assignment</label>
    <input id="empAssignment">

    <label>Role</label>
    <select id="empRole">
      <option value="employee">employee</option>
      <option value="admin">admin</option>
    </select>

    <label>Active</label>
    <select id="empActive">
      <option value="true">true</option>
      <option value="false">false</option>
    </select>

    <button class="green" onclick="saveEmployee()">SAVE EMPLOYEE</button>
    <button class="red" onclick="deleteEmployee()">DELETE EMPLOYEE</button>

    <p id="employeeMessage"></p>

    <button class="back" onclick="openEmployees()">BACK</button>

  </div>

</div>

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let adminSelectedCategory = "";
  let adminSelectedAssignment = "";
  let adminSelectedArea = "";

  let adminAllCategoryTasks = [];
  let adminCurrentAreaTasks = [];

  let currentEmployeeId = "";
  let currentEmployeeData = null;

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  function showAdminView(viewId) {
    [
      "adminView2",
      "adminAreaView",
      "adminAreaEditorView",
      "adminEmployeesView",
      "adminEmployeeEditorView"
    ].forEach(function(id) {
      document.getElementById(id).classList.add("hidden");
    });

    document.getElementById(viewId).classList.remove("hidden");
  }

  function getAdminAssignment() {
    return document.getElementById("adminAssignmentInput").value.trim() || "HK Schedule 1";
  }

  async function openAdminCategory(category) {
    adminSelectedCategory = category;
    adminSelectedAssignment = getAdminAssignment();

    document.getElementById("adminCategoryTitle").innerText = category;

    await loadAdminCategoryAreas();

    showAdminView("adminAreaView");
  }

  async function loadAdminCategoryAreas() {
    showLoading();

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", adminSelectedAssignment),
      where("category", "==", adminSelectedCategory)
    );

    const taskSnap = await getDocs(taskQuery);

    adminAllCategoryTasks = taskSnap.docs.map(function(taskDoc) {
      return {
        id: taskDoc.id,
        ...taskDoc.data()
      };
    });

    drawAdminAreaButtons();

    hideLoading();
  }

  function drawAdminAreaButtons() {
    const box = document.getElementById("adminAreaButtons");
    box.innerHTML = "";

    const areas = [...new Set(adminAllCategoryTasks.map(function(task) {
      return task.area;
    }))];

    areas.forEach(function(area) {
      const areaTasks = adminAllCategoryTasks.filter(function(task) {
        return task.area === area;
      });

      const btn = document.createElement("button");

      btn.className = "red";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(area) + '</div>' +
        '<div class="room-counter">' + areaTasks.length + ' TASKS</div>';

      btn.onclick = function() {
        openAdminAreaEditor(area);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const msg = document.createElement("h3");
      msg.innerText = "No tasks found.";
      box.appendChild(msg);
    }
  }

  function openAdminAreaEditor(area) {
    adminSelectedArea = area;

    adminCurrentAreaTasks = adminAllCategoryTasks.filter(function(task) {
      return task.area === area;
    });

    document.getElementById("adminAreaEditorTitle").innerText = area;
    document.getElementById("adminEditAreaInput").value = area;
    document.getElementById("adminEditAssignmentInput").value = adminSelectedAssignment;
    document.getElementById("adminEditCategoryInput").value = adminSelectedCategory;
    document.getElementById("adminMessage").innerText = "";
    document.getElementById("adminNewTaskInput").value = "";
    document.getElementById("adminNewDateInput").value = "";
    document.getElementById("adminNewStartTimeInput").value = "";
    document.getElementById("adminNewEndTimeInput").value = "";

    drawAdminSubtasks();

    showAdminView("adminAreaEditorView");
  }

  function openNewAdminArea() {
    adminSelectedArea = "";
    adminCurrentAreaTasks = [];

    document.getElementById("adminAreaEditorTitle").innerText = "New Area";
    document.getElementById("adminEditAreaInput").value = "";
    document.getElementById("adminEditAssignmentInput").value = adminSelectedAssignment;
    document.getElementById("adminEditCategoryInput").value = adminSelectedCategory;
    document.getElementById("adminMessage").innerText = "";
    document.getElementById("adminNewTaskInput").value = "";
    document.getElementById("adminNewDateInput").value = "";
    document.getElementById("adminNewStartTimeInput").value = "";
    document.getElementById("adminNewEndTimeInput").value = "";

    drawAdminSubtasks();

    showAdminView("adminAreaEditorView");
  }

  function drawAdminSubtasks() {
    const box = document.getElementById("adminSubtaskList");
    box.innerHTML = "";

    adminCurrentAreaTasks.forEach(function(task, index) {
      const div = document.createElement("div");
      div.className = "task-card";

      div.innerHTML =
        '<label>Sub Task Name</label>' +
        '<input id="adminTaskName_' + index + '" value="' + escapeHtml(task.task || "") + '">' +

        '<label>Schedule Day</label>' +
        '<select id="adminTaskSchedule_' + index + '">' +
          '<option value="daily">daily</option>' +
          '<option value="Sunday">Sunday</option>' +
          '<option value="Monday">Monday</option>' +
          '<option value="Tuesday">Tuesday</option>' +
          '<option value="Wednesday">Wednesday</option>' +
          '<option value="Thursday">Thursday</option>' +
          '<option value="Friday">Friday</option>' +
          '<option value="Saturday">Saturday</option>' +
        '</select>' +

        '<label>Schedule Date</label>' +
        '<input id="adminTaskDate_' + index + '" type="date">' +

        '<label>Start Time</label>' +
        '<input id="adminTaskStartTime_' + index + '" type="time">' +

        '<label>End Time</label>' +
        '<input id="adminTaskEndTime_' + index + '" type="time">' +

        '<label>Active</label>' +
        '<select id="adminTaskActive_' + index + '">' +
          '<option value="true">true</option>' +
          '<option value="false">false</option>' +
        '</select>' +

        '<div class="small-row">' +
          '<button class="green" onclick="saveAdminSingleTask(' + index + ')">SAVE</button>' +
          '<button class="red" onclick="deleteAdminSingleTask(' + index + ')">DELETE</button>' +
        '</div>';

      box.appendChild(div);

      document.getElementById("adminTaskSchedule_" + index).value =
        task.schedule || "daily";

      document.getElementById("adminTaskDate_" + index).value =
        task.scheduleDate || "";

      document.getElementById("adminTaskStartTime_" + index).value =
        task.startTime || "";

      document.getElementById("adminTaskEndTime_" + index).value =
        task.endTime || "";

      document.getElementById("adminTaskActive_" + index).value =
        task.active === false || task.active === "No" ? "false" : "true";
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No sub tasks yet.";
      box.appendChild(empty);
    }
  }

  async function addAdminSubtask() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    const taskName = document.getElementById("adminNewTaskInput").value.trim();
    const schedule = document.getElementById("adminNewScheduleInput").value;
    const scheduleDate = document.getElementById("adminNewDateInput").value;
    const startTime = document.getElementById("adminNewStartTimeInput").value;
    const endTime = document.getElementById("adminNewEndTimeInput").value;

    if (!area || !assignment || !category || !taskName) {
      alert("Fill area, assignment, category, and sub task name.");
      return;
    }

    showLoading();

    await addDoc(collection(db, "tasks"), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      scheduleDate: scheduleDate,
      startTime: startTime,
      endTime: endTime,
      active: true,
      updatedAt: serverTimestamp()
    });

    adminSelectedArea = area;
    adminSelectedAssignment = assignment;
    adminSelectedCategory = category;

    document.getElementById("adminAssignmentInput").value = assignment;

    await loadAdminCategoryAreas();
    openAdminAreaEditor(area);

    hideLoading();
  }

  async function saveAdminSingleTask(index) {
    const task = adminCurrentAreaTasks[index];

    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    const taskName = document.getElementById("adminTaskName_" + index).value.trim();
    const schedule = document.getElementById("adminTaskSchedule_" + index).value;
    const scheduleDate = document.getElementById("adminTaskDate_" + index).value;
    const startTime = document.getElementById("adminTaskStartTime_" + index).value;
    const endTime = document.getElementById("adminTaskEndTime_" + index).value;
    const active = document.getElementById("adminTaskActive_" + index).value === "true";

    if (!area || !assignment || !category || !taskName) {
      alert("Fill all required fields.");
      return;
    }

    showLoading();

    await updateDoc(doc(db, "tasks", task.id), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      scheduleDate: scheduleDate,
      startTime: startTime,
      endTime: endTime,
      active: active,
      updatedAt: serverTimestamp()
    });

    adminSelectedArea = area;
    adminSelectedAssignment = assignment;
    adminSelectedCategory = category;

    document.getElementById("adminAssignmentInput").value = assignment;

    await loadAdminCategoryAreas();
    openAdminAreaEditor(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Saved.";
  }

  async function saveAdminAreaChanges() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    if (!area || !assignment || !category) {
      alert("Fill area, assignment, and category.");
      return;
    }

    if (adminCurrentAreaTasks.length === 0) {
      alert("Add at least one sub task.");
      return;
    }

    showLoading();

    for (let i = 0; i < adminCurrentAreaTasks.length; i++) {
      const task = adminCurrentAreaTasks[i];

      const taskName = document.getElementById("adminTaskName_" + i).value.trim();
      const schedule = document.getElementById("adminTaskSchedule_" + i).value;
      const scheduleDate = document.getElementById("adminTaskDate_" + i).value;
      const startTime = document.getElementById("adminTaskStartTime_" + i).value;
      const endTime = document.getElementById("adminTaskEndTime_" + i).value;
      const active = document.getElementById("adminTaskActive_" + i).value === "true";

      await updateDoc(doc(db, "tasks", task.id), {
        assignment: assignment,
        category: category,
        area: area,
        task: taskName,
        schedule: schedule,
        scheduleDate: scheduleDate,
        startTime: startTime,
        endTime: endTime,
        active: active,
        updatedAt: serverTimestamp()
      });
    }

    adminSelectedArea = area;
    adminSelectedAssignment = assignment;
    adminSelectedCategory = category;

    document.getElementById("adminAssignmentInput").value = assignment;

    await loadAdminCategoryAreas();
    openAdminAreaEditor(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Area saved.";
  }

  async function deleteAdminSingleTask(index) {
    const task = adminCurrentAreaTasks[index];

    const ok = confirm("Delete this sub task?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "tasks", task.id));

    await loadAdminCategoryAreas();

    if (adminSelectedArea) {
      openAdminAreaEditor(adminSelectedArea);
    } else {
      showAdminView("adminAreaView");
    }

    hideLoading();
  }

  async function deleteAdminArea() {
    if (adminCurrentAreaTasks.length === 0) {
      backToAdminAreas();
      return;
    }

    const ok = confirm("Delete this whole area and all sub tasks?");
    if (!ok) return;

    showLoading();

    for (let i = 0; i < adminCurrentAreaTasks.length; i++) {
      await deleteDoc(doc(db, "tasks", adminCurrentAreaTasks[i].id));
    }

    await loadAdminCategoryAreas();

    hideLoading();

    showAdminView("adminAreaView");
  }

  async function backToAdminAreas() {
    await loadAdminCategoryAreas();
    showAdminView("adminAreaView");
  }

  async function openEmployees() {
    showLoading();

    const snap = await getDocs(collection(db, "employees"));

    const employees = snap.docs.map(function(empDoc) {
      return {
        id: empDoc.id,
        ...empDoc.data()
      };
    });

    const box = document.getElementById("employeeList");
    box.innerHTML = "";

    employees.forEach(function(emp) {
      const btn = document.createElement("button");

      const name =
        ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
        emp.employeeName ||
        emp.name ||
        "Employee";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(name) + '</div>' +
        '<div class="room-counter">PIN: ' + escapeHtml(emp.pin || "") + '</div>';

      btn.onclick = function() {
        openEmployeeEditor(emp);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No employees found.";
      box.appendChild(empty);
    }

    hideLoading();

    showAdminView("adminEmployeesView");
  }

  function openNewEmployee() {
    currentEmployeeId = "";
    currentEmployeeData = null;

    document.getElementById("employeeEditTitle").innerText = "New Employee";
    document.getElementById("empFirstName").value = "";
    document.getElementById("empLastName").value = "";
    document.getElementById("empPin").value = "";
    document.getElementById("empAssignment").value = "";
    document.getElementById("empRole").value = "employee";
    document.getElementById("empActive").value = "true";
    document.getElementById("employeeMessage").innerText = "";

    showAdminView("adminEmployeeEditorView");
  }

  function openEmployeeEditor(emp) {
    currentEmployeeId = emp.id;
    currentEmployeeData = emp;

    const name =
      ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
      emp.employeeName ||
      emp.name ||
      "Employee";

    document.getElementById("employeeEditTitle").innerText = name;
    document.getElementById("empFirstName").value = emp.firstName || "";
    document.getElementById("empLastName").value = emp.lastName || "";
    document.getElementById("empPin").value = emp.pin || "";
    document.getElementById("empAssignment").value = emp.assignment || "";
    document.getElementById("empRole").value = emp.role || "employee";
    document.getElementById("empActive").value =
      emp.active === false ? "false" : "true";
    document.getElementById("employeeMessage").innerText = "";

    showAdminView("adminEmployeeEditorView");
  }

  async function saveEmployee() {
    const firstName = document.getElementById("empFirstName").value.trim();
    const lastName = document.getElementById("empLastName").value.trim();
    const pin = document.getElementById("empPin").value.trim();
    const assignment = document.getElementById("empAssignment").value.trim();
    const role = document.getElementById("empRole").value;
    const active = document.getElementById("empActive").value === "true";

    if (!firstName || !pin) {
      alert("First name and PIN are required.");
      return;
    }

    showLoading();

    const data = {
      firstName: firstName,
      lastName: lastName,
      pin: pin,
      assignment: assignment,
      role: role,
      active: active,
      updatedAt: serverTimestamp()
    };

    if (currentEmployeeId) {
      await updateDoc(doc(db, "employees", currentEmployeeId), data);
    } else {
      data.createdAt = serverTimestamp();
      const newDoc = await addDoc(collection(db, "employees"), data);
      currentEmployeeId = newDoc.id;
    }

    hideLoading();

    document.getElementById("employeeMessage").innerText = "Employee saved.";
  }

  async function deleteEmployee() {
    if (!currentEmployeeId) {
      openEmployees();
      return;
    }

    const ok = confirm("Delete this employee?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "employees", currentEmployeeId));

    hideLoading();

    openEmployees();
  }

  function backToAdminHome() {
    showAdminView("adminView2");
  }

  function goLogin() {
    window.location.href = "index.html";
