<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; background: #eef2f7; padding: 20px; }
    .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .btn { padding: 15px; width: 48%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .active { background: #1c7a32; color: white; }
    .inactive { background: #ddd; color: #666; }
  </style>
</head>
<body>
  <h1>GCR Admin</h1>
  <div class="card">
    <h2>Housekeeping Mode</h2>
    <div style="display: flex; justify-content: space-between;">
      <button id="m2" class="btn" onclick="upd('two')">MODE 2</button>
      <button id="m3" class="btn" onclick="upd('three')">MODE 3</button>
    </div>
  </div>
  <div class="card">
    <h2>Daily Logs</h2>
    <div id="logs"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
      authDomain: "gms-task-tracker.firebaseapp.com",
      projectId: "gms-task-tracker",
      storageBucket: "gms-task-tracker.firebasestorage.app",
      messagingSenderId: "790880979860",
      appId: "1:790880979860:web:6faee2a6e56955af3c1d81"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function sync() {
      const snap = await getDoc(doc(db, "settings", "housekeepingMode"));
      const cur = snap.exists() ? snap.data().value : "two";
      document.getElementById("m2").className = cur === "two" ? "btn active" : "btn inactive";
      document.getElementById("m3").className = cur === "three" ? "btn active" : "btn inactive";
    }

    window.upd = async function(v) {
      await setDoc(doc(db, "settings", "housekeepingMode"), { value: v });
      sync();
    };

    async function load() {
      const q = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(10));
      const snap = await getDocs(q);
      const list = document.getElementById("logs");
      snap.forEach(d => {
        list.innerHTML += `<p><b>${d.data().employeeName}</b> finished ${d.data().area}</p>`;
      });
    }

    sync();
    load();
  </script>
</body>
</html>
