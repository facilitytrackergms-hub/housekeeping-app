<!DOCTYPE html>
<html>

<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 8px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    label {
      font-size: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      margin: 6px 0 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1976d2;
      color: white;
      font-size: 17px;
      font-weight: bold;
      padding: 11px;
      margin: 5px 0;
      cursor: pointer;
    }

    .assignment-title {
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 6px;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    /* =========================
       03 - BUTTON GRIDS
    ========================== */

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 58px;
      font-size: 16px;
      padding: 7px 5px;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin: 0;
    }

    .room-number {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.1;
    }

    .room-counter {
      font-size: 14px;
      font-weight: bold;
      margin-top: 2px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .button-row button {
      font-size: 15px;
      padding: 10px 6px;
      margin: 0;
    }

    .button-row-three {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .button-row-three button {
      font-size: 14px;
      padding: 10px 4px;
      margin: 0;
    }

    /* =========================
       04 - EDIT CARDS
    ========================== */

    .task-card {
      border: 1px solid #ccc;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      background: #fafafa;
    }

    #adminMessage,
    #employeeMessage {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    /* =========================
       05 - LOADING SCREEN STYLE
    ========================== */

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<!-- =========================
     06 - MAIN CARD START
========================== -->

<div class="card">

  <!-- =========================
       07 - ADMIN VIEW 2 - MAIN DASHBOARD
  ========================== -->

  <div id="adminView2">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 2</div>
    </div>

    <label>Assignment</label>
    <select id="adminAssignmentSelect" onchange="changeAdminAssignment()">
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <div id="adminCategoryButtons" class="rooms-grid"></div>

  </div>

  <!-- =========================
       08 - ADMIN VIEW 3 / 4 / 5 / 6 - AREA LIST
  ========================== -->

  <div id="adminAreaView" class="hidden">

    <div class="view-center">
      <div class="view-tag" id="adminAreaViewTag">ADMIN VIEW 3</div>
    </div>

    <div class="assignment-title" id="adminAreaAssignmentTitle"></div>
    <h2 id="adminAreaTitle">Area</h2>

    <div id="adminAreaBigDatePickerBox" class="hidden">
      <h3 id="adminAreaDateTitle"></h3>

      <input
        type="date"
        id="adminBigDatePicker"
        onchange="changeAdminWorkDateFromBigPicker()"
      >
    </div>

    <button id="adminAddAreaButton" class="green" onclick="openNewAdminArea()">
      ADD NEW AREA
    </button>

    <div id="adminAreaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       09 - ADMIN VIEW 7 - EDIT AREA / TASKS
  ========================== -->

  <div id="adminEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 7</div>
    </div>

    <div class="assignment-title" id="adminEditAssignmentTitle"></div>
    <h2 id="adminEditTitle">Edit Area</h2>

    <label>Area Name</label>
    <input id="adminEditAreaInput">

    <label>Assignment</label>
    <select id="adminEditAssignmentInput">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <select id="adminEditCategoryInput" class="hidden">
      <option value="">Select category</option>
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
      <option>Weekly Laundry</option>
      <option>Daily Laundry Check</option>
    </select>

    <h3>Sub Tasks</h3>

    <button class="green" onclick="openNewAdminSubTask()">ADD NEW SUB TASK</button>

    <div id="adminSubtaskButtons" class="rooms-grid"></div>

    <div id="adminSubtaskEditor" class="task-card hidden">

      <div class="view-center">
        <div class="view-tag" id="adminSubtaskViewTag">ADMIN VIEW 7-1</div>
      </div>

      <div class="assignment-title" id="adminSubtaskAssignmentTitle"></div>
      <h3 id="adminSubtaskEditorTitle">Edit Sub Task</h3>

      <label>Task Name</label>
      <input id="adminTaskNameInput" list="taskNameOptions" placeholder="Type or choose task">

      <datalist id="taskNameOptions"></datalist>

      <div class="button-row-three">
        <button class="green" onclick="saveAdminSubTask()">SAVE</button>
        <button class="red" onclick="deleteAdminSubTask()">DELETE</button>
        <button class="back" onclick="closeAdminSubTaskEditor()">CANCEL</button>
      </div>

    </div>

    <div class="button-row-three">
      <button class="green" onclick="saveAdminAreaOnly()">SAVE</button>
      <button class="red" onclick="deleteAdminArea()">DELETE AREA</button>
      <button class="back" onclick="backToAdminAreas()">BACK</button>
    </div>

    <p id="adminMessage"></p>

  </div>

  <!-- =========================
       10 - ADMIN VIEW 8 - EMPLOYEES LIST
  ========================== -->

  <div id="adminEmployeesView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 8 - EMPLOYEES</div>
    </div>

    <div class="assignment-title" id="adminEmployeesAssignmentTitle"></div>
    <h2>Employees</h2>

    <button class="green" onclick="openNewEmployee()">ADD EMPLOYEE</button>

    <div id="employeeList"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       11 - ADMIN VIEW 9 - EDIT EMPLOYEE
  ========================== -->

  <div id="adminEmployeeEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 9 - EDIT EMPLOYEE</div>
    </div>

    <div class="assignment-title" id="adminEmployeeEditAssignmentTitle"></div>
    <h2 id="employeeEditTitle">Employee</h2>

    <label>First Name</label>
    <input id="empFirstName">

    <label>Last Name</label>
    <input id="empLastName">

    <label>PIN</label>
    <input id="empPin">

    <label>Assignment</label>
    <select id="empAssignment">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>Role</label>
    <select id="empRole">
      <option value="">Select role</option>
      <option value="employee">employee</option>
      <option value="admin">admin</option>
    </select>

    <label>Active</label>
    <select id="empActive">
      <option value="">Select active</option>
      <option value="true">true</option>
      <option value="false">false</option>
    </select>

    <div class="button-row">
      <button class="green" onclick="saveEmployee()">SAVE</button>
      <button class="red" onclick="deleteEmployee()">DELETE</button>
    </div>

    <p id="employeeMessage"></p>

    <button class="back" onclick="openEmployees()">BACK</button>

  </div>

</div>

<!-- =========================
     12 - LOADING SCREEN HTML
========================== -->

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<script type="module">

  /* =========================
     13 - FIREBASE IMPORTS
  ========================== */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  /* =========================
     14 - FIREBASE CONFIG
  ========================== */

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* =========================
     15 - SESSION DATA
  ========================== */

  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

  if (!sessionData) {
    window.location.href = "index.html";
  }

  /* =========================
     16 - GLOBAL ADMIN VARIABLES
  ========================== */

  let currentAssignment =
    sessionData.assignment ||
    "HK Schedule 1";

  let currentWorkDateISO = getTodayISO();
  let currentWorkDayName = "";

  let selectedCategory = "";
  let selectedArea = "";

  let allTasksForDay = [];
  let allTasksForAssignment = [];
  let currentAreaTasks = [];

  let currentEmployeeId = "";

  let currentEditingTaskId = "";
  let currentEditingTaskIndex = -1;

  /* =========================
     17 - ADMIN STARTUP
  ========================== */

  startAdmin();

  async function startAdmin() {
    document.getElementById("adminAssignmentSelect").value = currentAssignment;
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     18 - LOADING FUNCTIONS
  ========================== */

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  /* =========================
     19 - VIEW SWITCHING
  ========================== */

  function showAdminView(viewId) {
    [
      "adminView2",
      "adminAreaView",
      "adminEditView",
      "adminEmployeesView",
      "adminEmployeeEditView"
    ].forEach(function(id) {
      document.getElementById(id).classList.add("hidden");
    });

    updateAssignmentTitles();

    document.getElementById(viewId).classList.remove("hidden");
  }

  function updateAssignmentTitles() {
    [
      "adminAreaAssignmentTitle",
      "adminEditAssignmentTitle",
      "adminSubtaskAssignmentTitle",
      "adminEmployeesAssignmentTitle",
      "adminEmployeeEditAssignmentTitle"
    ].forEach(function(id) {
      const el = document.getElementById(id);

      if (el) {
        el.innerText = currentAssignment;
      }
    });
  }

  /* =========================
     20 - DATE FUNCTIONS
  ========================== */

  function getTodayISO() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");

    return yyyy + "-" + mm + "-" + dd;
  }

  function updateDateDisplay() {
    const date = new Date(currentWorkDateISO + "T00:00:00");

    const weekdays = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];

    currentWorkDayName = weekdays[date.getDay()];
  }

  async function changeAdminWorkDateFromBigPicker() {
    const picker = document.getElementById("adminBigDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAdminTasks();

    if (selectedCategory) {
      drawAdminAreaButtons(selectedCategory);
      showAdminView("adminAreaView");
    }
  }

  /* =========================
     21 - ASSIGNMENT CHANGE
  ========================== */

  async function changeAdminAssignment() {
    currentAssignment = document.getElementById("adminAssignmentSelect").value;
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     22 - LOAD TASKS FROM FIRESTORE
  ========================== */

  async function loadAdminTasks() {
    showLoading();

    updateDateDisplay();
    updateAssignmentTitles();

    const dateTitle = document.getElementById("adminAreaDateTitle");

    if (dateTitle) {
      dateTitle.innerText = currentWorkDayName;
    }

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", currentAssignment)
    );

    const taskSnap = await getDocs(taskQuery);

    allTasksForAssignment =
      taskSnap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    updateTaskNameOptions();

    allTasksForDay =
      allTasksForAssignment.filter(function(item) {
        const activeValue = item.active;

        if (activeValue === false || activeValue === "No") {
          return false;
        }

        const schedule =
          String(item.schedule || "").trim().toLowerCase();

        const scheduleDate =
          String(item.scheduleDate || "").trim();

        if (scheduleDate && scheduleDate === currentWorkDateISO) {
          return true;
        }

        return (
          schedule === "daily" ||
          schedule === "weekly" ||
          schedule === currentWorkDayName.toLowerCase()
        );
      });

    drawAdminCategories();

    hideLoading();
  }

  /* =========================
     23 - UPDATE TASK NAME OPTIONS
  ========================== */

  function updateTaskNameOptions() {
    const list = document.getElementById("taskNameOptions");

    if (!list) return;

    list.innerHTML = "";

    const names =
      [...new Set(allTasksForAssignment.map(function(task) {
        return String(task.task || "").trim();
      }).filter(function(name) {
        return name !== "";
      }))];

    names.forEach(function(name) {
      const option = document.createElement("option");
      option.value = name;
      list.appendChild(option);
    });
  }

  /* =========================
     24 - DRAW CATEGORY BUTTONS
  ========================== */

  function drawAdminCategories() {
    const box = document.getElementById("adminCategoryButtons");
    box.innerHTML = "";

    const buttons =
      currentAssignment === "Laundry"
        ? ["Weekly Laundry", "Daily Laundry Check", "Employees", "Logout"]
        : ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier", "Employees", "Logout"];

    buttons.forEach(function(item) {
      const btn = document.createElement("button");

      btn.innerText = item;

      if (item === "Logout") {
        btn.className = "back";
        btn.onclick = logout;
      } else {
        btn.className = "yellow";

        if (item === "Employees") {
          btn.onclick = openEmployees;
        } else {
          btn.onclick = function() {
            selectedCategory = item;
            drawAdminAreaButtons(item);
            showAdminView("adminAreaView");
          };
        }
      }

      box.appendChild(btn);
    });
  }

  /* =========================
     25 - DRAW AREA BUTTONS
  ========================== */

  function drawAdminAreaButtons(category) {
    const box = document.getElementById("adminAreaButtons");
    box.innerHTML = "";

    document.getElementById("adminAreaTitle").innerText = category;

    setAdminAreaViewTag(category);
    setAdminAreaDatePickerVisibility(category);

    document.getElementById("adminBigDatePicker").value = currentWorkDateISO;

    document.getElementById("adminAddAreaButton").innerText =
      "ADD NEW " + category.toUpperCase();

    document.getElementById("adminAreaDateTitle").innerText =
      currentWorkDayName;

    updateAssignmentTitles();

    const categoryTasks =
      allTasksForDay.filter(function(task) {
        return task.category === category;
      });

    const areas =
      [...new Set(categoryTasks.map(function(task) {
        return task.area;
      }))];

    areas.forEach(function(area) {
      const areaTasks =
        categoryTasks.filter(function(task) {
          return task.area === area;
        });

      const total = areaTasks.length;

      const btn = document.createElement("button");

      btn.className = "red";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(area) + '</div>' +
        '<div class="room-counter">' + total + ' TASKS</div>';

      btn.onclick = function() {
        openAdminEditArea(area);
      };

      box.appendChild(btn);
    });
  }

  /* =========================
     26 - AREA VIEW NUMBER LABEL
  ========================== */

  function setAdminAreaViewTag(category) {
    const tag = document.getElementById("adminAreaViewTag");

    if (category === "Common Area") {
      tag.innerText = "ADMIN VIEW 3";
    } else if (category === "Weekly Room") {
      tag.innerText = "ADMIN VIEW 4";
    } else if (category === "Daily Room") {
      tag.innerText = "ADMIN VIEW 5";
    } else if (category === "Dehumidifier") {
      tag.innerText = "ADMIN VIEW 6";
    } else if (category === "Weekly Laundry") {
      tag.innerText = "ADMIN VIEW 4";
    } else if (category === "Daily Laundry Check") {
      tag.innerText = "ADMIN VIEW 5";
    } else {
      tag.innerText = "ADMIN VIEW 3";
    }
  }

  /* =========================
     27 - WEEKLY DATE PICKER VISIBILITY
  ========================== */

  function setAdminAreaDatePickerVisibility(category) {
    const pickerBox = document.getElementById("adminAreaBigDatePickerBox");
    const dateTitle = document.getElementById("adminAreaDateTitle");

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      pickerBox.classList.remove("hidden");
      dateTitle.classList.remove("hidden");
    } else {
      pickerBox.classList.add("hidden");
      dateTitle.classList.add("hidden");
    }
  }

  /* =========================
     28 - OPEN EXISTING AREA EDITOR
  ========================== */

  function openAdminEditArea(area) {
    selectedArea = area;

    currentAreaTasks =
      allTasksForAssignment.filter(function(task) {
        return task.area === area && task.category === selectedCategory;
      });

    document.getElementById("adminEditTitle").innerText = area;
    document.getElementById("adminEditAreaInput").value = area;
    document.getElementById("adminEditAssignmentInput").value = currentAssignment;
    document.getElementById("adminEditCategoryInput").value = selectedCategory;
    document.getElementById("adminMessage").innerText = "";

    updateAssignmentTitles();

    closeAdminSubTaskEditor();
    drawAdminSubTaskButtons();

    showAdminView("adminEditView");
  }

  /* =========================
     29 - OPEN NEW AREA EDITOR
  ========================== */

  function openNewAdminArea() {
    selectedArea = "";
    currentAreaTasks = [];

    document.getElementById("adminEditTitle").innerText = "New Area";
    document.getElementById("adminEditAreaInput").value = "";
    document.getElementById("adminEditAssignmentInput").value = "";
    document.getElementById("adminEditCategoryInput").value = selectedCategory;
    document.getElementById("adminMessage").innerText = "";

    updateAssignmentTitles();

    closeAdminSubTaskEditor();
    drawAdminSubTaskButtons();

    showAdminView("adminEditView");
  }

  /* =========================
     30 - DRAW SUB TASK BUTTONS
  ========================== */

  function drawAdminSubTaskButtons() {
    const box = document.getElementById("adminSubtaskButtons");
    box.innerHTML = "";

    currentAreaTasks.forEach(function(task, index) {
      const btn = document.createElement("button");

      btn.className = "red";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(task.task || "Sub Task") + '</div>' +
        '<div class="room-counter">' + escapeHtml(task.schedule || "") + '</div>';

      btn.onclick = function() {
        openAdminSubTaskEditor(index);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No sub tasks yet.";
      box.appendChild(empty);
    }
  }

  /* =========================
     31 - OPEN SUB TASK EDITOR
  ========================== */

  function openAdminSubTaskEditor(index) {
    const task = currentAreaTasks[index];

    currentEditingTaskIndex = index;
    currentEditingTaskId = task.id || "";

    document.getElementById("adminSubtaskViewTag").innerText =
      "ADMIN VIEW 7-1";

    document.getElementById("adminSubtaskEditorTitle").innerText =
      "Edit Sub Task";

    document.getElementById("adminTaskNameInput").value =
      task.task || "";

    updateAssignmentTitles();

    document.getElementById("adminSubtaskEditor").classList.remove("hidden");
  }

  /* =========================
     32 - OPEN NEW SUB TASK
  ========================== */

  function openNewAdminSubTask() {
    currentEditingTaskIndex = -1;
    currentEditingTaskId = "";

    document.getElementById("adminSubtaskViewTag").innerText =
      "ADMIN VIEW 7-1";

    document.getElementById("adminSubtaskEditorTitle").innerText =
      "New Sub Task";

    document.getElementById("adminTaskNameInput").value = "";

    updateAssignmentTitles();

    document.getElementById("adminSubtaskEditor").classList.remove("hidden");
  }

  /* =========================
     33 - CLOSE SUB TASK EDITOR
  ========================== */

  function closeAdminSubTaskEditor() {
    currentEditingTaskIndex = -1;
    currentEditingTaskId = "";

    document.getElementById("adminSubtaskEditor").classList.add("hidden");
  }

  /* =========================
     34 - SAVE AREA ONLY
  ========================== */

  async function saveAdminAreaOnly() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    if (!area || !assignment || !category) {
      alert("Fill area and assignment.");
      return;
    }

    if (currentAreaTasks.length === 0) {
      selectedArea = area;
      currentAssignment = assignment;
      selectedCategory = category;
      document.getElementById("adminAssignmentSelect").value = assignment;
      updateAssignmentTitles();
      document.getElementById("adminMessage").innerText = "Saved.";
      return;
    }

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      const task = currentAreaTasks[i];

      await updateDoc(doc(db, "tasks", task.id), {
        assignment: assignment,
        category: category,
        area: area,
        updatedAt: serverTimestamp()
      });
    }

    currentAssignment = assignment;
    selectedCategory = category;
    selectedArea = area;

    document.getElementById("adminAssignmentSelect").value = assignment;

    await loadAdminTasks();
    openAdminEditArea(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Saved.";
  }

  /* =========================
     35 - SAVE SUB TASK
  ========================== */

  async function saveAdminSubTask() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    const taskName = document.getElementById("adminTaskNameInput").value.trim();
    const schedule = getDefaultScheduleForCategory(category);

    if (!area || !assignment || !category || !taskName) {
      alert("Fill area, assignment, and task name.");
      return;
    }

    showLoading();

    if (currentEditingTaskId) {
      await updateDoc(doc(db, "tasks", currentEditingTaskId), {
        assignment: assignment,
        category: category,
        area: area,
        task: taskName,
        schedule: schedule,
        active: true,
        updatedAt: serverTimestamp()
      });
    } else {
      await addDoc(collection(db, "tasks"), {
        assignment: assignment,
        category: category,
        area: area,
        task: taskName,
        schedule: schedule,
        active: true,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    }

    currentAssignment = assignment;
    selectedCategory = category;
    selectedArea = area;

    document.getElementById("adminAssignmentSelect").value = assignment;

    await loadAdminTasks();
    openAdminEditArea(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Saved.";
  }

  /* =========================
     36 - DELETE SUB TASK
  ========================== */

  async function deleteAdminSubTask() {
    if (!currentEditingTaskId) {
      closeAdminSubTaskEditor();
      return;
    }

    const ok = confirm("Delete this sub task?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "tasks", currentEditingTaskId));

    await loadAdminTasks();

    if (selectedArea) {
      openAdminEditArea(selectedArea);
    } else {
      showAdminView("adminAreaView");
    }

    hideLoading();
  }

  /* =========================
     37 - DELETE WHOLE AREA
  ========================== */

  async function deleteAdminArea() {
    if (currentAreaTasks.length === 0) {
      backToAdminAreas();
      return;
    }

    const ok = confirm("Delete this whole area and all sub tasks?");
    if (!ok) return;

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      await deleteDoc(doc(db, "tasks", currentAreaTasks[i].id));
    }

    await loadAdminTasks();

    hideLoading();

    showAdminView("adminAreaView");
  }

  /* =========================
     38 - BACK BUTTONS
  ========================== */

  async function backToAdminAreas() {
    await loadAdminTasks();
    drawAdminAreaButtons(selectedCategory);
    showAdminView("adminAreaView");
  }

  function backToAdminCategories() {
    selectedCategory = "";
    drawAdminCategories();
    showAdminView("adminView2");
  }

  /* =========================
     39 - OPEN EMPLOYEES
  ========================== */

  async function openEmployees() {
    showLoading();

    const snap = await getDocs(collection(db, "employees"));

    const employees = snap.docs.map(function(empDoc) {
      return {
        id: empDoc.id,
        ...empDoc.data()
      };
    });

    const box = document.getElementById("employeeList");
    box.innerHTML = "";

    employees.forEach(function(emp) {
      const btn = document.createElement("button");

      const name =
        ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
        emp.employeeName ||
        emp.name ||
        "Employee";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(name) + '</div>' +
        '<div class="room-counter">PIN: ' + escapeHtml(emp.pin || "") + '</div>';

      btn.onclick = function() {
        openEmployeeEditor(emp);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No employees found.";
      box.appendChild(empty);
    }

    hideLoading();

    updateAssignmentTitles();

    showAdminView("adminEmployeesView");
  }

  /* =========================
     40 - OPEN NEW EMPLOYEE
  ========================== */

  function openNewEmployee() {
    currentEmployeeId = "";

    document.getElementById("employeeEditTitle").innerText = "New Employee";
    document.getElementById("empFirstName").value = "";
    document.getElementById("empLastName").value = "";
    document.getElementById("empPin").value = "";
    document.getElementById("empAssignment").value = "";
    document.getElementById("empRole").value = "";
    document.getElementById("empActive").value = "";
    document.getElementById("employeeMessage").innerText = "";

    updateAssignmentTitles();

    showAdminView("adminEmployeeEditView");
  }

  /* =========================
     41 - OPEN EXISTING EMPLOYEE
  ========================== */

  function openEmployeeEditor(emp) {
    currentEmployeeId = emp.id;

    const name =
      ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
      emp.employeeName ||
      emp.name ||
      "Employee";

    document.getElementById("employeeEditTitle").innerText = name;
    document.getElementById("empFirstName").value = emp.firstName || "";
    document.getElementById("empLastName").value = emp.lastName || "";
    document.getElementById("empPin").value = emp.pin || "";
    document.getElementById("empAssignment").value = emp.assignment || "";
    document.getElementById("empRole").value = emp.role || "";
    document.getElementById("empActive").value =
      emp.active === false ? "false" : "true";
    document.getElementById("employeeMessage").innerText = "";

    updateAssignmentTitles();

    showAdminView("adminEmployeeEditView");
  }

  /* =========================
     42 - SAVE EMPLOYEE
  ========================== */

  async function saveEmployee() {
    const firstName = document.getElementById("empFirstName").value.trim();
    const lastName = document.getElementById("empLastName").value.trim();
    const pin = document.getElementById("empPin").value.trim();
    const assignment = document.getElementById("empAssignment").value;
    const role = document.getElementById("empRole").value;
    const activeValue = document.getElementById("empActive").value;

    if (!firstName || !pin || !assignment || !role || !activeValue) {
      alert("Fill first name, PIN, assignment, role, and active.");
      return;
    }

    const active = activeValue === "true";

    showLoading();

    const data = {
      firstName: firstName,
      lastName: lastName,
      pin: pin,
      assignment: assignment,
      role: role,
      active: active,
      updatedAt: serverTimestamp()
    };

    if (currentEmployeeId) {
      await updateDoc(doc(db, "employees", currentEmployeeId), data);
    } else {
      data.createdAt = serverTimestamp();
      const newDoc = await addDoc(collection(db, "employees"), data);
      currentEmployeeId = newDoc.id;
    }

    hideLoading();

    document.getElementById("employeeMessage").innerText = "Saved.";
  }

  /* =========================
     43 - DELETE EMPLOYEE
  ========================== */

  async function deleteEmployee() {
    if (!currentEmployeeId) {
      openEmployees();
      return;
    }

    const ok = confirm("Delete this employee?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "employees", currentEmployeeId));

    hideLoading();

    openEmployees();
  }

  /* =========================
     44 - LOGOUT
  ========================== */

  function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }

  /* =========================
     45 - HTML ESCAPE HELPER
  ========================== */

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* =========================
     46 - DEFAULT SCHEDULE HELPER
  ========================== */

  function getDefaultScheduleForCategory(category) {
    if (category === "Weekly Room" || category === "Weekly Laundry") {
      return currentWorkDayName || "weekly";
    }

    return "daily";
  }

  /* =========================
     47 - WINDOW FUNCTIONS - DATE / ASSIGNMENT
  ========================== */

  window.changeAdminWorkDateFromBigPicker = changeAdminWorkDateFromBigPicker;
  window.changeAdminAssignment = changeAdminAssignment;

  /* =========================
     48 - WINDOW FUNCTIONS - ADMIN TASKS
  ========================== */

  window.openNewAdminArea = openNewAdminArea;
  window.openNewAdminSubTask = openNewAdminSubTask;
  window.openAdminSubTaskEditor = openAdminSubTaskEditor;
  window.closeAdminSubTaskEditor = closeAdminSubTaskEditor;
  window.saveAdminAreaOnly = saveAdminAreaOnly;
  window.saveAdminSubTask = saveAdminSubTask;
  window.deleteAdminSubTask = deleteAdminSubTask;
  window.deleteAdminArea = deleteAdminArea;
  window.backToAdminAreas = backToAdminAreas;
  window.backToAdminCategories = backToAdminCategories;

  /* =========================
     49 - WINDOW FUNCTIONS - EMPLOYEES
  ========================== */

  window.openEmployees = openEmployees;
  window.openNewEmployee = openNewEmployee;
  window.saveEmployee = saveEmployee;
  window.deleteEmployee = deleteEmployee;

  /* =========================
     50 - WINDOW FUNCTIONS - LOGOUT
  ========================== */

  window.logout = logout;

</script>

</body>
</html>
