<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 15px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      color: #1847d1;
      font-size: 34px;
      margin-top: 0;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
      border: none;
      border-radius: 16px;
      background: #2e5cff;
      color: white;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .gray {
      background: #555;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>Admin Dashboard</h1>

  <button>Employees</button>
  <button>Tasks</button>
  <button>Task Logs</button>
  <button>Room Labels</button>

  <button class="gray" onclick="logout()">LOGOUT</button>

</div>

<script>
  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

  if (!sessionData || sessionData.role !== "Admin") {
    window.location.href = "index.html";
  }

  document.getElementById("adminName").innerText =
    "Welcome, " + (sessionData.firstName || "Admin");

  function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }
</script>

</body>
</html>
