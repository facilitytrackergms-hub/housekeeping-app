<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 8px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    input, select, textarea {
      width: 100%;
      font-size: 20px;
      padding: 12px;
      margin: 8px 0 14px;
      border-radius: 14px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 80px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1976d2;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 14px;
      margin: 6px 0;
      cursor: pointer;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .gray {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 64px;
      font-size: 18px;
      padding: 8px 6px;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      margin: 0;
    }

    .room-number {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.1;
    }

    .room-counter {
      font-size: 15px;
      font-weight: bold;
      margin-top: 3px;
    }

    .task-card {
      border: 1px solid #ccc;
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      background: #fafafa;
    }

    .task-card h3 {
      margin-bottom: 6px;
    }

    .small-row {
      display: flex;
      gap: 8px;
    }

    .small-row button {
      flex: 1;
      font-size: 16px;
      padding: 10px;
    }

    #message {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div class="card">

  <div id="view2">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 2</div>
    </div>

    <h2>Admin Dashboard</h2>

    <label>Assignment</label>
    <input id="assignmentInput" value="Housekeeping">

    <button onclick="openCategory('Common Area')">COMMON AREA</button>
    <button onclick="openCategory('Weekly Room')">WEEKLY ROOM</button>
    <button onclick="openCategory('Daily Room')">DAILY ROOM</button>
    <button onclick="openCategory('Dehumidifier')">DEHUMIDIFIER</button>

    <button class="yellow" onclick="openEmployees()">EMPLOYEES</button>

    <button class="back" onclick="goLogin()">BACK TO LOGIN</button>

  </div>

  <div id="view3" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 3</div>
    </div>

    <h2 id="categoryTitle"></h2>

    <button class="green" onclick="openNewAreaTask()">ADD NEW AREA TASK</button>

    <div id="areaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminHome()">BACK</button>

  </div>

  <div id="view4" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN EDIT TASK</div>
    </div>

    <h2 id="areaTitle"></h2>

    <label>Area Name</label>
    <input id="editAreaInput">

    <label>Category</label>
    <select id="editCategoryInput">
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
    </select>

    <label>Assignment</label>
    <input id="editAssignmentInput">

    <h3>Sub Tasks</h3>

    <div id="subtaskList"></div>

    <h3>Add Sub Task</h3>

    <input id="newTaskNameInput" placeholder="Sub task name">

    <select id="newTaskScheduleInput">
      <option value="daily">daily</option>
      <option value="Sunday">Sunday</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>

    <button class="green" onclick="addSubTask()">ADD SUB TASK</button>

    <button class="green" onclick="saveAreaChanges()">SAVE AREA CHANGES</button>

    <button class="red" onclick="deleteWholeArea()">DELETE WHOLE AREA</button>

    <p id="message"></p>

    <button class="back" onclick="backToAreas()">BACK</button>

  </div>

  <div id="view5" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN EMPLOYEES</div>
    </div>

    <h2>Employees</h2>

    <button class="green" onclick="openNewEmployee()">ADD EMPLOYEE</button>

    <div id="employeeList"></div>

    <button class="back" onclick="backToAdminHome()">BACK</button>

  </div>

  <div id="view6" class="hidden">

    <div class="view-center">
      <div class="view-tag">EDIT EMPLOYEE</div>
    </div>

    <h2 id="employeeEditTitle">Employee</h2>

    <label>First Name</label>
    <input id="empFirstName">

    <label>Last Name</label>
    <input id="empLastName">

    <label>PIN</label>
    <input id="empPin">

    <label>Assignment</label>
    <input id="empAssignment">

    <label>Role</label>
    <select id="empRole">
      <option value="employee">employee</option>
      <option value="admin">admin</option>
    </select>

    <label>Active</label>
    <select id="empActive">
      <option value="true">true</option>
      <option value="false">false</option>
    </select>

    <button class="green" onclick="saveEmployee()">SAVE EMPLOYEE</button>
    <button class="red" onclick="deleteEmployee()">DELETE EMPLOYEE</button>

    <p id="employeeMessage"></p>

    <button class="back" onclick="openEmployees()">BACK</button>

  </div>

</div>

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let selectedCategory = "";
  let selectedArea = "";
  let selectedAssignment = "";
  let currentAreaTasks = [];
  let allCategoryTasks = [];

  let currentEmployeeId = "";
  let currentEmployeeData = null;

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  function showView(num) {
    [2, 3, 4, 5, 6].forEach(function(viewNumber) {
      document.getElementById("view" + viewNumber).classList.add("hidden");
    });

    document.getElementById("view" + num).classList.remove("hidden");
  }

  function getAssignment() {
    return document.getElementById("assignmentInput").value.trim() || "Housekeeping";
  }

  async function openCategory(category) {
    selectedCategory = category;
    selectedAssignment = getAssignment();

    document.getElementById("categoryTitle").innerText = category;

    await loadCategoryAreas();

    showView(3);
  }

  async function loadCategoryAreas() {
    showLoading();

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", selectedAssignment),
      where("category", "==", selectedCategory)
    );

    const taskSnap = await getDocs(taskQuery);

    allCategoryTasks = taskSnap.docs.map(function(taskDoc) {
      return {
        id: taskDoc.id,
        ...taskDoc.data()
      };
    });

    drawAreaButtons();

    hideLoading();
  }

  function drawAreaButtons() {
    const box = document.getElementById("areaButtons");
    box.innerHTML = "";

    const areas = [...new Set(allCategoryTasks.map(function(task) {
      return task.area;
    }))];

    areas.forEach(function(area) {
      const areaTasks = allCategoryTasks.filter(function(task) {
        return task.area === area;
      });

      const btn = document.createElement("button");

      btn.innerHTML =
        '<div class="room-number">' + area + '</div>' +
        '<div class="room-counter">' + areaTasks.length + ' TASKS</div>';

      btn.onclick = function() {
        openAreaEditor(area);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const msg = document.createElement("h3");
      msg.innerText = "No tasks found.";
      box.appendChild(msg);
    }
  }

  function openAreaEditor(area) {
    selectedArea = area;

    currentAreaTasks = allCategoryTasks.filter(function(task) {
      return task.area === area;
    });

    document.getElementById("areaTitle").innerText = area;
    document.getElementById("editAreaInput").value = area;
    document.getElementById("editCategoryInput").value = selectedCategory;
    document.getElementById("editAssignmentInput").value = selectedAssignment;
    document.getElementById("message").innerText = "";

    drawSubTasks();

    showView(4);
  }

  function openNewAreaTask() {
    selectedArea = "";
    currentAreaTasks = [];

    document.getElementById("areaTitle").innerText = "New Area Task";
    document.getElementById("editAreaInput").value = "";
    document.getElementById("editCategoryInput").value = selectedCategory;
    document.getElementById("editAssignmentInput").value = selectedAssignment;
    document.getElementById("newTaskNameInput").value = "";
    document.getElementById("message").innerText = "";

    drawSubTasks();

    showView(4);
  }

  function drawSubTasks() {
    const box = document.getElementById("subtaskList");
    box.innerHTML = "";

    currentAreaTasks.forEach(function(task, index) {
      const div = document.createElement("div");
      div.className = "task-card";

      div.innerHTML =
        '<label>Task Name</label>' +
        '<input id="taskName_' + index + '" value="' + escapeHtml(task.task || "") + '">' +

        '<label>Schedule</label>' +
        '<select id="taskSchedule_' + index + '">' +
          '<option value="daily">daily</option>' +
          '<option value="Sunday">Sunday</option>' +
          '<option value="Monday">Monday</option>' +
          '<option value="Tuesday">Tuesday</option>' +
          '<option value="Wednesday">Wednesday</option>' +
          '<option value="Thursday">Thursday</option>' +
          '<option value="Friday">Friday</option>' +
          '<option value="Saturday">Saturday</option>' +
        '</select>' +

        '<label>Active</label>' +
        '<select id="taskActive_' + index + '">' +
          '<option value="true">true</option>' +
          '<option value="false">false</option>' +
        '</select>' +

        '<div class="small-row">' +
          '<button class="green" onclick="saveSingleTask(' + index + ')">SAVE</button>' +
          '<button class="red" onclick="deleteSingleTask(' + index + ')">DELETE</button>' +
        '</div>';

      box.appendChild(div);

      document.getElementById("taskSchedule_" + index).value =
        task.schedule || "daily";

      document.getElementById("taskActive_" + index).value =
        task.active === false || task.active === "No" ? "false" : "true";
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No sub tasks yet.";
      box.appendChild(empty);
    }
  }

  async function addSubTask() {
    const area = document.getElementById("editAreaInput").value.trim();
    const category = document.getElementById("editCategoryInput").value.trim();
    const assignment = document.getElementById("editAssignmentInput").value.trim();
    const taskName = document.getElementById("newTaskNameInput").value.trim();
    const schedule = document.getElementById("newTaskScheduleInput").value;

    if (!area || !category || !assignment || !taskName) {
      alert("Fill area, category, assignment, and sub task.");
      return;
    }

    showLoading();

    await addDoc(collection(db, "tasks"), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      active: true,
      updatedAt: serverTimestamp()
    });

    document.getElementById("newTaskNameInput").value = "";

    selectedArea = area;
    selectedCategory = category;
    selectedAssignment = assignment;

    await loadCategoryAreas();
    openAreaEditor(area);

    hideLoading();
  }

  async function saveSingleTask(index) {
    const task = currentAreaTasks[index];

    const area = document.getElementById("editAreaInput").value.trim();
    const category = document.getElementById("editCategoryInput").value.trim();
    const assignment = document.getElementById("editAssignmentInput").value.trim();
    const taskName = document.getElementById("taskName_" + index).value.trim();
    const schedule = document.getElementById("taskSchedule_" + index).value;
    const active = document.getElementById("taskActive_" + index).value === "true";

    if (!area || !category || !assignment || !taskName) {
      alert("Fill all fields.");
      return;
    }

    showLoading();

    await updateDoc(doc(db, "tasks", task.id), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      active: active,
      updatedAt: serverTimestamp()
    });

    selectedArea = area;
    selectedCategory = category;
    selectedAssignment = assignment;

    document.getElementById("assignmentInput").value = assignment;

    await loadCategoryAreas();
    openAreaEditor(area);

    hideLoading();

    document.getElementById("message").innerText = "Saved.";
  }

  async function saveAreaChanges() {
    const area = document.getElementById("editAreaInput").value.trim();
    const category = document.getElementById("editCategoryInput").value.trim();
    const assignment = document.getElementById("editAssignmentInput").value.trim();

    if (!area || !category || !assignment) {
      alert("Fill area, category, and assignment.");
      return;
    }

    if (currentAreaTasks.length === 0) {
      alert("Add at least one sub task.");
      return;
    }

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      const task = currentAreaTasks[i];

      const taskName = document.getElementById("taskName_" + i).value.trim();
      const schedule = document.getElementById("taskSchedule_" + i).value;
      const active = document.getElementById("taskActive_" + i).value === "true";

      await updateDoc(doc(db, "tasks", task.id), {
        assignment: assignment,
        category: category,
        area: area,
        task: taskName,
        schedule: schedule,
        active: active,
        updatedAt: serverTimestamp()
      });
    }

    selectedArea = area;
    selectedCategory = category;
    selectedAssignment = assignment;

    document.getElementById("assignmentInput").value = assignment;

    await loadCategoryAreas();
    openAreaEditor(area);

    hideLoading();

    document.getElementById("message").innerText = "Area saved.";
  }

  async function deleteSingleTask(index) {
    const task = currentAreaTasks[index];

    const ok = confirm("Delete this task?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "tasks", task.id));

    await loadCategoryAreas();

    if (selectedArea) {
      openAreaEditor(selectedArea);
    }

    hideLoading();
  }

  async function deleteWholeArea() {
    if (currentAreaTasks.length === 0) {
      backToAreas();
      return;
    }

    const ok = confirm("Delete this whole area and all sub tasks?");
    if (!ok) return;

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      await deleteDoc(doc(db, "tasks", currentAreaTasks[i].id));
    }

    await loadCategoryAreas();

    hideLoading();

    showView(3);
  }

  async function openEmployees() {
    showLoading();

    const snap = await getDocs(collection(db, "employees"));

    const employees = snap.docs.map(function(empDoc) {
      return {
        id: empDoc.id,
        ...empDoc.data()
      };
    });

    const box = document.getElementById("employeeList");
    box.innerHTML = "";

    employees.forEach(function(emp) {
      const btn = document.createElement("button");

      const name =
        ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
        emp.employeeName ||
        emp.name ||
        "Employee";

      btn.innerHTML =
        '<div class="room-number">' + name + '</div>' +
        '<div class="room-counter">PIN: ' + (emp.pin || "") + '</div>';

      btn.onclick = function() {
        openEmployeeEditor(emp);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No employees found.";
      box.appendChild(empty);
    }

    hideLoading();

    showView(5);
  }

  function openNewEmployee() {
    currentEmployeeId = "";
    currentEmployeeData = null;

    document.getElementById("employeeEditTitle").innerText = "New Employee";
    document.getElementById("empFirstName").value = "";
    document.getElementById("empLastName").value = "";
    document.getElementById("empPin").value = "";
    document.getElementById("empAssignment").value = "";
    document.getElementById("empRole").value = "employee";
    document.getElementById("empActive").value = "true";
    document.getElementById("employeeMessage").innerText = "";

    showView(6);
  }

  function openEmployeeEditor(emp) {
    currentEmployeeId = emp.id;
    currentEmployeeData = emp;

    const name =
      ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
      emp.employeeName ||
      emp.name ||
      "Employee";

    document.getElementById("employeeEditTitle").innerText = name;
    document.getElementById("empFirstName").value = emp.firstName || "";
    document.getElementById("empLastName").value = emp.lastName || "";
    document.getElementById("empPin").value = emp.pin || "";
    document.getElementById("empAssignment").value = emp.assignment || "";
    document.getElementById("empRole").value = emp.role || "employee";
    document.getElementById("empActive").value =
      emp.active === false ? "false" : "true";
    document.getElementById("employeeMessage").innerText = "";

    showView(6);
  }

  async function saveEmployee() {
    const firstName = document.getElementById("empFirstName").value.trim();
    const lastName = document.getElementById("empLastName").value.trim();
    const pin = document.getElementById("empPin").value.trim();
    const assignment = document.getElementById("empAssignment").value.trim();
    const role = document.getElementById("empRole").value;
    const active = document.getElementById("empActive").value === "true";

    if (!firstName || !pin) {
      alert("First name and PIN are required.");
      return;
    }

    showLoading();

    const data = {
      firstName: firstName,
      lastName: lastName,
      pin: pin,
      assignment: assignment,
      role: role,
      active: active,
      updatedAt: serverTimestamp()
    };

    if (currentEmployeeId) {
      await updateDoc(doc(db, "employees", currentEmployeeId), data);
    } else {
      data.createdAt = serverTimestamp();
      const newDoc = await addDoc(collection(db, "employees"), data);
      currentEmployeeId = newDoc.id;
    }

    hideLoading();

    document.getElementById("employeeMessage").innerText = "Employee saved.";
  }

  async function deleteEmployee() {
    if (!currentEmployeeId) {
      openEmployees();
      return;
    }

    const ok = confirm("Delete this employee?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "employees", currentEmployeeId));

    hideLoading();

    openEmployees();
  }

  function backToAdminHome() {
    showView(2);
  }

  async function backToAreas() {
    await loadCategoryAreas();
    showView(3);
  }

  function goLogin() {
    window.location.href = "index.html";
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  window.openCategory = openCategory;
  window.openNewAreaTask = openNewAreaTask;
  window.addSubTask = addSubTask;
  window.saveSingleTask = saveSingleTask;
  window.saveAreaChanges = saveAreaChanges;
  window.deleteSingleTask = deleteSingleTask;
  window.deleteWholeArea = deleteWholeArea;
  window.openEmployees = openEmployees;
  window.openNewEmployee = openNewEmployee;
  window.saveEmployee = saveEmployee;
  window.deleteEmployee = deleteEmployee;
  window.backToAdminHome = backToAdminHome;
  window.backToAreas = backToAreas;
  window.goLogin = goLogin;

</script>

</body>
</html>
