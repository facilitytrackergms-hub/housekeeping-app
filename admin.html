<!DOCTYPE html>
<html>

<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 8px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .view-center {
      text-align: center;
    }

    h2, h3 {
      text-align: center;
      margin-top: 0;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    label {
      font-size: 17px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      font-size: 20px;
      padding: 12px;
      margin: 8px 0 14px;
      border-radius: 14px;
      border: 1px solid #ccc;
    }

    textarea {
      min-height: 80px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #1976d2;
      color: white;
      font-size: 20px;
      font-weight: bold;
      padding: 14px;
      margin: 6px 0;
      cursor: pointer;
    }

    .green {
      background: #2e7d32 !important;
      color: white !important;
    }

    .yellow {
      background: #f9a825 !important;
      color: black !important;
    }

    .red {
      background: #c62828 !important;
      color: white !important;
    }

    .back {
      background: #555 !important;
      color: white !important;
    }

    .hidden {
      display: none !important;
    }

    /* =========================
       03 - DATE ROW STYLE
    ========================== */

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .date-row h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .date-change-btn {
      width: auto;
      font-size: 13px;
      padding: 8px 10px;
      margin: 0;
      border-radius: 10px;
      background: #555;
      white-space: nowrap;
    }

    .hidden-date {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .top-date-box {
      margin-bottom: 14px;
    }

    /* =========================
       04 - AREA BUTTON GRID
    ========================== */

    .rooms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .rooms-grid button {
      width: 100%;
      min-height: 64px;
      font-size: 18px;
      padding: 8px 6px;
      line-height: 1.1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      margin: 0;
    }

    .room-number {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.1;
    }

    .room-counter {
      font-size: 16px;
      font-weight: bold;
      margin-top: 3px;
    }

    /* =========================
       05 - ADMIN EDIT TASK CARDS
    ========================== */

    .task-card {
      border: 1px solid #ccc;
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
      background: #fafafa;
    }

    .small-row {
      display: flex;
      gap: 8px;
    }

    .small-row button {
      flex: 1;
      font-size: 16px;
      padding: 10px;
    }

    #adminMessage,
    #employeeMessage {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    /* =========================
       06 - LOADING SCREEN STYLE
    ========================== */

    .loading-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.70);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 8px solid #ddd;
      border-top: 8px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<!-- =========================
     07 - MAIN CARD START
========================== -->

<div class="card">

  <!-- =========================
       08 - ADMIN VIEW 2 - MAIN DASHBOARD
  ========================== -->

  <div id="adminView2">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 2</div>
    </div>

    <h2 id="adminName">Welcome</h2>
    <h2 id="adminAssignmentTitle">HK Schedule 1</h2>

    <label>Assignment</label>
    <select id="adminAssignmentSelect" onchange="changeAdminAssignment()">
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <div class="date-row">
      <h3 id="adminWorkDateTitle"></h3>

      <button class="date-change-btn" onclick="openAdminCalendar()">
        CHANGE DATE
      </button>

      <input
        type="date"
        id="adminQuickDatePicker"
        class="hidden-date"
        onchange="changeAdminWorkDateFromCalendar()"
      >
    </div>

    <div id="adminCategoryButtons"></div>

    <button class="yellow" onclick="openEmployees()">EMPLOYEES</button>

    <button class="back" onclick="logout()">LOGOUT</button>

  </div>

  <!-- =========================
       09 - ADMIN VIEW 3 / 4 / 5 / 6 - AREA LIST
  ========================== -->

  <div id="adminAreaView" class="hidden">

    <div class="view-center">
      <div class="view-tag" id="adminAreaViewTag">ADMIN VIEW 3</div>
    </div>

    <h2 id="adminAreaTitle">Area</h2>

    <div id="adminAreaBigDatePickerBox" class="top-date-box hidden">
      <h3 id="adminAreaDateTitle"></h3>

      <input
        type="date"
        id="adminBigDatePicker"
        onchange="changeAdminWorkDateFromBigPicker()"
      >
    </div>

    <button id="adminAddAreaButton" class="green" onclick="openNewAdminArea()">
      ADD NEW AREA
    </button>

    <div id="adminAreaButtons" class="rooms-grid"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       10 - ADMIN VIEW 7 - EDIT AREA / TASKS
  ========================== -->

  <div id="adminEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 7</div>
    </div>

    <h2 id="adminEditTitle">Edit Area</h2>

    <label>Area Name</label>
    <input id="adminEditAreaInput">

    <label>Assignment</label>
    <select id="adminEditAssignmentInput">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>Category</label>
    <select id="adminEditCategoryInput">
      <option value="">Select category</option>
      <option>Common Area</option>
      <option>Weekly Room</option>
      <option>Daily Room</option>
      <option>Dehumidifier</option>
      <option>Weekly Laundry</option>
      <option>Daily Laundry Check</option>
    </select>

    <h3>Sub Tasks</h3>

    <div id="adminSubtaskList"></div>

    <h3>Add New Sub Task</h3>

    <label>Task Name</label>
    <input id="adminNewTaskInput" placeholder="New task">

    <label>Schedule</label>
    <select id="adminNewScheduleInput">
      <option value="">Select schedule</option>
      <option value="daily">daily</option>
      <option value="Sunday">Sunday</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>

    <label>Schedule Date</label>
    <input id="adminNewDateInput" type="date">

    <label>Start Time</label>
    <input id="adminNewStartTimeInput" type="time">

    <label>End Time</label>
    <input id="adminNewEndTimeInput" type="time">

    <button class="green" onclick="addAdminSubTask()">ADD SUB TASK</button>

    <button class="green" onclick="saveAdminAreaChanges()">SAVE AREA CHANGES</button>

    <button class="red" onclick="deleteAdminArea()">DELETE WHOLE AREA</button>

    <p id="adminMessage"></p>

    <button class="back" onclick="backToAdminAreas()">BACK</button>

  </div>

  <!-- =========================
       11 - ADMIN VIEW 8 - EMPLOYEES LIST
  ========================== -->

  <div id="adminEmployeesView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 8 - EMPLOYEES</div>
    </div>

    <h2>Employees</h2>

    <button class="green" onclick="openNewEmployee()">ADD EMPLOYEE</button>

    <div id="employeeList"></div>

    <button class="back" onclick="backToAdminCategories()">BACK</button>

  </div>

  <!-- =========================
       12 - ADMIN VIEW 9 - EDIT EMPLOYEE
  ========================== -->

  <div id="adminEmployeeEditView" class="hidden">

    <div class="view-center">
      <div class="view-tag">ADMIN VIEW 9 - EDIT EMPLOYEE</div>
    </div>

    <h2 id="employeeEditTitle">Employee</h2>

    <label>First Name</label>
    <input id="empFirstName">

    <label>Last Name</label>
    <input id="empLastName">

    <label>PIN</label>
    <input id="empPin">

    <label>Assignment</label>
    <select id="empAssignment">
      <option value="">Select assignment</option>
      <option>HK Schedule 1</option>
      <option>HK Schedule 2</option>
      <option>Laundry</option>
    </select>

    <label>Role</label>
    <select id="empRole">
      <option value="">Select role</option>
      <option value="employee">employee</option>
      <option value="admin">admin</option>
    </select>

    <label>Active</label>
    <select id="empActive">
      <option value="">Select active</option>
      <option value="true">true</option>
      <option value="false">false</option>
    </select>

    <button class="green" onclick="saveEmployee()">SAVE EMPLOYEE</button>
    <button class="red" onclick="deleteEmployee()">DELETE EMPLOYEE</button>

    <p id="employeeMessage"></p>

    <button class="back" onclick="openEmployees()">BACK</button>

  </div>

</div>

<!-- =========================
     13 - LOADING SCREEN HTML
========================== -->

<div id="loadingScreen" class="loading-bg hidden">
  <div class="spinner"></div>
</div>

<script type="module">

  /* =========================
     14 - FIREBASE IMPORTS
  ========================== */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  /* =========================
     15 - FIREBASE CONFIG
  ========================== */

  const firebaseConfig = {
    apiKey: "AIzaSyBgq_ooBeEN4noEyIxYPLVokgM6RjCO648",
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* =========================
     16 - SESSION DATA
  ========================== */

  const sessionData = JSON.parse(sessionStorage.getItem("currentEmployee"));

  if (!sessionData) {
    window.location.href = "index.html";
  }

  const adminName =
    ((sessionData.firstName || "") + " " + (sessionData.lastName || "")).trim() ||
    sessionData.employeeName ||
    sessionData.name ||
    "Admin";

  /* =========================
     17 - GLOBAL ADMIN VARIABLES
  ========================== */

  let currentAssignment =
    sessionData.assignment ||
    "HK Schedule 1";

  let currentWorkDateISO = getTodayISO();
  let currentWorkDayName = "";
  let currentWorkDateDisplay = "";

  let selectedCategory = "";
  let selectedArea = "";

  let allTasksForDay = [];
  let allTasksForAssignment = [];
  let currentAreaTasks = [];

  let currentEmployeeId = "";

  /* =========================
     18 - ADMIN STARTUP
  ========================== */

  document.getElementById("adminName").innerText =
    "Welcome, " + adminName;

  document.getElementById("adminAssignmentSelect").value =
    currentAssignment;

  startAdmin();

  async function startAdmin() {
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     19 - LOADING FUNCTIONS
  ========================== */

  function showLoading() {
    document.getElementById("loadingScreen").classList.remove("hidden");
  }

  function hideLoading() {
    document.getElementById("loadingScreen").classList.add("hidden");
  }

  /* =========================
     20 - VIEW SWITCHING
  ========================== */

  function showAdminView(viewId) {
    [
      "adminView2",
      "adminAreaView",
      "adminEditView",
      "adminEmployeesView",
      "adminEmployeeEditView"
    ].forEach(function(id) {
      document.getElementById(id).classList.add("hidden");
    });

    document.getElementById(viewId).classList.remove("hidden");
  }

  /* =========================
     21 - DATE FUNCTIONS
  ========================== */

  function getTodayISO() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");

    return yyyy + "-" + mm + "-" + dd;
  }

  function updateDateDisplay() {
    const date = new Date(currentWorkDateISO + "T00:00:00");

    const weekdays = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];

    currentWorkDayName = weekdays[date.getDay()];

    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const yyyy = date.getFullYear();

    currentWorkDateDisplay = mm + "/" + dd + "/" + yyyy;
  }

  function openAdminCalendar() {
    const picker = document.getElementById("adminQuickDatePicker");

    picker.value = currentWorkDateISO;

    if (picker.showPicker) {
      picker.showPicker();
    } else {
      picker.click();
    }
  }

  async function changeAdminWorkDateFromCalendar() {
    const picker = document.getElementById("adminQuickDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAdminTasks();

    if (selectedCategory) {
      drawAdminAreaButtons(selectedCategory);
      showAdminView("adminAreaView");
    } else {
      drawAdminCategories();
      showAdminView("adminView2");
    }
  }

  async function changeAdminWorkDateFromBigPicker() {
    const picker = document.getElementById("adminBigDatePicker");

    if (!picker.value) return;

    currentWorkDateISO = picker.value;

    await loadAdminTasks();

    if (selectedCategory) {
      drawAdminAreaButtons(selectedCategory);
      showAdminView("adminAreaView");
    }
  }

  /* =========================
     22 - ASSIGNMENT FUNCTIONS
  ========================== */

  async function changeAdminAssignment() {
    currentAssignment = document.getElementById("adminAssignmentSelect").value;
    await loadAdminTasks();
    showAdminView("adminView2");
  }

  /* =========================
     23 - LOAD TASKS FROM FIRESTORE
  ========================== */

  async function loadAdminTasks() {
    showLoading();

    updateDateDisplay();

    document.getElementById("adminAssignmentTitle").innerText =
      currentAssignment;

    document.getElementById("adminWorkDateTitle").innerText =
      currentWorkDayName;

    document.getElementById("adminAreaDateTitle").innerText =
      currentWorkDayName;

    const taskQuery = query(
      collection(db, "tasks"),
      where("assignment", "==", currentAssignment)
    );

    const taskSnap = await getDocs(taskQuery);

    allTasksForAssignment =
      taskSnap.docs.map(function(taskDoc) {
        return {
          id: taskDoc.id,
          ...taskDoc.data()
        };
      });

    allTasksForDay =
      allTasksForAssignment.filter(function(item) {
        const activeValue = item.active;

        if (activeValue === false || activeValue === "No") {
          return false;
        }

        const schedule =
          String(item.schedule || "").trim().toLowerCase();

        const scheduleDate =
          String(item.scheduleDate || "").trim();

        if (scheduleDate && scheduleDate === currentWorkDateISO) {
          return true;
        }

        return (
          schedule === "daily" ||
          schedule === currentWorkDayName.toLowerCase()
        );
      });

    drawAdminCategories();

    hideLoading();
  }

  /* =========================
     24 - DRAW CATEGORY BUTTONS
  ========================== */

  function drawAdminCategories() {
    const box = document.getElementById("adminCategoryButtons");
    box.innerHTML = "";

    const categories =
      currentAssignment === "Laundry"
        ? ["Weekly Laundry", "Daily Laundry Check"]
        : ["Common Area", "Weekly Room", "Daily Room", "Dehumidifier"];

    categories.forEach(function(category) {
      const categoryTasks =
        allTasksForDay.filter(function(task) {
          return task.category === category;
        });

      const total = categoryTasks.length;

      const btn = document.createElement("button");

      btn.innerText =
        category + " " + total;

      btn.className =
        total === 0 ? "red" : "yellow";

      btn.onclick = function() {
        selectedCategory = category;
        drawAdminAreaButtons(category);
        showAdminView("adminAreaView");
      };

      box.appendChild(btn);
    });
  }

  /* =========================
     25 - DRAW AREA BUTTONS
  ========================== */

  function drawAdminAreaButtons(category) {
    const box = document.getElementById("adminAreaButtons");
    box.innerHTML = "";

    document.getElementById("adminAreaTitle").innerText = category;

    setAdminAreaViewTag(category);
    setAdminAreaDatePickerVisibility(category);

    document.getElementById("adminBigDatePicker").value = currentWorkDateISO;

    document.getElementById("adminAddAreaButton").innerText =
      "ADD NEW " + category.toUpperCase();

    document.getElementById("adminAreaDateTitle").innerText =
      currentWorkDayName;

    const categoryTasks =
      allTasksForDay.filter(function(task) {
        return task.category === category;
      });

    const areas =
      [...new Set(categoryTasks.map(function(task) {
        return task.area;
      }))];

    areas.forEach(function(area) {
      const areaTasks =
        categoryTasks.filter(function(task) {
          return task.area === area;
        });

      const total = areaTasks.length;

      const btn = document.createElement("button");

      btn.className = "red";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(area) + '</div>' +
        '<div class="room-counter">' + total + ' TASKS</div>';

      btn.onclick = function() {
        openAdminEditArea(area);
      };

      box.appendChild(btn);
    });
  }

  /* =========================
     26 - AREA VIEW NUMBER LABEL
  ========================== */

  function setAdminAreaViewTag(category) {
    const tag = document.getElementById("adminAreaViewTag");

    if (category === "Common Area") {
      tag.innerText = "ADMIN VIEW 3";
    } else if (category === "Weekly Room") {
      tag.innerText = "ADMIN VIEW 4";
    } else if (category === "Daily Room") {
      tag.innerText = "ADMIN VIEW 5";
    } else if (category === "Dehumidifier") {
      tag.innerText = "ADMIN VIEW 6";
    } else if (category === "Weekly Laundry") {
      tag.innerText = "ADMIN VIEW 4";
    } else if (category === "Daily Laundry Check") {
      tag.innerText = "ADMIN VIEW 5";
    } else {
      tag.innerText = "ADMIN VIEW 3";
    }
  }

  /* =========================
     27 - WEEKLY DATE PICKER VISIBILITY
  ========================== */

  function setAdminAreaDatePickerVisibility(category) {
    const pickerBox = document.getElementById("adminAreaBigDatePickerBox");
    const dateTitle = document.getElementById("adminAreaDateTitle");

    if (category === "Weekly Room" || category === "Weekly Laundry") {
      pickerBox.classList.remove("hidden");
      dateTitle.classList.remove("hidden");
    } else {
      pickerBox.classList.add("hidden");
      dateTitle.classList.add("hidden");
    }
  }

  /* =========================
     28 - OPEN EXISTING AREA EDITOR
  ========================== */

  function openAdminEditArea(area) {
    selectedArea = area;

    currentAreaTasks =
      allTasksForAssignment.filter(function(task) {
        return task.area === area && task.category === selectedCategory;
      });

    document.getElementById("adminEditTitle").innerText = area;
    document.getElementById("adminEditAreaInput").value = area;
    document.getElementById("adminEditAssignmentInput").value = currentAssignment;
    document.getElementById("adminEditCategoryInput").value = selectedCategory;
    document.getElementById("adminMessage").innerText = "";
    document.getElementById("adminNewTaskInput").value = "";
    document.getElementById("adminNewScheduleInput").value = "";
    document.getElementById("adminNewDateInput").value = "";
    document.getElementById("adminNewStartTimeInput").value = "";
    document.getElementById("adminNewEndTimeInput").value = "";

    drawAdminSubTasks();

    showAdminView("adminEditView");
  }

  /* =========================
     29 - OPEN NEW AREA EDITOR
  ========================== */

  function openNewAdminArea() {
    selectedArea = "";
    currentAreaTasks = [];

    document.getElementById("adminEditTitle").innerText = "New Area";
    document.getElementById("adminEditAreaInput").value = "";
    document.getElementById("adminEditAssignmentInput").value = "";
    document.getElementById("adminEditCategoryInput").value = "";
    document.getElementById("adminMessage").innerText = "";
    document.getElementById("adminNewTaskInput").value = "";
    document.getElementById("adminNewScheduleInput").value = "";
    document.getElementById("adminNewDateInput").value = "";
    document.getElementById("adminNewStartTimeInput").value = "";
    document.getElementById("adminNewEndTimeInput").value = "";

    drawAdminSubTasks();

    showAdminView("adminEditView");
  }

  /* =========================
     30 - DRAW SUB TASKS
  ========================== */

  function drawAdminSubTasks() {
    const box = document.getElementById("adminSubtaskList");
    box.innerHTML = "";

    currentAreaTasks.forEach(function(task, index) {
      const div = document.createElement("div");
      div.className = "task-card";

      div.innerHTML =
        '<label>Task Name</label>' +
        '<input id="adminTaskName_' + index + '" value="' + escapeHtml(task.task || "") + '">' +

        '<label>Schedule</label>' +
        '<select id="adminTaskSchedule_' + index + '">' +
          '<option value="">Select schedule</option>' +
          '<option value="daily">daily</option>' +
          '<option value="Sunday">Sunday</option>' +
          '<option value="Monday">Monday</option>' +
          '<option value="Tuesday">Tuesday</option>' +
          '<option value="Wednesday">Wednesday</option>' +
          '<option value="Thursday">Thursday</option>' +
          '<option value="Friday">Friday</option>' +
          '<option value="Saturday">Saturday</option>' +
        '</select>' +

        '<label>Schedule Date</label>' +
        '<input id="adminTaskDate_' + index + '" type="date">' +

        '<label>Start Time</label>' +
        '<input id="adminTaskStartTime_' + index + '" type="time">' +

        '<label>End Time</label>' +
        '<input id="adminTaskEndTime_' + index + '" type="time">' +

        '<label>Active</label>' +
        '<select id="adminTaskActive_' + index + '">' +
          '<option value="">Select active</option>' +
          '<option value="true">true</option>' +
          '<option value="false">false</option>' +
        '</select>' +

        '<div class="small-row">' +
          '<button class="green" onclick="saveAdminSingleTask(' + index + ')">SAVE</button>' +
          '<button class="red" onclick="deleteAdminSingleTask(' + index + ')">DELETE</button>' +
        '</div>';

      box.appendChild(div);

      document.getElementById("adminTaskSchedule_" + index).value =
        task.schedule || "";

      document.getElementById("adminTaskDate_" + index).value =
        task.scheduleDate || "";

      document.getElementById("adminTaskStartTime_" + index).value =
        task.startTime || "";

      document.getElementById("adminTaskEndTime_" + index).value =
        task.endTime || "";

      document.getElementById("adminTaskActive_" + index).value =
        task.active === false || task.active === "No" ? "false" : "true";
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No sub tasks yet.";
      box.appendChild(empty);
    }
  }

  /* =========================
     31 - ADD SUB TASK
  ========================== */

  async function addAdminSubTask() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();
    const taskName = document.getElementById("adminNewTaskInput").value.trim();
    const schedule = document.getElementById("adminNewScheduleInput").value;
    const scheduleDate = document.getElementById("adminNewDateInput").value;
    const startTime = document.getElementById("adminNewStartTimeInput").value;
    const endTime = document.getElementById("adminNewEndTimeInput").value;

    if (!area || !assignment || !category || !taskName || !schedule) {
      alert("Fill area, assignment, category, task name, and schedule.");
      return;
    }

    showLoading();

    await addDoc(collection(db, "tasks"), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      scheduleDate: scheduleDate,
      startTime: startTime,
      endTime: endTime,
      active: true,
      updatedAt: serverTimestamp()
    });

    currentAssignment = assignment;
    selectedCategory = category;
    selectedArea = area;

    document.getElementById("adminAssignmentSelect").value = assignment;

    await loadAdminTasks();
    openAdminEditArea(area);

    hideLoading();
  }

  /* =========================
     32 - SAVE ONE SUB TASK
  ========================== */

  async function saveAdminSingleTask(index) {
    const task = currentAreaTasks[index];

    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();
    const taskName = document.getElementById("adminTaskName_" + index).value.trim();
    const schedule = document.getElementById("adminTaskSchedule_" + index).value;
    const scheduleDate = document.getElementById("adminTaskDate_" + index).value;
    const startTime = document.getElementById("adminTaskStartTime_" + index).value;
    const endTime = document.getElementById("adminTaskEndTime_" + index).value;
    const activeValue = document.getElementById("adminTaskActive_" + index).value;

    if (!area || !assignment || !category || !taskName || !schedule || !activeValue) {
      alert("Fill all required fields.");
      return;
    }

    const active = activeValue === "true";

    showLoading();

    await updateDoc(doc(db, "tasks", task.id), {
      assignment: assignment,
      category: category,
      area: area,
      task: taskName,
      schedule: schedule,
      scheduleDate: scheduleDate,
      startTime: startTime,
      endTime: endTime,
      active: active,
      updatedAt: serverTimestamp()
    });

    currentAssignment = assignment;
    selectedCategory = category;
    selectedArea = area;

    document.getElementById("adminAssignmentSelect").value = assignment;

    await loadAdminTasks();
    openAdminEditArea(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Saved.";
  }

  /* =========================
     33 - SAVE WHOLE AREA
  ========================== */

  async function saveAdminAreaChanges() {
    const area = document.getElementById("adminEditAreaInput").value.trim();
    const assignment = document.getElementById("adminEditAssignmentInput").value.trim();
    const category = document.getElementById("adminEditCategoryInput").value.trim();

    if (!area || !assignment || !category) {
      alert("Fill area, assignment, and category.");
      return;
    }

    if (currentAreaTasks.length === 0) {
      alert("Add at least one sub task.");
      return;
    }

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      const task = currentAreaTasks[i];

      const taskName = document.getElementById("adminTaskName_" + i).value.trim();
      const schedule = document.getElementById("adminTaskSchedule_" + i).value;
      const scheduleDate = document.getElementById("adminTaskDate_" + i).value;
      const startTime = document.getElementById("adminTaskStartTime_" + i).value;
      const endTime = document.getElementById("adminTaskEndTime_" + i).value;
      const activeValue = document.getElementById("adminTaskActive_" + i).value;

      if (!taskName || !schedule || !activeValue) {
        hideLoading();
        alert("Fill all task fields.");
        return;
      }

      const active = activeValue === "true";

      await updateDoc(doc(db, "tasks", task.id), {
        assignment: assignment,
        category: category,
        area: area,
        task: taskName,
        schedule: schedule,
        scheduleDate: scheduleDate,
        startTime: startTime,
        endTime: endTime,
        active: active,
        updatedAt: serverTimestamp()
      });
    }

    currentAssignment = assignment;
    selectedCategory = category;
    selectedArea = area;

    document.getElementById("adminAssignmentSelect").value = assignment;

    await loadAdminTasks();
    openAdminEditArea(area);

    hideLoading();

    document.getElementById("adminMessage").innerText = "Area saved.";
  }

  /* =========================
     34 - DELETE ONE SUB TASK
  ========================== */

  async function deleteAdminSingleTask(index) {
    const task = currentAreaTasks[index];

    const ok = confirm("Delete this sub task?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "tasks", task.id));

    await loadAdminTasks();

    if (selectedArea) {
      openAdminEditArea(selectedArea);
    } else {
      showAdminView("adminAreaView");
    }

    hideLoading();
  }

  /* =========================
     35 - DELETE WHOLE AREA
  ========================== */

  async function deleteAdminArea() {
    if (currentAreaTasks.length === 0) {
      backToAdminAreas();
      return;
    }

    const ok = confirm("Delete this whole area and all sub tasks?");
    if (!ok) return;

    showLoading();

    for (let i = 0; i < currentAreaTasks.length; i++) {
      await deleteDoc(doc(db, "tasks", currentAreaTasks[i].id));
    }

    await loadAdminTasks();

    hideLoading();

    showAdminView("adminAreaView");
  }

  /* =========================
     36 - BACK BUTTONS
  ========================== */

  async function backToAdminAreas() {
    await loadAdminTasks();
    drawAdminAreaButtons(selectedCategory);
    showAdminView("adminAreaView");
  }

  function backToAdminCategories() {
    selectedCategory = "";
    drawAdminCategories();
    showAdminView("adminView2");
  }

  /* =========================
     37 - OPEN EMPLOYEES
  ========================== */

  async function openEmployees() {
    showLoading();

    const snap = await getDocs(collection(db, "employees"));

    const employees = snap.docs.map(function(empDoc) {
      return {
        id: empDoc.id,
        ...empDoc.data()
      };
    });

    const box = document.getElementById("employeeList");
    box.innerHTML = "";

    employees.forEach(function(emp) {
      const btn = document.createElement("button");

      const name =
        ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
        emp.employeeName ||
        emp.name ||
        "Employee";

      btn.innerHTML =
        '<div class="room-number">' + escapeHtml(name) + '</div>' +
        '<div class="room-counter">PIN: ' + escapeHtml(emp.pin || "") + '</div>';

      btn.onclick = function() {
        openEmployeeEditor(emp);
      };

      box.appendChild(btn);
    });

    if (box.innerHTML === "") {
      const empty = document.createElement("h3");
      empty.innerText = "No employees found.";
      box.appendChild(empty);
    }

    hideLoading();

    showAdminView("adminEmployeesView");
  }

  /* =========================
     38 - OPEN NEW EMPLOYEE
  ========================== */

  function openNewEmployee() {
    currentEmployeeId = "";

    document.getElementById("employeeEditTitle").innerText = "New Employee";
    document.getElementById("empFirstName").value = "";
    document.getElementById("empLastName").value = "";
    document.getElementById("empPin").value = "";
    document.getElementById("empAssignment").value = "";
    document.getElementById("empRole").value = "";
    document.getElementById("empActive").value = "";
    document.getElementById("employeeMessage").innerText = "";

    showAdminView("adminEmployeeEditView");
  }

  /* =========================
     39 - OPEN EXISTING EMPLOYEE
  ========================== */

  function openEmployeeEditor(emp) {
    currentEmployeeId = emp.id;

    const name =
      ((emp.firstName || "") + " " + (emp.lastName || "")).trim() ||
      emp.employeeName ||
      emp.name ||
      "Employee";

    document.getElementById("employeeEditTitle").innerText = name;
    document.getElementById("empFirstName").value = emp.firstName || "";
    document.getElementById("empLastName").value = emp.lastName || "";
    document.getElementById("empPin").value = emp.pin || "";
    document.getElementById("empAssignment").value = emp.assignment || "";
    document.getElementById("empRole").value = emp.role || "";
    document.getElementById("empActive").value =
      emp.active === false ? "false" : "true";
    document.getElementById("employeeMessage").innerText = "";

    showAdminView("adminEmployeeEditView");
  }

  /* =========================
     40 - SAVE EMPLOYEE
  ========================== */

  async function saveEmployee() {
    const firstName = document.getElementById("empFirstName").value.trim();
    const lastName = document.getElementById("empLastName").value.trim();
    const pin = document.getElementById("empPin").value.trim();
    const assignment = document.getElementById("empAssignment").value;
    const role = document.getElementById("empRole").value;
    const activeValue = document.getElementById("empActive").value;

    if (!firstName || !pin || !assignment || !role || !activeValue) {
      alert("Fill first name, PIN, assignment, role, and active.");
      return;
    }

    const active = activeValue === "true";

    showLoading();

    const data = {
      firstName: firstName,
      lastName: lastName,
      pin: pin,
      assignment: assignment,
      role: role,
      active: active,
      updatedAt: serverTimestamp()
    };

    if (currentEmployeeId) {
      await updateDoc(doc(db, "employees", currentEmployeeId), data);
    } else {
      data.createdAt = serverTimestamp();
      const newDoc = await addDoc(collection(db, "employees"), data);
      currentEmployeeId = newDoc.id;
    }

    hideLoading();

    document.getElementById("employeeMessage").innerText = "Employee saved.";
  }

  /* =========================
     41 - DELETE EMPLOYEE
  ========================== */

  async function deleteEmployee() {
    if (!currentEmployeeId) {
      openEmployees();
      return;
    }

    const ok = confirm("Delete this employee?");
    if (!ok) return;

    showLoading();

    await deleteDoc(doc(db, "employees", currentEmployeeId));

    hideLoading();

    openEmployees();
  }

  /* =========================
     42 - LOGOUT
  ========================== */

  function logout() {
    sessionStorage.clear();
    window.location.href = "index.html";
  }

  /* =========================
     43 - HTML ESCAPE HELPER
  ========================== */

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* =========================
     44 - WINDOW FUNCTIONS - DATE / ASSIGNMENT
  ========================== */

  window.openAdminCalendar = openAdminCalendar;
  window.changeAdminWorkDateFromCalendar = changeAdminWorkDateFromCalendar;
  window.changeAdminWorkDateFromBigPicker = changeAdminWorkDateFromBigPicker;
  window.changeAdminAssignment = changeAdminAssignment;

  /* =========================
     45 - WINDOW FUNCTIONS - ADMIN TASKS
  ========================== */

  window.openNewAdminArea = openNewAdminArea;
  window.addAdminSubTask = addAdminSubTask;
  window.saveAdminSingleTask = saveAdminSingleTask;
  window.saveAdminAreaChanges = saveAdminAreaChanges;
  window.deleteAdminSingleTask = deleteAdminSingleTask;
  window.deleteAdminArea = deleteAdminArea;
  window.backToAdminAreas = backToAdminAreas;
  window.backToAdminCategories = backToAdminCategories;

  /* =========================
     46 - WINDOW FUNCTIONS - EMPLOYEES
  ========================== */

  window.openEmployees = openEmployees;
  window.openNewEmployee = openNewEmployee;
  window.saveEmployee = saveEmployee;
  window.deleteEmployee = deleteEmployee;

  /* =========================
     47 - WINDOW FUNCTIONS - LOGOUT
  ========================== */

  window.logout = logout;

</script>

</body>
</html>
